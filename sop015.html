<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/**
 * AI SOP OCR v0.10
 * Select → OCR → Process
 *
 * [v0.10 패치노트] 코드 품질·안정성·감사추적 종합 강화
 *
 * [v0.09에서 발견된 이슈]
 * 1. 재시도 호출(handleRetryFailed) 시 outputTokenLimit 누락 → 사용자 한도 설정 무시
 * 2. processResults 인자 개수 불일치 (5개 정의에 6개 전달)
 * 3. 컬럼 매칭 정규식 헐거움: findIndex가 항상 첫 매칭만 잡음
 *    - "결제일/승인일" 동시 존재 시 의도 다름
 *    - "점명"이 "지점명"·"대리점명"에도 매칭
 *    - "업체"가 "업체코드"에도 매칭
 * 4. 금액 컬럼 변수 중복(amountColIdxs vs amountIdx) — 정규식 불일치로 중복검사 꺼지는 경우
 * 5. isLikelyDate YYMMDD 6자리 → 사업자번호 앞 6자리·가맹점번호 오탐
 * 6. headersCompatible 위치 기반 비교 → 같은 카드사라도 컬럼 순서 바뀌면 충돌 오판
 * 7. globalRateLimitQueue 모듈 레벨 let → 컴포넌트 재마운트 시 큐 공유 가능
 * 8. download/downloadLog 정규식 복붙 중복 → 한쪽만 수정 시 사일런트 버그
 * 9. 경고 컬럼 추가 시 짧은 행에서 위치 어긋남
 * 10. isRealMoney 10자리 이상 차단 → 10억 이상 거래금액 변환 실패
 * 11. resetAll/새 작업 시 activeRequests abort 누락 → 이전 응답이 새 세션에 끼어들 위험
 * 12. usageHistoryRef 메모리 누수 (작업 종료 후 정리 안 됨)
 * 13. 에러 메시지가 비개발자에 불친절 ("SafetyFilter", "EmptyResponse")
 * 14. 로그·리포트 휘발성 — 새로고침 시 작업 이력 전량 소실
 *
 * [v0.10 핵심 변경]
 * 1. COL_PATTERNS 상수 도입 — download/downloadLog/내부 헬퍼 모두 단일 소스 참조
 * 2. 컬럼 매칭 패턴 엄격화
 *    - "점명" → "(?<!지|대리)점명" 대안: 부정 키워드 별도 차단
 *    - "업체" → "업체(?!코드|번호|구분)" 식으로 후속 단어 배제
 *    - 금액 키 컬럼은 amountColIdxs의 첫 요소로 통일
 * 3. headersCompatible: 위치 비교 → 집합 교집합 비율 (Jaccard 유사도)
 *    - 컬럼 순서 변경 무관, 75% 이상 겹치면 호환
 * 4. isLikelyDate YYMMDD 강화 — 헤더 컨텍스트 없이는 6자리 폐기(탭폴백에서)
 * 5. globalRateLimitQueue → rateLimitQueueRef (useRef로 컴포넌트 내부화)
 * 6. isRealMoney 차단 임계값 10 → 12자리 (1000억 미만 거래 안전)
 * 7. 경고 컬럼 추가 시 header.length로 패딩 후 부착
 * 8. resetAll·새 작업 버튼에 abort 정리 추가
 * 9. 메모리 누수 정리 (resetAll 시 usageHistoryRef 비움)
 * 10. 에러 메시지 한글화
 *     - "SafetyFilter" → "Google AI가 이 이미지를 처리하지 못했습니다"
 *     - "EmptyResponse" → "AI 응답이 비어 있습니다. 이미지 품질을 확인해주세요"
 * 11. 작업 이력 영속화 (NEW) — IndexedDB 'history' 스토어
 *     - 작업 완료/취소/에러 시 자동 저장
 *     - 최근 10건 FIFO 보관
 *     - "이력" 버튼 + 모달로 과거 작업 조회·리포트 재다운로드
 *     - 앱 시작 시 가장 최근 작업의 로그 자동 복원
 * 12. processResults 인자 정리 (불필요 6번째 인자 제거)
 *
 * [아키텍처 개요]
 * - 1-Pass 파이프라인: 정찰 폐지, API 1회 호출로 데이터 직접 추출
 * - 적응형 전처리: 밝기 분석 후 동적 contrast/brightness 적용
 * - JSON Lines 파싱: 헤더명 키 기반, 위치 의존 제거
 * - 탭 폴백: JSON 0건 시 자동 전환 (isLikelyDate 보조)
 * - SlidingWindowQueue: RPM 방어 (8/60s, 한도 10 RPM)
 * - 시스템 검토 컬럼: 조건 A(금액누락) B(데이터유실) C(중복행)
 * - 모니터링: 최대 RPM / TPM / 출력토큰 추적
 * - 작업 이력: IndexedDB 영속화, 감사추적 지원
 */

// ── 상수 [v0.12 #18] ─────────────────────────────────────────────────────────
const SMA_WINDOW         = 5;
const LOG_MAX            = 120;
const RENDER_QUEUE_AHEAD = 1;
const BRIGHTNESS_DARK    = 85;
const BRIGHTNESS_LIGHT   = 170;
const HISTORY_ETA_SEED   = 12000;

// ── CONFIG ────────────────────────────────────────────────────────────────────
// [v0.09.2] 사용자 변경 가능 항목은 UI 설정 패널로 이동
// 변경 불가 고정값만 여기에 유지
const CONFIG = {
  GEMINI_URL: "https://aiplatform.googleapis.com/v1/publishers/google/models/gemini-3.1-flash-lite:generateContent",
  TIMEOUT_MS: 180000,
  MAX_RETRIES: 4,
};

// 설정 기본값 (localStorage 저장/복원, UI에서 변경 가능)
const DEFAULT_SETTINGS = {
  LIMIT_RPM:           10,      // 분당 요청 한도
  LIMIT_TPM:           250000,  // 분당 토큰 한도
  LIMIT_OUTPUT_TOKENS: 65535,   // 최대 출력 토큰
  CONCURRENCY_LIMIT:   2,       // 동시 처리 페이지 수
  WARN_RATIO:          0.9,     // 한도 대비 경고 발생 비율 (90%)
};

const loadSettings = () => {
  try {
    const saved = localStorage.getItem('sop_settings');
    if (saved) return { ...DEFAULT_SETTINGS, ...JSON.parse(saved) };
  } catch(e) {}
  return { ...DEFAULT_SETTINGS };
};

const saveSettings = (s) => {
  try { localStorage.setItem('sop_settings', JSON.stringify(s)); } catch(e) {}
};

// ── DB ────────────────────────────────────────────────────────────────────────
const DB_NAME = 'AI_SOP_OCR';
const STORE_NAME = 'data';
// [v0.10] 작업 이력 영속화용 스토어 추가
const HISTORY_STORE = 'history';
const HISTORY_MAX = 10;  // 최근 N건만 보관 (FIFO)
const DB_VERSION = 2;    // [v0.10] 스토어 추가로 버전업
const VERSION_CODE = '015';  // 버전 코드 (파일명용)
const pad = (n) => String(n).padStart(2, '0');
const stamp = () => {
  const d = new Date();
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
};
const fileStamp = () => `sop${VERSION_CODE}_${stamp()}`;  // sop010_YYYYMMDD_HHMM

// ── WebP 지원 감지 ─────────────────────────────────────────────────────────────
const supportsWebP = (() => {
  try {
    const c = document.createElement('canvas');
    if (c.getContext && c.getContext('2d'))
      return c.toDataURL('image/webp').startsWith('data:image/webp');
  } catch(e) {}
  return false;
})();

// ── 유틸 ──────────────────────────────────────────────────────────────────────
const fileToBase64 = (file) => new Promise((res, rej) => {
  const r = new FileReader();
  r.readAsDataURL(file);
  r.onload = () => res(r.result.split(',')[1]);
  r.onerror = rej;
});

const calculateETA = (smaArr, remaining, concurrency) => {
  if (remaining === 0) return '마무리 중...';
  if (!smaArr.length) return '';
  const avg = smaArr.reduce((a,b)=>a+b,0) / smaArr.length;
  const ms = (remaining * avg) / Math.min(concurrency, remaining);
  const sec = Math.ceil(ms / 1000);
  if (sec < 60) return `약 ${sec}초 예상`;
  return `약 ${Math.floor(sec/60)}분 ${sec%60 > 0 ? (sec%60)+'초 ' : ''}예상`;
};

// ── 적응형 전처리 ──────────────────────────────────────────────────────────────
const analyzeBrightness = (ctx, w, h) => {
  // 상단 로고/헤더 건너뛰고 표 시작 구간 샘플링
  // 카드 명세서는 h 15%~50% 구간에 거래 내역 표가 시작됨
  const sx = Math.floor(w * 0.1);
  const sy = Math.floor(h * 0.15);
  const sw = Math.floor(w * 0.8);
  const sh = Math.floor(h * 0.35);
  const data = ctx.getImageData(sx, sy, sw, sh).data;
  let sum = 0;
  for (let i = 0; i < data.length; i += 4) sum += data[i];
  return sum / (data.length / 4);
};

const getAdaptiveFilter = (brightness) => {
  if (brightness < BRIGHTNESS_DARK)       return { contrast: 1.8, brightness: 1.3, label: '어두움' };
  else if (brightness < BRIGHTNESS_LIGHT) return { contrast: 1.5, brightness: 1.1, label: '보통' };
  else                        return { contrast: 1.3, brightness: 1.0, label: '밝음' };
};

// ── SlidingWindowQueue ────────────────────────────────────────────────────────
class SlidingWindowQueue {
  constructor(limit, windowMs, logFn) {
    this.limit = limit;
    this.windowMs = windowMs;
    this.timestamps = [];
    this.logFn = logFn || (() => {});
  }
  async acquire(cancelRef) {
    while (true) {
      if (cancelRef?.current) throw new Error('취소됨');
      const now = Date.now();
      this.timestamps = this.timestamps.filter(t => now - t < this.windowMs);
      if (this.timestamps.length < this.limit) {
        this.timestamps.push(now);
        return;
      }
      const wait = this.windowMs - (now - this.timestamps[0]) + 20;
      this.logFn(`⏳ [물레방아 대기] ${Math.ceil(wait/1000)}초 후 진입`);
      await new Promise(r => setTimeout(r, wait));
    }
  }
}

// [v0.10] globalRateLimitQueue 모듈 레벨 변수 제거 — 컴포넌트 내부 useRef로 이동
// (재마운트·다중 인스턴스 시 큐 공유 위험 차단)

// ── parseRawText ──────────────────────────────────────────────────────────────
// [v0.09] isDatePattern → isLikelyDate 재설계
// 역할 변경: 행 폐기 기준 → 탭폴백 보조 판단 전용 (JSON 경로에서는 사용 안 함)
// [v0.09.1] 역참조(\1) 도입으로 과탐지·혼용구분자 차단
// [v0.10] YYMMDD 6자리 옵션화 — 사업자번호·가맹점번호 오탐 차단
//         기본은 strict(6자리 불인정), allowShort=true일 때만 6자리 허용
const isLikelyDate = (str, allowShort = false) => {
  if (typeof str !== 'string') return false;
  const s = str.trim();
  // 형식1: 동일한 구분자가 2번 사용된 날짜 (역참조 \1)
  //   매칭 O: 2025.01.03 / 25-1-3 / 2025/06/30
  //   매칭 X: 25.5 (구분자 1개) / 2025.01-03 (구분자 혼용)
  if (/\d{2,4}([.\-/])\d{1,2}\1\d{1,2}/.test(s)) return true;
  // 형식2: 8자리 YYYYMMDD — 신한카드 등 구분자 없는 형식 (년/월/일 범위 검증)
  if (/^\d{8}$/.test(s)) {
    const y = parseInt(s.slice(0, 4), 10);
    const m = parseInt(s.slice(4, 6), 10);
    const d = parseInt(s.slice(6, 8), 10);
    return y >= 2000 && y <= 2099 && m >= 1 && m <= 12 && d >= 1 && d <= 31;
  }
  // 형식3: 6자리 YYMMDD — [v0.10] 기본 거절 (사업자번호 앞 6자리 오탐 방지)
  // 호출자가 명시적으로 allowShort=true를 줄 때만 허용
  if (allowShort && /^\d{6}$/.test(s)) {
    const m = parseInt(s.slice(2, 4), 10);
    const d = parseInt(s.slice(4, 6), 10);
    return m >= 1 && m <= 12 && d >= 1 && d <= 31;
  }
  return false;
};

// [v0.13] VALUE OBJECTS — COL_PATTERNS/extractColIdxs/evaluateRowWarnings 대체
const CARD_HEADER_PATTERNS = {
  amountAll: /(?:금액|원금|단가|합계|매출(?:액|금)|결제(?:액|금)|청구(?:액|금)|이용금|공급가|부가세|총액)/,
  date:      /(?:날짜|일자|이용일|거래일|매출일|승인일|결제일|발생일|등록일)/,
  store:     /(?:가맹점(?!번호|코드)|상호|거래처(?!코드|번호)|점명|업체(?!코드|번호|구분))/,
  install:   /(?:할부|회차|개월)/,
};
const _isRealMoney = (s) => {
  if (!s) return false;
  if (s.includes('/') || s.includes('-')) return false;
  if (s !== '0' && /^0\d/.test(s)) return false;
  const noComma = s.replace(/,/g, '');
  if (!s.includes(',') && /^\d+$/.test(noComma) && noComma.length >= 12) return false;
  return /^-?\d{1,3}(,\d{3})*(\..+)?$/.test(s) || /^-?\d+(\..+)?$/.test(s);
};
class CardHeader {
  constructor(columns) {
    if (!Array.isArray(columns) || columns.length < 2) throw new Error('CardHeader: 컬럼 2개 이상');
    this.columns = columns.map(c => String(c).trim());
    this._idxs = null;
  }
  static from(columns) {
    if (!columns || columns.length < 2) return null;
    try { return new CardHeader(columns); } catch(e) { return null; }
  }
  getIdxs() {
    if (this._idxs) return this._idxs;
    const amountColIdxs=[]; let dateIdx=-1,storeIdx=-1,installIdx=-1;
    this.columns.forEach((h,i) => {
      if (CARD_HEADER_PATTERNS.amountAll.test(h)) amountColIdxs.push(i);
      if (dateIdx    ===-1 && CARD_HEADER_PATTERNS.date.test(h))    dateIdx    =i;
      if (storeIdx   ===-1 && CARD_HEADER_PATTERNS.store.test(h))   storeIdx   =i;
      if (installIdx ===-1 && CARD_HEADER_PATTERNS.install.test(h)) installIdx =i;
    });
    this._idxs={amountColIdxs,amountIdx:amountColIdxs.length>0?amountColIdxs[0]:-1,dateIdx,storeIdx,installIdx};
    return this._idxs;
  }
  isCompatibleWith(other) {
    if (!(other instanceof CardHeader)) return false;
    const s1=new Set(this.columns),s2=new Set(other.columns);
    let ix=0; s1.forEach(c=>{if(s2.has(c))ix++;});
    const u=s1.size+s2.size-ix; return u>0&&(ix/u)>=0.75;
  }

// 집계행 키워드 (AI 프롬프트 1차 + 클라이언트 2차 보조)
const AGGREGATE_RE = /^(소계|합계|총합|총계|월계|누계|grand\s*total|sub\s*total)/i;

const parseRawText = (text, globalHeaderRef, currentArray, repObj) => {
  const rawLines = text.split('\n').map(l => l.replace(/\r/g, '').trim()).filter(Boolean);

  // ── JSON Lines 경로 ──────────────────────────────────────────────────────
  let jsonRows = [];
  let jsonHeader = null;

  for (const ln of rawLines) {
    if (!(ln.startsWith('{') || ln.startsWith('['))) continue;
    let obj;
    try { obj = JSON.parse(ln); } catch(e) { continue; }
    if (Array.isArray(obj)) {
      // 첫 번째로 등장하는 문자열 배열을 헤더로 채택
      if (!jsonHeader && obj.length >= 2 && obj.every(v => typeof v === 'string')) {
        jsonHeader = obj.map(s => String(s).trim());
      }
      continue;
    }
    if (obj && typeof obj === 'object') jsonRows.push(obj);
  }

  if (jsonRows.length > 0) {
    // 헤더 확정 (globalHeaderRef 우선, 그 다음 이번 페이지 jsonHeader, 그 다음 키 추론)
    if (jsonHeader && !globalHeaderRef.current) {
      globalHeaderRef.current = jsonHeader;
      currentArray.push(jsonHeader);
      repObj.headerFound = true;
    }
    if (!globalHeaderRef.current) {
      // 헤더 배열이 없을 때: 전체 객체 키 합집합으로 추론
      const keyset = [];
      jsonRows.forEach(o => Object.keys(o).forEach(k => {
        if (k !== '__skip' && !keyset.includes(k)) keyset.push(k);
      }));
      if (keyset.length >= 2) {
        globalHeaderRef.current = keyset;
        currentArray.push(keyset);
        repObj.headerFound = true;
      }
    }

    const header = globalHeaderRef.current;
    if (!header) return; // 헤더조차 없으면 이 페이지 스킵

    let parsed = 0;
    for (const o of jsonRows) {
      // [v0.09 핵심] AI가 __skip:true 를 붙인 행(애매한 집계행) 제외
      if (o.__skip === true) continue;

      const vals = Object.keys(o)
        .filter(k => k !== '__skip')
        .map(k => (o[k] == null ? '' : String(o[k]).trim()));

      // 완전 빈 객체 제외 (모든 값이 '')
      if (vals.every(v => v === '')) continue;

      // 클라이언트 보조: 집계행 키워드 감지 (AI 프롬프트가 빠뜨린 경우 대비)
      if (AGGREGATE_RE.test(vals[0] || '')) continue;

      // [v0.09 핵심] isLikelyDate 검열 제거
      // AI가 거래행이라고 판단해서 JSON으로 보낸 것을 신뢰 — 날짜 형식과 무관하게 수용
      const row = header.map(h => {
        const v = o[h];
        return (v === undefined || v === null) ? '' : String(v).trim();
      });
      currentArray.push(row);
      repObj.rows++;
      parsed++;
    }
    repObj.jsonParsed = (repObj.jsonParsed || 0) + parsed;
    repObj.tabFallback = false;
    return;
  }

  // ── 탭 폴백 경로 ────────────────────────────────────────────────────────
  // JSON이 0건일 때만 진입. isLikelyDate는 여기서만 보조 역할로 사용.
  repObj.tabFallback = true;
  const lines = text.split('\n')
    .map(l => l.replace(/\r/g, '').trimEnd())
    .filter(l => l.trim().length > 0 && !l.match(/^[-=_*]+$/));

  for (const line of lines) {
    const cols = line.split('\t').map(c => c.trim());
    if (cols.length < 2) continue;

    // 집계행 제외
    if (AGGREGATE_RE.test(cols[0])) continue;

    // 헤더 감지: 한글 컬럼명 비율이 높고 숫자/날짜가 거의 없는 행
    // [v0.09.1] 사업자번호·가맹점번호 등 숫자형 데이터 헤더 키워드 추가
    const hasHeaderKeyword = cols.some(c =>
      /날짜|일자|이용일|이용일자|거래일|승인일|매출일|결제일|카드|가맹점|상호|금액|원금|승인|구분|할부|사업자|가맹번|번호|코드|업종/.test(c)
    );
    const hasKnownHeader = !!globalHeaderRef.current;
    const dateCount = cols.filter(c => isLikelyDate(c, hasKnownHeader)).length;
    const numericCount = cols.filter(c => {
      const s = c.replace(/[,]/g, '').trim();
      return s !== '' && !isNaN(s) && s.length <= 9;
    }).length;
    const koreanCount = cols.filter(c => /[가-힣]/.test(c)).length;

    // 헤더 행 판정: 한글이 많고 숫자/날짜가 적음
    const looksLikeHeader = hasHeaderKeyword ||
      (koreanCount >= Math.ceil(cols.length * 0.4) && dateCount === 0 && numericCount <= 1);

    if (looksLikeHeader) {
      if (!globalHeaderRef.current) {
        globalHeaderRef.current = cols;
        currentArray.push(cols);
        repObj.headerFound = true;
      }
      continue;
    }

    // [v0.09] 탭폴백도 날짜 필터 완화: isLikelyDate가 하나라도 있으면 데이터행으로 수용
    // 날짜가 전혀 없어도 숫자가 2개 이상이면 수용 (날짜가 다른 형식일 수 있음)
    const hasDate = cols.some(c => isLikelyDate(c, hasKnownHeader));
    const hasEnoughNumbers = numericCount >= 2;
    if (!hasDate && !hasEnoughNumbers) continue;

    currentArray.push(cols);
    repObj.rows++;
  }
};

// [v0.10] DB_VERSION 2로 업그레이드, history 스토어 동시 생성
function useDB(key, init) {
  const [data, setData] = useState(init);
  const dbRef = useRef(null);
  const initRef = useRef(init);
  useEffect(() => {
    try {
      if (!window.indexedDB) return;
      const req = window.indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
        // [v0.10] history 스토어 추가 (작업 이력)
        if (!db.objectStoreNames.contains(HISTORY_STORE)) db.createObjectStore(HISTORY_STORE);
      };
      req.onsuccess = (e) => {
        dbRef.current = e.target.result;
        const g = dbRef.current.transaction(STORE_NAME,'readonly').objectStore(STORE_NAME).get(key);
        g.onsuccess = () => { if (g.result !== undefined) setData(g.result); };
      };
    } catch(e) { console.warn('IndexedDB 차단:', e); }
  }, [key]);
  const save = useCallback((d) => {
    setData(d);
    try { if (dbRef.current) dbRef.current.transaction(STORE_NAME,'readwrite').objectStore(STORE_NAME).put(d, key); } catch(e) { console.warn('[useDB.save]', e); }
  }, [key]);
  const clear = useCallback(() => {
    setData(initRef.current);
    try { if (dbRef.current) dbRef.current.transaction(STORE_NAME,'readwrite').objectStore(STORE_NAME).delete(key); } catch(e) { console.warn('[useDB.clear]', e); }
  }, [key]);
  return [data, save, clear];
}

// [v0.10] 작업 이력 저장/조회/삭제 — IndexedDB 직접 접근
// 저장된 모든 이력을 시간 역순으로 반환
// [v0.10.1 #16] 모듈 레벨 connection 캐시 — 호출마다 새 커넥션 열지 않음
let _dbPromise = null;
const openHistoryDB = () => {
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((res, rej) => {
    if (!window.indexedDB) { _dbPromise = null; return rej(new Error('IndexedDB 미지원')); }
    const req = window.indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
      if (!db.objectStoreNames.contains(HISTORY_STORE)) db.createObjectStore(HISTORY_STORE);
    };
    req.onsuccess = (e) => {
      const db = e.target.result;
      // 연결이 닫히거나 버전 변경되면 캐시 무효화
      db.onclose = () => { _dbPromise = null; };
      db.onversionchange = () => { try { db.close(); } catch(e){} _dbPromise = null; };
      res(db);
    };
    req.onerror = () => { _dbPromise = null; rej(req.error); };
  });
  return _dbPromise;
};

const saveHistoryEntry = async (entry) => {
  try {
    const db = await openHistoryDB();
    const tx = db.transaction(HISTORY_STORE, 'readwrite');
    const store = tx.objectStore(HISTORY_STORE);
    // FIFO: 최신 추가 후 N개 초과분 자동 삭제
    await new Promise((res, rej) => {
      tx.onerror = () => rej(tx.error);
      store.put(entry, entry.id);
      const keysReq = store.getAllKeys();
      keysReq.onsuccess = () => {
        const allKeys = (keysReq.result || []).sort();
        if (allKeys.length > HISTORY_MAX) {
          const toDelete = allKeys.slice(0, allKeys.length - HISTORY_MAX);
          for (const k of toDelete) store.delete(k);
        }
      };
      tx.oncomplete = () => res(); // [v0.12 #6]
    });
    return true;
  } catch(e) {
    console.warn('이력 저장 실패:', e);
    return false;
  }
};

const loadHistory = async () => {
  try {
    const db = await openHistoryDB();
    const tx = db.transaction(HISTORY_STORE, 'readonly');
    const store = tx.objectStore(HISTORY_STORE);
    const req = store.getAll();
    return await new Promise(r => {
      req.onsuccess = () => r((req.result || []).sort((a,b) => b.completedAt - a.completedAt));
      req.onerror = () => r([]);
    });
  } catch(e) {
    return [];
  }
};

const deleteHistoryEntry = async (id) => {

};

};

// ════════════════════════════════════════════════════════════════════════════
// [v0.15] GeminiClient — 인프라 계층
// Gemini API 호출 전담. callExtract useCallback을 대체.
// ════════════════════════════════════════════════════════════════════════════
class GeminiClient {
  constructor(apiKey, deps) {
    this._apiKey     = apiKey;
    this._cancelRef  = deps.cancelRef;
    this._activeRefs = deps.activeRequestsRef;
    this._queue      = deps.queue;
    this._markReq    = deps.markRequest;
    this._markEnd    = deps.markRequestEnd;
    this._log        = deps.log;
    this._onMaxTokens = deps.onMaxTokens || null;
  }

  async extract(base64, mimeType, chunkIndex, knownHeader, outputTokenLimit) {
    const URL      = "https://aiplatform.googleapis.com/v1/publishers/google/models/gemini-3.1-flash-lite:generateContent";
    const MAX_R    = 4;
    const TIMEOUT  = 180000;
    const limit    = outputTokenLimit || 65535;

    const headerHint = knownHeader && knownHeader.length > 0
      ? "\n\n[중요] 이 페이지에는 표 헤더가 없습니다. 반드시 아래 헤더명을 키로 사용하세요 (임의 생성 금지):\n"
        + JSON.stringify(knownHeader) + "\n첫 줄 헤더 배열도 위 헤더 그대로 출력하세요."
      : '';
    const userText = knownHeader && knownHeader.length > 0
      ? "값이 있는 컬럼만 헤더명을 키로 사용해 JSON Lines로 출력하세요. 첫 줄은 반드시 " + JSON.stringify(knownHeader) + " 배열을 그대로 출력하세요."
      : "값이 있는 컬럼만 헤더명을 키로 사용해 JSON Lines로 출력하세요. 첫 줄은 헤더 컬럼명 JSON 배열입니다.";

    let attempt = 1;
    while (attempt <= MAX_R) {
      if (this._cancelRef.current) throw new Error('취소됨');
      await this._queue.acquire(this._cancelRef);
      if (this._cancelRef.current) throw new Error('취소됨');

      const reqId = "g_" + chunkIndex + "_" + Date.now();
      this._markReq(reqId, Date.now());
      const t0 = Date.now();
      const ctrl = new AbortController();
      this._activeRefs.current.add(ctrl);
      const tid = setTimeout(() => ctrl.abort(), TIMEOUT);

      try {
        const res = await fetch(URL + "?key=" + this._apiKey.trim(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            systemInstruction: { parts: [{ text: EXTRACT_PROMPT + headerHint }] },
            contents: [{ role: 'user', parts: [{ text: userText }, { inlineData: { mimeType, data: base64 } }] }],
            generationConfig: { responseMimeType: 'text/plain', temperature: 0, topP: 0.1, maxOutputTokens: limit },
            safetySettings: [
              { category: "HARM_CATEGORY_HARASSMENT",        threshold: "BLOCK_NONE" },
              { category: "HARM_CATEGORY_HATE_SPEECH",       threshold: "BLOCK_NONE" },
              { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
              { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" },
              { category: "HARM_CATEGORY_CIVIC_INTEGRITY",   threshold: "BLOCK_NONE" },
            ]
          }),
          signal: ctrl.signal
        });
        clearTimeout(tid);
        this._activeRefs.current.delete(ctrl);

        if (!res.ok) throw new Error("API " + res.status + ": " + (await res.text()).substring(0, 200));

        const json       = await res.json();
        const candidate  = json.candidates && json.candidates[0];
        const finish     = (candidate && candidate.finishReason) || 'UNKNOWN';
        const usage      = json.usageMetadata || {};
        const outTok     = usage.candidatesTokenCount || 0;
        const inTok      = usage.promptTokenCount || 0;
        const apiTime    = Date.now() - t0;

        this._markEnd(reqId, outTok);

        if (finish === 'MAX_TOKENS') {
          this._log("⚠️ [페이지 " + chunkIndex + "] 출력토큰 한도 도달 (" + outTok + "/" + limit + ") — 원본 대조 권장");
          if (this._onMaxTokens) this._onMaxTokens(chunkIndex);
        }
        if (finish === 'SAFETY' || finish === 'PROHIBITED_CONTENT')
          throw new Error('Google AI가 이 이미지를 처리하지 못했습니다 (안전 필터 차단).');

        const text = candidate && candidate.content
          ? candidate.content.parts.map(function(p){return p.text||'';}).join('') : '';
        const cleaned = text.replace(/```[a-z]*\n?/gi, '').trim();
        if (!cleaned) throw new Error('AI 응답이 비어 있습니다. 이미지 품질을 확인해주세요.');

        return { text: cleaned, finishReason: finish, retries: attempt-1, outputTokens: outTok, inputTokens: inTok, apiTime };

      } catch(err) {
        clearTimeout(tid);
        this._activeRefs.current.delete(ctrl);
        if (this._cancelRef.current) throw new Error('취소됨');
        if (err.message.match(/401|403|400/)) throw err;
        if (attempt >= MAX_R) throw err;
        const delay = err.message.includes('429') ? 30000 : 5000 * Math.pow(2, attempt-1);
        this._log("⚠️ [페이지 " + chunkIndex + "] 재시도 " + attempt + "/" + MAX_R + " (" + err.message.substring(0,40) + ")");
        await new Promise(function(r){ setTimeout(r, delay); });
        attempt++;
      }
    }
  }
}

// ── ErrorBoundary ─────────────────────────────────────────────────────────────
// [v0.10.1 #15] 리셋 가능 — "다시 시도" 버튼으로 boundary 복구
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(e) { return { hasError: true, error: e }; }
  componentDidCatch(error, info) { console.error('[ErrorBoundary]', error, info); }
  reset = () => this.setState({ hasError: false, error: null });
  render() {
    if (this.state.hasError) return (
      <div style={{background:'#0a0a0a',color:'#ff4444',padding:'3rem',minHeight:'100vh',fontFamily:'IBM Plex Mono,monospace'}}>
        <div style={{color:'#00ff8c',marginBottom:'1rem',fontSize:'12px',letterSpacing:'3px'}}>SYSTEM ERROR</div>
        <pre style={{fontSize:'12px',color:'#ff6666',marginBottom:'1.5rem',whiteSpace:'pre-wrap'}}>{this.state.error?.toString()}</pre>
        <div style={{display:'flex',gap:'8px'}}>
          <button
            onClick={this.reset}
            style={{background:'#f5a623',color:'#fff',border:'none',padding:'10px 20px',borderRadius:'6px',fontFamily:'IBM Plex Mono,monospace',fontSize:'11px',cursor:'pointer',fontWeight:700}}
          >다시 시도</button>
          <button
            onClick={() => window.location.reload()}
            style={{background:'transparent',color:'#00ff8c',border:'1px solid #00ff8c',padding:'10px 20px',borderRadius:'6px',fontFamily:'IBM Plex Mono,monospace',fontSize:'11px',cursor:'pointer'}}
          >페이지 새로고침</button>
        </div>
      </div>
    );
    return this.props.children;
  }
}

const EXTRACT_PROMPT = `[카드 명세서 데이터 추출 — 키-값(JSON Lines) 방식]
임무: 이 페이지의 거래 내역 표를 추출하세요. 어떤 판단·가공도 하지 말고 보이는 그대로 추출합니다.

[가장 중요한 출력 규칙]
- 각 거래 행을 '한 줄에 하나의 JSON 객체'로 출력하세요 (JSON Lines).
- 객체의 'key'는 표의 헤더(컬럼명)를 그대로 사용하세요. 카드사마다 컬럼명이 다르므로, 이 표에 실제로 적힌 헤더 텍스트를 키로 쓰세요.
- 어떤 컬럼의 칸이 아예 비어 있으면, 그 키 자체를 출력하지 마세요.
- 단, "0"이 명시적으로 적힌 셀은 반드시 "0"으로 출력하세요 (진짜 빈 칸과 구분).

[첫 줄: 헤더 정의]
- 가장 첫 줄에는 이 표의 컬럼명을 왼쪽→오른쪽 순서대로 담은 JSON 배열을 출력하세요.
  예: ["거래일","확정일","이용카드","가맹점명","사업자번호","매출금액","공급가액","부가세","비과세금액"]
- 2행 헤더(대분류/소분류)면 실제 데이터가 들어가는 하위 컬럼명만 사용하세요.

[데이터 행]
- 각 거래 행을 위 헤더 키를 사용한 JSON 객체로 한 줄씩 출력.
- 값은 원본 그대로 출력하세요 (숫자 콤마·소수점·날짜 형식 모두 보존).
  · 날짜: 표에 적힌 형식 그대로 — "20250630", "2025-01-03", "2025.01.03", "25/06/30" 모두 허용
  · 금액: "1,464,700" 또는 "1464700" 원본 표기 유지
- 표에 적힌 모든 거래 행을 빠짐없이 출력하세요 (1행도 누락 금지).

[제외 대상 — 거래 행 아님]
- 다음에 해당하는 행은 출력하지 마세요:

function MonitorUI({ liveStats, settings, grandTotalReq, status }) {
  if (grandTotalReq === 0 && status !== 'processing') return null;
  const { rpm, tpm, maxOutputTokens } = liveStats;
  const WARN_RPM           = Math.floor(settings.LIMIT_RPM * settings.WARN_RATIO);
  const WARN_TPM           = Math.floor(settings.LIMIT_TPM * settings.WARN_RATIO);
  const WARN_OUTPUT_TOKENS = Math.floor(settings.LIMIT_OUTPUT_TOKENS * settings.WARN_RATIO);
  const rWarn = rpm >= WARN_RPM;
  const tWarn = tpm >= WARN_TPM;
  const oWarn = maxOutputTokens >= WARN_OUTPUT_TOKENS;
  const anyWarn = rWarn || tWarn || oWarn;

  return (
    <div className="mt-6 pt-6 border-t border-[#b0ccbb]">
      <div className="mono text-[10px] text-[#8aad9a] uppercase tracking-[3px] mb-3">// API Monitor</div>
      <div className={`terminal-border rounded-lg p-4 bg-[#dceee5] ${anyWarn ? 'warn-border' : ''}`}>
        <div className="grid grid-cols-3 gap-4">
          <div>
            <div className="mono text-[9px] text-[#8aad9a] mb-1">RPM (한도 {settings.LIMIT_RPM})</div>
            <div className={`mono text-xl font-bold ${rWarn ? 'warn' : 'accent'}`}>{rpm}</div>
            <div className="progress-bar mt-1">
              <div className="progress-fill" style={{ width: `${Math.min((rpm/settings.LIMIT_RPM)*100, 100)}%`, background: rWarn ? '#c0392b' : undefined }}/>
            </div>
          </div>
          <div>
            <div className="mono text-[9px] text-[#8aad9a] mb-1">TPM (한도 {(settings.LIMIT_TPM/1000).toFixed(0)}K)</div>
            <div className={`mono text-xl font-bold ${tWarn ? 'warn' : 'accent'}`}>{(tpm/1000).toFixed(0)}K</div>
            <div className="progress-bar mt-1">
              <div className="progress-fill" style={{ width: `${Math.min((tpm/settings.LIMIT_TPM)*100, 100)}%`, background: tWarn ? '#c0392b' : undefined }}/>
            </div>
          </div>
          <div>
            <div className="mono text-[9px] text-[#8aad9a] mb-1">출력토큰 (한도 {(settings.LIMIT_OUTPUT_TOKENS/1000).toFixed(0)}K)</div>
            <div className={`mono text-xl font-bold ${oWarn ? 'warn' : 'accent'}`}>{(maxOutputTokens/1000).toFixed(1)}K</div>
            <div className="progress-bar mt-1">
              <div className="progress-fill" style={{ width: `${Math.min((maxOutputTokens/settings.LIMIT_OUTPUT_TOKENS)*100, 100)}%`, background: oWarn ? '#c0392b' : undefined }}/>
            </div>
          </div>
        </div>
        {anyWarn && (
          <div className="mt-3 mono text-[10px] warn flex items-center gap-2">

          </div>
        )}
      </div>
    </div>
  );
}

  const apiKeyDebounceRef = useRef(null);

  // [v0.10] rate limit 큐를 컴포넌트 내부로 이동 (모듈 전역 변수 제거)
  const rateLimitQueueRef = useRef(new SlidingWindowQueue(DEFAULT_SETTINGS.LIMIT_RPM - 2, 60000));

  // 모니터링 refs
  const usageHistoryRef = useRef([]);
  const maxRpmRef = useRef(0);
  const maxTpmRef = useRef(0);
  const maxOutputTokensRef = useRef(0);
  const grandTotalReqRef = useRef(0);

  const log = useCallback((msg) => {
    const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logsRef.current.push(line);
    setLogs(prev => [line, ...prev].slice(0, LOG_MAX));
  }, []);

  // [v0.10] 큐 logFn 바인딩 (컴포넌트 내부 ref 사용)
  rateLimitQueueRef.current.logFn = log;

  const markRequest = useCallback((id, startMs) => {

  const markRequestEnd = useCallback((id, outputTokens) => {
    const r = usageHistoryRef.current.find(x => x.id === id);
    if (r) r.outputTokens = outputTokens;
    maxOutputTokensRef.current = Math.max(maxOutputTokensRef.current, outputTokens);
  }, []);

  // 엔진 로딩
  useEffect(() => {
    let mounted = true;

      const inject = (src) => new Promise((res, rej) => {
        if (document.querySelector(`script[src="${src}"]`)) return res();
        const s = document.createElement('script');
        s.src = src; s.onload = res; s.onerror = rej;
        document.body.appendChild(s);
      });
      try {
        log('⚡ AI SOP OCR v0.15 엔진 초기화 중...');
        await inject('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
        if (window.pdfjsLib)
          window.pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        log(`✅ 엔진 준비 완료 (WebP: ${supportsWebP ? '활성' : 'JPEG 폴백'})`);
        if (mounted) setStatus('idle');
      } catch(e) {
        if (mounted) { setStatus('error'); setErrorMsg('라이브러리 로드 실패: ' + e.message); }
      }
    };
    load();
    return () => { mounted = false; };
  }, [log]);

  // API 호출 → GeminiClient.extract() [v0.15]
  // GeminiClient 인스턴스는 startProcessing/handleRetryFailed에서 생성



  // 청크 처리
  const executeChunk = useCallback(async (base64, mimeType, chunkIndex, fileName, knownHeader, outputTokenLimit) => {
    const start = Date.now();
    log(`⚡ [${fileName}] 페이지 [${chunkIndex}] 추출 시작${knownHeader ? ' (헤더힌트 적용)' : ''}`);
    try {
      const result = await clientRef.current.extract(base64, mimeType, chunkIndex, knownHeader, outputTokenLimit);
      const total = Date.now() - start;
      const apiTime = result.apiTime || 0;
      const waitTime = total - apiTime;
      const waitStr = waitTime > 1000 ? ` + 대기 ${(waitTime/1000).toFixed(1)}초` : '';
      log(`✅ [${fileName}] 페이지 [${chunkIndex}] 완료 (API ${(apiTime/1000).toFixed(1)}초${waitStr} = 총 ${(total/1000).toFixed(1)}초, 출력 ${result.outputTokens}토큰)`);
      return { success: true, chunkIndex, result, base64, mimeType, fileName, duration: total };
    } catch(err) {
      if (err.message !== '취소됨') log(`❌ [${fileName}] 페이지 [${chunkIndex}] 실패: ${err.message}`);
      return { success: false, chunkIndex, error: err, base64, mimeType, fileName };
    }
  }, [log]);  // [v0.15] client는 외부에서 전달

  // 결과 처리
  // [v0.09.1] processResults는 fileHeaderRef를 받아 실패 청크에 파일 고유 헤더 캡처
  const processResults = (resolved, currentArray, fileHeaderRef, newFailedTasks, rep) => {
    for (const res of resolved) {
      if (cancelRef.current) break;
      if (!res.success) {
        if (res.error.message !== '취소됨')
          // [Fix 1] 실패 청크 보관 시 당시 파일의 고유 헤더도 함께 저장
          newFailedTasks.push(new ExtractionJob({base64:res.base64,mimeType:res.mimeType,chunkIndex:res.chunkIndex,fileName:res.fileName,knownHeader:fileHeaderRef.current}));
        continue;
      }
      rep.retries += res.result.retries || 0;
      rep.reason = res.result.finishReason;
      rep.inputTokens = (rep.inputTokens || 0) + (res.result.inputTokens || 0);
      rep.outputTokens = (rep.outputTokens || 0) + (res.result.outputTokens || 0);
      parseRawText(res.result.text, fileHeaderRef, currentArray, rep);
    }
  };

  // 타이머/모니터링 시작
  const initTracking = () => {
    usageHistoryRef.current = [];
    grandTotalReqRef.current = 0;
    maxRpmRef.current = 0;
    maxTpmRef.current = 0;
    maxOutputTokensRef.current = 0;
    setElapsed(0);
    setLiveStats({ rpm: 0, tpm: 0, maxOutputTokens: 0 });
    const startTime = Date.now();
    timerRef.current = setInterval(() => {
      const now = Date.now();
      const newElapsed = Math.floor((now - startTime) / 1000);
      elapsedRef.current = newElapsed;
      setElapsed(newElapsed);
      usageHistoryRef.current = usageHistoryRef.current.filter(i => now - i.ts <= 60000);
      const recent = usageHistoryRef.current;
      const rpm = recent.length;
      const tpm = recent.reduce((a, c) => a + c.outputTokens, 0);
      maxRpmRef.current = Math.max(maxRpmRef.current, rpm);
      maxTpmRef.current = Math.max(maxTpmRef.current, tpm);
      setLiveStats({ rpm, tpm, maxOutputTokens: maxOutputTokensRef.current });
    }, 1000);
  };

  // [v0.10] 작업 이력 영속화 — 완료/취소/오류 시 호출
  // [v0.10.1 #7] stale closure 방지 — state 대신 ref에서 읽음
  const persistHistoryEntry = async (status, currentRows, errorMessage) => {
    try {
      const id = `job_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
      const entry = {
        id,
        completedAt: Date.now(),
        status,                // 'completed' | 'cancelled' | 'error'
        errorMessage: errorMessage || '',
        elapsed: elapsedRef.current,
        totalRows: Math.max(0, (currentRows?.length || 0) - 1),
        filesSummary: [...filesSummaryRef.current],
        tabFallbackFiles: [...tabFallbackRef.current],
        maxTokensPages: [...maxTokensPagesRef2.current],
        skippedFiles: [...skippedFilesRef.current],
        report: reportRef.current.map(r => ({ ...r })),
        logs: [...logsRef.current],
        traffic: {
          maxRpm: maxRpmRef.current,
          maxTpm: maxTpmRef.current,
          maxOutputTokens: maxOutputTokensRef.current,
          totalRequests: grandTotalReqRef.current,
        },
      };
      const ok = await saveHistoryEntry(entry);
      if (ok) {
        const latest = await loadHistory();
        setHistory(latest);
      }
    } catch(e) {
      console.warn('[v0.10] 이력 저장 중 오류:', e);
    }
  };

  // [v0.10] 앱 시작 시 이력 목록 로드 + 가장 최근 작업의 로그 복원
  useEffect(() => {
    (async () => {
      const list = await loadHistory();
      setHistory(list);
      // 가장 최근 작업의 로그만 logsRef·logs에 자동 복원 (휘발성 보완)
      if (list.length > 0 && logsRef.current.length === 0) {
        const recent = list[0];
        logsRef.current = [...(recent.logs || [])];
        reportRef.current = [...(recent.report || [])];
        setLogs((recent.logs || []).slice().reverse().slice(0, 120));
        log(`📚 이전 작업 이력 ${list.length}건 로드 (가장 최근: ${new Date(recent.completedAt).toLocaleString()})`);
      }
    })();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  // 미리보기
  const prepareUpload = async (filesArray) => {
    if (!filesArray.length) return;
    if (!apiKey.trim()) { setErrorMsg('API Key를 입력해주세요.'); setStatus('error'); return; }
    cancelRef.current = false;
    const firstPdf = filesArray.find(f => f.type.includes('pdf'));
    if (firstPdf) {
      setStatus('preview_loading');
      try {
        log(`🔍 [${firstPdf.name}] 미리보기 생성 중...`);
        const b64 = await fileToBase64(firstPdf);
        const arr = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const pdf = await window.pdfjsLib.getDocument({ data: arr }).promise;
        const page = await pdf.getPage(1);
        const vp = page.getViewport({ scale: 300/72 });
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = vp.width; canvas.height = vp.height;
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        canvas.width = 0; canvas.height = 0;
        if (page.cleanup) page.cleanup();
        if (cancelRef.current) return;
        setPreviewInfo({ filesArray, dataUrl, rotation: 0 });
        setStatus('preview');
        log('👀 미리보기 완료. 방향을 확인해주세요.');
      } catch(e) {
        if (!cancelRef.current) { log(`❌ 미리보기 오류: ${e.message}`); setErrorMsg(e.message); setStatus('error'); }
      }
    } else {
      startProcessing(filesArray, 0);
    }
  };

  // 메인 처리
  const startProcessing = async (filesArray, globalRotation) => {
    // [v0.09.2] 처리 시작 시점의 설정값 스냅샷 (도중 변경 방지)
    const cfg = { ...settings };
    const WARN_RPM           = Math.floor(cfg.LIMIT_RPM * cfg.WARN_RATIO);
    const WARN_TPM           = Math.floor(cfg.LIMIT_TPM * cfg.WARN_RATIO);
    const WARN_OUTPUT_TOKENS = Math.floor(cfg.LIMIT_OUTPUT_TOKENS * cfg.WARN_RATIO);

    // RPM 한도 기반으로 큐 재생성 (한도의 80%를 실제 슬롯으로 사용해 여유 확보)
    const rpmSlot = Math.max(1, cfg.LIMIT_RPM - 2);
    rateLimitQueueRef.current = new SlidingWindowQueue(rpmSlot, 60000);
    rateLimitQueueRef.current.logFn = log;

    // [v0.15] GeminiClient 생성
    clientRef.current = new GeminiClient(apiKey, {
      cancelRef,
      activeRequestsRef,
      queue:         rateLimitQueueRef.current,
      markRequest,
      markRequestEnd,
      log,
      onMaxTokens: (ci) => setMaxTokensPages(prev => { const n=[...prev,ci]; maxTokensPagesRef2.current=n; return n; }),
    });
    log(`⚙️ 설정 적용 — RPM: ${cfg.LIMIT_RPM} (슬롯: ${rpmSlot}) / TPM: ${cfg.LIMIT_TPM.toLocaleString()} / 동시처리: ${cfg.CONCURRENCY_LIMIT}`);
    setStatus('processing');
    setPreviewInfo(null);
    cancelRef.current = false;
    activeRequestsRef.current.clear();
    reportRef.current = [];
    setFailedTasks([]);
    setFilesSummary([]); filesSummaryRef.current = [];
    setTabFallbackFiles([]); tabFallbackRef.current = [];
    setMaxTokensPages([]); maxTokensPagesRef2.current = [];
    setSkippedFiles([]); skippedFilesRef.current = [];
    elapsedRef.current = 0;
    setDownloadDone(false);
    setProgress({ current: 0, total: 0, estimate: '' });
    initTracking();

    // [v0.09] globalHeaderRef는 append 모드 전용 (파일 간 헤더 오염 방지)
    const globalHeaderRef = { current: null };
    let current = [];

    if (append && rows.length > 0) {
      current = [...rows];
      if (current.length > 0) globalHeaderRef.current = current[0];
      log('📎 기존 데이터에 이어서 추가합니다.');
    } else {
      clearRows();
      logsRef.current = [];
      log('🆕 AI SOP OCR v0.15 새 작업 시작');
    }

    let allFailedTasks = [];
    let smaQueue = [];
    // [v0.10.1 #5] try/catch 공유 플래그 — catch에서 중복 저장 방지
    let historySaved = false;

    // [v0.10.1 #10] headersCompatible는 모듈 레벨로 이동됨

    try {
      // 전체 청크 수 계산
      const fileTasks = [];
      let totalChunks = 0;
      for (const file of filesArray) {
        if (cancelRef.current) break;
        const base64 = await fileToBase64(file);
        let mimeType = file.type || 'application/pdf';
        if (mimeType.includes('pdf')) {
          const arr = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
          const pdf = await window.pdfjsLib.getDocument({ data: arr }).promise;
          totalChunks += pdf.numPages;
          fileTasks.push({ file, mimeType: supportsWebP ? 'image/webp' : 'image/jpeg', isPdf: true, pdf });
        } else {
          totalChunks += 1;
          fileTasks.push({ file, mimeType, isPdf: false, base64 });
        }
      }

      setProgress({ current: 0, total: totalChunks, estimate: calculateETA([HISTORY_ETA_SEED], totalChunks, cfg.CONCURRENCY_LIMIT) });

      for (const task of fileTasks) {
        if (cancelRef.current) break;
        const fileStart = Date.now();

        // [v0.09] 파일별 독립 헤더 ref
        // append 모드에서 이전 파일과 같은 카드사이면 기존 헤더 힌트 재사용
        const fileHeaderRef = { current: append ? globalHeaderRef.current : null };
        log(`📂 [${task.file.name}] 처리 시작 (헤더: ${fileHeaderRef.current ? '이전 파일 힌트 사용' : '새로 확정'})`);

        const rep = {
          name: task.file.name,
          size: (task.file.size / 1024).toFixed(1) + 'KB',
          start: new Date().toLocaleTimeString(),
          end: '', sec: 0, rows: 0,
          headerFound: false,
          tabFallback: false,
          jsonParsed: 0,
          retries: 0, reason: '',
          inputTokens: 0, outputTokens: 0
        };
        let newFailedTasks = [];
        const totalPages = task.isPdf ? task.pdf.numPages : 1;
        const renderQueue = [];
        let renderDone = false;

        // JIT 렌더링
        let renderError = null;
        const renderProducer = (async () => {
          if (!task.isPdf) {
            renderQueue.push({ base64: task.base64, chunkIndex: 1 });
            return;
          }
          const rawCanvas = document.createElement('canvas');
          const rawCtx = rawCanvas.getContext('2d', { willReadFrequently: true });
          try {
          for (let i = 1; i <= totalPages; i++) {
            if (cancelRef.current) break;
            while (renderQueue.length >= cfg.CONCURRENCY_LIMIT + RENDER_QUEUE_AHEAD) {
              if (cancelRef.current) break;
              await new Promise(r => setTimeout(r, 100));
            }
            if (cancelRef.current) break;

            const page = await task.pdf.getPage(i);
            const vp = page.getViewport({ scale: 300/72, rotation: (page.rotate + globalRotation) % 360 });
            rawCanvas.width = vp.width;
            rawCanvas.height = vp.height;
            rawCtx.clearRect(0, 0, rawCanvas.width, rawCanvas.height);

            // Step 1: 그레이스케일 렌더링
            rawCtx.filter = 'grayscale(1)';
            await page.render({ canvasContext: rawCtx, viewport: vp }).promise;
            rawCtx.filter = 'none';

            // Step 2: 밝기 분석
            const brightness = analyzeBrightness(rawCtx, rawCanvas.width, rawCanvas.height);
            const { contrast, brightness: bright, label } = getAdaptiveFilter(brightness);
            log(`🖼️ [페이지 ${i}] 전처리: 밝기 ${Math.round(brightness)} (${label}) → contrast(${contrast}) brightness(${bright})`);

            // Step 3: 적응형 대비 재적용
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = vp.width;
            finalCanvas.height = vp.height;
            const finalCtx = finalCanvas.getContext('2d');
            finalCtx.filter = `contrast(${contrast}) brightness(${bright})`;
            finalCtx.drawImage(rawCanvas, 0, 0);
            finalCtx.filter = 'none';

            const base64 = finalCanvas.toDataURL(task.mimeType, supportsWebP ? 0.85 : 0.9).split(',')[1];
            finalCanvas.width = 0; finalCanvas.height = 0;
            if (page.cleanup) page.cleanup();

            renderQueue.push({ base64, chunkIndex: i });
          }
          } catch(e) {
            renderError = e;
            log(`❌ [${task.file.name}] PDF 렌더링 오류: ${e.message}`);
          } finally {
            rawCanvas.width = 0; rawCanvas.height = 0;
          }
        })();
        renderProducer.finally(() => { renderDone = true; });

        // 병렬 처리
        // 1페이지 단독 선처리 → 헤더 확정 → 2페이지~ 병렬 처리
        const executing = new Set();
        const chunkPromises = [];
        // [Fix 2] 헤더 충돌 시 이 파일 전체를 건너뛰기 위한 플래그
        let skipFile = false;

        for (let j = 0; j < totalPages; j++) {
          if (cancelRef.current) break;
          if (renderError) { log(`⚠️ [${task.file.name}] 렌더 에러로 남은 페이지 건너뜀`); break; }
          while (renderQueue.length === 0) {
            if (cancelRef.current || renderDone) break;
            await new Promise(r => setTimeout(r, 100));
          }
          if (cancelRef.current || (renderDone && renderQueue.length === 0)) break;

          const item = renderQueue.shift();

          // 1페이지: 힌트 없이 단독 처리. 완료까지 대기하여 헤더 확정.
          if (item.chunkIndex === 1) {
            log(`📋 [${task.file.name}] 1페이지 선처리 — 헤더 확정 대기 중...`);
            // [v0.09] 파일 1페이지는 항상 힌트 없이 처리해 헤더 새로 확정
            const res = await executeChunk(item.base64, task.mimeType, 1, task.file.name, null, cfg.LIMIT_OUTPUT_TOKENS);
            const tempFailed = [];
            const tempRep = { rows: 0, retries: 0, reason: '', headerFound: false, tabFallback: false, jsonParsed: 0, inputTokens: 0, outputTokens: 0 };
            processResults([{ ...res, index: 0 }], current, fileHeaderRef, tempFailed, tempRep);
            rep.rows += tempRep.rows;
            rep.retries += tempRep.retries;
            rep.headerFound = tempRep.headerFound;
            rep.tabFallback = tempRep.tabFallback;
            rep.jsonParsed = (rep.jsonParsed || 0) + (tempRep.jsonParsed || 0);
            rep.inputTokens = (rep.inputTokens || 0) + (tempRep.inputTokens || 0);
            rep.outputTokens = (rep.outputTokens || 0) + (tempRep.outputTokens || 0);
            if (tempFailed.length) newFailedTasks.push(...tempFailed);
            if (res.duration) { smaQueue.push(res.duration); if (smaQueue.length > SMA_WINDOW) smaQueue.shift(); }
            setProgress(prev => {
              const next = prev.current + 1;
              return { ...prev, current: next, estimate: calculateETA(smaQueue, prev.total - next, cfg.CONCURRENCY_LIMIT) };
            });

            // [Fix 2] 헤더 호환성 검사 — 충돌 시 이 파일만 건너뜀 (기존 데이터 보존)
            if (fileHeaderRef.current) {
              if (globalHeaderRef.current && !headersCompatible(globalHeaderRef.current, fileHeaderRef.current)) {
                log(`⚠️ [${task.file.name}] 서식 충돌: 기존 데이터와 헤더가 다릅니다. 이 파일은 병합하지 않고 건너뜁니다.`);
                setSkippedFiles(prev => { const n = [...prev, task.file.name]; skippedFilesRef.current = n; return n; }); // [v0.09.1] UI 경고 배너용
                skipFile = true;
                break; // 내부 페이지(j) 루프 탈출 → 외부에서 skipFile 체크
              }
              globalHeaderRef.current = fileHeaderRef.current;
            }

            if (!cancelRef.current) saveRows([...current]);
            log(`📋 [${task.file.name}] 헤더 확정: ${fileHeaderRef.current ? JSON.stringify(fileHeaderRef.current).substring(0, 80) + '...' : '미감지'}`);
            continue;
          }

          // 2페이지~: 이 파일에서 확정된 헤더 힌트 사용 (globalHeaderRef 아닌 fileHeaderRef)
          const knownHeader = fileHeaderRef.current;
          const p = executeChunk(item.base64, task.mimeType, item.chunkIndex, task.file.name, knownHeader, cfg.LIMIT_OUTPUT_TOKENS).then(res => {
            executing.delete(p);
            if (res.duration) {
              smaQueue.push(res.duration);
              if (smaQueue.length > SMA_WINDOW) smaQueue.shift();
            }
            setProgress(prev => {
              const next = prev.current + 1;
              const rem = prev.total - next;
              return { ...prev, current: next, estimate: calculateETA(smaQueue, rem, cfg.CONCURRENCY_LIMIT) };
            });
            return { ...res, index: j };
          });
          chunkPromises.push(p);
          executing.add(p);
          if (executing.size >= cfg.CONCURRENCY_LIMIT) await Promise.race(executing);
        }

        // [Fix 2] 헤더 충돌 파일: 기존 데이터 안전하게 보존한 채 다음 파일로
        if (skipFile) continue;

        await renderProducer;
        const resolved = (await Promise.all(chunkPromises)).sort((a,b) => a.index - b.index);
        processResults(resolved, current, fileHeaderRef, newFailedTasks, rep);

        // Promise.all 완료 후 전역 헤더 동기화
        if (fileHeaderRef.current && !globalHeaderRef.current) {
          globalHeaderRef.current = fileHeaderRef.current;
          log(`📋 [${task.file.name}] 전역 헤더 후기 동기화: ${JSON.stringify(fileHeaderRef.current).substring(0, 80)}...`);
        }
        // [v0.12 #1] Promise.all 이후 충돌 재검사
        if (fileHeaderRef.current && globalHeaderRef.current && fileHeaderRef.current !== globalHeaderRef.current) {
          if (!headersCompatible(globalHeaderRef.current, fileHeaderRef.current)) {
            log(`⚠️ [${task.file.name}] 서식 충돌(후기감지): 이 파일을 건너뜁니다.`);
            setSkippedFiles(prev => {
              if (prev.includes(task.file.name)) return prev;
              const n = [...prev, task.file.name]; skippedFilesRef.current = n; return n;
            });
          } else {
            globalHeaderRef.current = fileHeaderRef.current;
          }
        }

        allFailedTasks = [...allFailedTasks, ...newFailedTasks];
        saveRows([...current]);

        rep.end = new Date().toLocaleTimeString();
        rep.sec = Math.round((Date.now() - fileStart) / 1000);
        reportRef.current.push(rep);
        setFilesSummary(prev => { const n = [...prev, { name: task.file.name, pages: totalPages, rows: rep.rows }]; filesSummaryRef.current = n; return n; });
        if (rep.tabFallback) setTabFallbackFiles(prev => { const n = [...prev, task.file.name]; tabFallbackRef.current = n; return n; });
        log(`🏁 [${task.file.name}] 완료 — ${rep.rows}행 추출 (탭폴백: ${rep.tabFallback ? 'O' : 'X'})`);
      }

      setFailedTasks(allFailedTasks);
      if (!cancelRef.current) {
        if (current.length === 0 && allFailedTasks.length === 0) throw new Error('추출된 데이터가 없습니다.');
        setStatus('success');
        await persistHistoryEntry('completed', current);
        historySaved = true;
      } else {
        // 취소된 경우도 이력에 남김 (감사추적)
        await persistHistoryEntry('cancelled', current);
        historySaved = true;
      }
    } catch(e) {
      if (!cancelRef.current) {
        log(`❌ 오류: ${e.message}`);
        setErrorMsg(e.message);
        setStatus('error');
        await persistHistoryEntry('error', current, e.message);
      } else {
        // 취소 중 예외 발생 — 아직 이력 저장 안 된 경우만 저장
        try {
          if (!historySaved) await persistHistoryEntry('cancelled', current);
        } catch(e) { console.warn('[취소 중 이력 저장 실패]', e); }
      }
    } finally {
      clearInterval(timerRef.current);
    }
  };

  // 재시도
  const handleRetryFailed = async () => {
    if (!failedTasks.length) return;
    setStatus('processing');
    cancelRef.current = false;
    activeRequestsRef.current.clear();
    initTracking();
    let smaQueue = [];
    const globalHeaderRef = { current: rows.length > 0 ? rows[0] : null };
    let current = [...rows];

    // [v0.15] GeminiClient 재생성
    const rpmR = Math.max(1, settings.LIMIT_RPM - 2);
    rateLimitQueueRef.current = new SlidingWindowQueue(rpmR, 60000);
    rateLimitQueueRef.current.logFn = log;
    clientRef.current = new GeminiClient(apiKey, {
      cancelRef, activeRequestsRef,
      queue:         rateLimitQueueRef.current,
      markRequest:   markRequest,
      markRequestEnd:markRequestEnd,
      log,
      onMaxTokens: (ci) => setMaxTokensPages(prev => { const n=[...prev,ci]; maxTokensPagesRef2.current=n; return n; }),
    });

    try {
      const tasksToRetry = [...failedTasks];
      setFailedTasks([]);
      setProgress({ current: 0, total: tasksToRetry.length, estimate: calculateETA([HISTORY_ETA_SEED], tasksToRetry.length, settings.CONCURRENCY_LIMIT) });

      let newFailedTasks = [];
      log(`♻️ 누락 ${tasksToRetry.length}개 청크 재시도 시작...`);

      const executing = new Set();
      const chunkPromises = [];

      for (let j = 0; j < tasksToRetry.length; j++) {
        if (cancelRef.current) break;
        const task = tasksToRetry[j];
        // [Fix 1] 실패 당시 저장해둔 파일 고유 헤더를 그대로 주입
        // (globalHeaderRef 사용 시 다른 카드사 헤더가 오염될 수 있음)
        const knownHeader = task.knownHeader ?? null;
        // [v0.10 #2] outputTokenLimit 누락 수정 — 사용자 설정값 적용
        const p = executeChunk(task.base64, task.mimeType, task.chunkIndex, task.fileName, knownHeader, settings.LIMIT_OUTPUT_TOKENS).then(res => {
          executing.delete(p);
          if (res.duration) { smaQueue.push(res.duration); if (smaQueue.length > SMA_WINDOW) smaQueue.shift(); }
          setProgress(prev => {
            const next = prev.current + 1;
            return { ...prev, current: next, estimate: calculateETA(smaQueue, prev.total - next, settings.CONCURRENCY_LIMIT) };
          });
          return { ...res, index: j, task, _taskHeader: task.knownHeader ?? null };
        });
        chunkPromises.push(p);
        executing.add(p);
        if (executing.size >= settings.CONCURRENCY_LIMIT) await Promise.race(executing);
      }

      const resolved = (await Promise.all(chunkPromises)).sort((a,b) => a.index - b.index);
      const rep = { name: `재시도 (${resolved.length}개)`, size: '', start: new Date().toLocaleTimeString(), end: '', sec: 0, rows: 0, retries: 0, reason: '', headerFound: false, tabFallback: false, jsonParsed: 0, inputTokens: 0, outputTokens: 0 };
      // [v0.12 #3] 각 청크를 독립 헤더로 처리
      for (const res of resolved) {
        const fhr = { current: res._taskHeader ?? (rows.length > 0 ? rows[0] : null) };
        processResults([res], current, fhr, newFailedTasks, rep);
      }
      rep.end = new Date().toLocaleTimeString();
      if (rep.rows > 0) reportRef.current.push(rep);
      saveRows([...current]);
      setFailedTasks(newFailedTasks);
      log(`🏁 재시도 완료 — ${rep.rows}행 추가, ${newFailedTasks.length}건 재실패`);
      if (!cancelRef.current) {
        setStatus('success');
        // [v0.10.2 N2] 재시도 완료 후 이력 저장
        await persistHistoryEntry('completed', current);

    } catch(e) {
      // [v0.10.2 L1] 예외 발생 시 부분 결과 보존
      if (current.length > 0) saveRows([...current]);

  // 엑셀 다운로드
  // [v0.10] extractColIdxs/evaluateRowWarnings 헬퍼 사용 — downloadLog와 단일 소스 공유
  const download = () => {
    if (!rows.length) return;
    const cardHeader = CardHeader.from(rows[0]);
    if (!cardHeader) return;
    const seenKeys = new Set();
    const exportRows = [
      cardHeader.toReviewSheetRow(),
      ...rows.slice(1).map(row => new TransactionRow(row, cardHeader).toReviewSheetRow(seenKeys)),
    ];
    const ws = XLSX.utils.aoa_to_sheet(exportRows);
    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let R = range.s.r; R <= range.e.r; ++R) {
      for (let C = range.s.c; C <= range.e.c; ++C) {
        const addr = XLSX.utils.encode_cell({ c: C, r: R });
        const cell = ws[addr]; if (!cell) continue;
        const cv = TransactionRow.toSheetCell(cell.v);
        cell.v=cv.v; cell.t=cv.t; if(cv.z) cell.z=cv.z;
      }
    }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '카드내역_RAW');
    XLSX.writeFile(wb, fileStamp() + '.xlsx');
    const warnCount = exportRows.slice(1).filter(r => r[r.length-1] !== '').length;
    const warnA = exportRows.slice(1).filter(r => r[r.length-1].includes('결제금액 누락')).length;
    const warnB = exportRows.slice(1).filter(r => r[r.length-1].includes('데이터 유실')).length;
    const warnC = exportRows.slice(1).filter(r => r[r.length-1].includes('중복 행')).length;
    log('💾 엑셀 다운로드 — ' + (rows.length-1) + '행 (시스템 검토 경고: ' + warnCount + '건 [A:' + warnA + ' B:' + warnB + ' C:' + warnC + '])');
        setDownloadDone(true);
    setTimeout(() => setDownloadDone(false), 2500);
  };

  // 리포트 다운로드
  // [v0.10] 시스템 검토 카운트도 extractColIdxs/evaluateRowWarnings 공용 헬퍼 사용
  const downloadLog = () => {
    if (!logsRef.current.length) return;
    let txt = `================================================\n        [ AI SOP OCR v0.15 작업 리포트 ]\n================================================\n\n`;
    reportRef.current.forEach((r, i) => {
      txt += `📄 [${i+1}] ${r.name} (${r.size})\n`;
      txt += `  - 시간: ${r.start} ~ ${r.end} (${r.sec}초)\n`;
      txt += `  - 추출: ${r.rows}행 / 헤더감지: ${r.headerFound ? 'O' : 'X'}\n`;
      txt += `  - JSON파싱: ${r.jsonParsed}행 / 탭폴백: ${r.tabFallback ? 'O' : 'X'}\n`;
      txt += `  - 재시도: ${r.retries}회 / finishReason: ${r.reason}\n`;
      txt += `  - 토큰: 입력 ${(r.inputTokens||0).toLocaleString()} / 출력 ${(r.outputTokens||0).toLocaleString()}\n`;
      txt += `-------------------------------------------------\n`;
    });
    txt += `\n▶ 총 소요: ${elapsed}초\n`;
    txt += `▶ 총 API 호출: ${grandTotalReqRef.current}회\n\n`;
    txt += `▶ 트래픽 최고치\n`;

    txt += `  - 최대 TPM: ${maxTpmRef.current.toLocaleString()}\n`;
    txt += `  - 최대 출력토큰: ${maxOutputTokensRef.current.toLocaleString()}\n`;
    if (rows.length > 1) {
      const ch=CardHeader.from(rows[0]); const sk=new Set(); let cA=0,cB=0,cC=0;
      if(ch){for(let i=1;i<rows.length;i++){const w=new TransactionRow(rows[i],ch).systemReviewWarnings(sk);if(w.includes('결제금액 누락 의심'))cA++;if(w.includes('데이터 유실 의심'))cB++;if(w.includes('중복 행 의심'))cC++;}}
      txt += `\n▶ 시스템 검토 경고\n`;
      txt += `  - 조건A (결제금액 누락): ${cA}건\n`;

      txt += `  - 합계: ${cA+cB+cC}건\n`;
    }
    txt += `\n=== 실행 로그 ===\n` + logsRef.current.join('\n');

    const url = URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' }));
    const a = document.createElement('a');
    a.href = url; a.download = `${fileStamp()}.txt`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 150);
  };

  // [v0.10] 이력 항목 리포트 재다운로드
  const downloadHistoryReport = (entry) => {

    (entry.report || []).forEach((r, i) => {

    txt += `\n=== 실행 로그 ===\n` + (entry.logs || []).join('\n');

    const fn = `sop015_history_${dt.getFullYear()}${pad(dt.getMonth()+1)}${pad(dt.getDate())}_${pad(dt.getHours())}${pad(dt.getMinutes())}.txt`;
    const url = URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' }));

                <button
                  onClick={() => { setShowHistory(false); setHistoryDetail(null); }}
                  className="btn-ghost mono text-[9px] px-2 py-1 rounded"
                >닫기</button>
              </div>
            </div>

            {history.length === 0 && (
              <div className="mono text-[11px] text-[#b0ccbb] text-center py-8">
                _ 저장된 이력이 없습니다
              </div>
            )}

            {/* 이력 목록 */}
            {!historyDetail && history.length > 0 && (
              <div className="space-y-2 max-h-[400px] overflow-y-auto scrollbar">
                {history.map((h) => {
                  const dt = new Date(h.completedAt);
                  const statusColor = h.status === 'completed' ? 'accent'
                                    : h.status === 'cancelled' ? 'orange'
                                    : 'warn';
                  const statusLabel = h.status === 'completed' ? '완료'
                                    : h.status === 'cancelled' ? '취소'
                                    : '오류';
                  return (
                    <div key={h.id} className="border border-[#b0ccbb] bg-[#dceee5] rounded-lg p-3">
                      <div className="flex items-center justify-between mb-1.5">
                        <div className="flex items-center gap-2">
                          <span className={`mono text-[9px] px-1.5 py-0.5 rounded ${statusColor} bg-white border border-current`}>{statusLabel}</span>
                          <span className="mono text-[10px] text-[#4a7a62]">
                            {dt.toLocaleDateString()} {dt.toLocaleTimeString().slice(0,5)}
                          </span>
                        </div>
                        <div className="mono text-[10px] accent font-bold">{h.totalRows}행</div>
                      </div>
                      <div className="mono text-[9px] text-[#8aad9a] mb-2 truncate">
                        {h.filesSummary?.length > 0
                          ? h.filesSummary.map(f => f.name).join(', ').substring(0, 60)
                          : '(파일 정보 없음)'}
                        {h.filesSummary?.length > 0 && ` · ${h.filesSummary.length}개 파일`}
                      </div>
                      <div className="flex gap-1">
                        <button
                          onClick={() => setHistoryDetail(h)}
                          className="btn-ghost mono text-[9px] flex-1 py-1 rounded"
                        >상세</button>
                        <button
                          onClick={() => downloadHistoryReport(h)}
                          className="btn-report mono text-[9px] flex-1 py-1 rounded"
                        >리포트</button>
                        <button
                          onClick={() => handleDeleteHistory(h.id)}
                          className="btn-ghost mono text-[9px] px-2 py-1 rounded text-[#c0392b] border-[#c0392b30]"
                        >삭제</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* 이력 상세 */}
            {historyDetail && (
              <div className="space-y-3 slide-up">
                <button
                  onClick={() => setHistoryDetail(null)}
                  className="mono text-[10px] text-[#8aad9a] hover:accent"
                >← 목록으로</button>

                <div className="border border-[#b0ccbb] bg-[#dceee5] rounded-lg p-3">
                  <div className="mono text-[10px] accent font-bold mb-2">
                    {new Date(historyDetail.completedAt).toLocaleString()}
                  </div>
                  <div className="grid grid-cols-2 gap-2 mono text-[10px] text-[#4a7a62]">
                    {/* [v0.10.2 N3] 영문 status → 한글 표시 */}
                    <div>상태: <span className="accent">{historyDetail.status === 'completed' ? '완료' : historyDetail.status === 'cancelled' ? '취소' : '오류'}</span></div>
                    <div>총 행수: <span className="accent">{historyDetail.totalRows}</span></div>
                    <div>소요 시간: <span className="accent">{historyDetail.elapsed}초</span></div>
                    <div>API 호출: <span className="accent">{historyDetail.traffic?.totalRequests || 0}회</span></div>
                  </div>
                  {historyDetail.errorMessage && (
                    <div className="mt-2 mono text-[10px] warn">⚠️ {historyDetail.errorMessage}</div>
                  )}
                </div>

                {historyDetail.filesSummary?.length > 0 && (
                  <div className="border border-[#b0ccbb] bg-[#dceee5] rounded-lg p-3">
                    <div className="mono text-[9px] text-[#8aad9a] uppercase tracking-widest mb-1.5">파일</div>
                    {historyDetail.filesSummary.map((f, i) => (
                      <div key={i} className="mono text-[10px] text-[#4a7a62] flex justify-between">
                        <span className="truncate max-w-[60%]">{f.name}</span>
                        <span className="text-[#8aad9a]">{f.pages}p · <span className="accent">{f.rows}행</span></span>
                      </div>
                    ))}
                  </div>
                )}

                {historyDetail.logs?.length > 0 && (
                  <div className="border border-[#b0ccbb] bg-[#dceee5] rounded-lg p-3">
                    <div className="mono text-[9px] text-[#8aad9a] uppercase tracking-widest mb-1.5">로그 (마지막 20줄)</div>
                    <div className="space-y-0.5 max-h-40 overflow-y-auto scrollbar">
                      {historyDetail.logs.slice(-20).map((l, i) => (
                        <div key={i} className="mono text-[9px] text-[#4a7a62] leading-relaxed">{l}</div>
                      ))}
                    </div>
                  </div>
                )}

                <button
                  onClick={() => downloadHistoryReport(historyDetail)}
                  className="btn-report w-full mono text-[11px] py-2.5 rounded-lg"
                >리포트 다운로드</button>
              </div>
            )}
          </div>
        )}

        {/* 메인 카드 */}
        <div className="terminal-border rounded-xl p-6 bg-[#e8f2ec]">

          {/* API Key */}
          <div className="mb-6">
            <label className="mono text-[10px] text-[#8aad9a] uppercase tracking-[3px] flex items-center gap-2 mb-2">
              <Icons.Key className="w-3 h-3"/> API_KEY
            </label>
            <input
              type="password"
              value={apiKey}
              onChange={e => {
                const v = e.target.value;
                setApiKey(v);
                if (apiKeyDebounceRef.current) clearTimeout(apiKeyDebounceRef.current);
                apiKeyDebounceRef.current = setTimeout(() => {
                  try { localStorage.setItem('sop_api_key', v); } catch(err){}
                }, 200);
              }}
              placeholder="Vertex AI API Key"
              className="w-full rounded-lg py-3 px-4 text-sm"
            />
          </div>

          {/* 로딩 */}
          {(status === 'loading' || status === 'preview_loading') && (
            <div className="flex flex-col items-center py-16 gap-4">
              <Icons.Spinner className="w-8 h-8 accent animate-spin"/>
              <div className="mono text-[11px] text-[#8aad9a] tracking-widest">
                {status === 'loading' ? 'INITIALIZING ENGINE...' : 'GENERATING PREVIEW...'}
              </div>
            </div>
          )}

          {/* 미리보기 */}
          {status === 'preview' && previewInfo && (
            <div className="space-y-5 slide-up">
              <div className="mono text-[10px] text-[#8aad9a] uppercase tracking-[3px]">// 문서 방향 확인</div>
              <div className="bg-[#d6e8df] terminal-border rounded-lg p-4 flex flex-col items-center gap-4">
                <div className="w-full h-[50vh] max-h-[360px] flex items-center justify-center overflow-hidden rounded-lg bg-[#cde0d5]">
                  <img
                    src={previewInfo.dataUrl}
                    alt="preview"
                    className="max-w-[85%] max-h-[85%] transition-transform duration-500 origin-center"
                    style={{ transform: `rotate(${previewInfo.rotation}deg)` }}
                  />
                </div>
                <div className="flex gap-4">
                  <button onClick={() => setPreviewInfo(p => ({...p, rotation: (p.rotation-90+360)%360}))} className="btn-ghost mono text-[11px] rounded-lg px-4 py-2.5 flex items-center gap-2">
                    <Icons.RotateLeft className="w-4 h-4"/> 좌회전
                  </button>
                  <button onClick={() => setPreviewInfo(p => ({...p, rotation: (p.rotation+90)%360}))} className="btn-ghost mono text-[11px] rounded-lg px-4 py-2.5 flex items-center gap-2">
                    우회전 <Icons.RotateRight className="w-4 h-4"/>
                  </button>
                </div>
              </div>
              <button
                onClick={() => startProcessing(previewInfo.filesArray, previewInfo.rotation)}
                className="btn-primary w-full py-4 rounded-lg mono text-sm tracking-wider"
              >
                이 방향으로 시작 →
              </button>
              <button
                onClick={() => { setStatus('idle'); setPreviewInfo(null); }}
                className="w-full btn-ghost mono text-[11px] py-3 rounded-lg"
              >
                취소
              </button>
            </div>
          )}

          {/* 대기 */}
          {status === 'idle' && (
            <div className="space-y-4 slide-up">
              <label className="flex items-center gap-3 cursor-pointer group">
                <input
                  type="checkbox"
                  checked={append}
                  onChange={e => setAppend(e.target.checked)}
                  className="w-4 h-4 accent-checkbox"
                />
                <span className="mono text-[11px] text-[#555] group-hover:text-[#888] transition-colors">
                  기존 데이터에 이어 붙이기 (여러 파일 합산 시)
                </span>
              </label>

              <div
                className={`border-2 border-dashed rounded-xl p-14 text-center cursor-pointer transition-all flex flex-col items-center gap-4
                  ${isDragging ? 'border-[#2d7a56] bg-[#cde0d5]' : 'border-[#b0ccbb] hover:border-[#8aad9a]'}`}
                onDragOver={e => { e.preventDefault(); setIsDragging(true); }}
                onDragLeave={e => { e.preventDefault(); setIsDragging(false); }}
                onDrop={e => { e.preventDefault(); setIsDragging(false); if (e.dataTransfer.files?.length) prepareUpload(Array.from(e.dataTransfer.files)); }}
                onClick={() => fileRef.current?.click()}
              >
                <Icons.Upload className={`w-10 h-10 transition-colors ${isDragging ? 'accent' : 'text-[#b0ccbb]'}`}/>
                <div>
                  <div className="mono text-sm text-[#4a7a62] mb-1">PDF 또는 이미지 드래그 & 드롭</div>
                  <div className="mono text-[10px] text-[#8aad9a]">클릭하여 파일 선택 · 다중 선택 가능</div>
                </div>
                <input ref={fileRef} type="file" className="hidden" multiple accept="application/pdf,image/*" onChange={handleFiles}/>
              </div>

              {rows.length > 1 && (
                <button onClick={resetAll} className="w-full btn-danger mono text-[11px] py-3 rounded-lg flex items-center justify-center gap-2">
                  <Icons.Trash className="w-3.5 h-3.5"/> 데이터 초기화
                </button>
              )}
            </div>
          )}

          {/* 처리 중 */}
          {status === 'processing' && (
            <div className="space-y-6 py-4 slide-up">
              <div>
                <div className="mono text-[10px] accent uppercase tracking-[3px] mb-1 flex items-center gap-2">
                  <span className="blink">■</span> PROCESSING
                </div>
                <div className="text-[#152b20] text-xl font-bold mb-4">1-Pass 추출 파이프라인 가동 중</div>
                {progress.total > 0 && (
                  <div>
                    <div className="progress-bar mb-2">
                      <div className="progress-fill" style={{ width: `${pct}%` }}/>
                    </div>
                    <div className="flex justify-between mono text-[10px] text-[#8aad9a]">
                      <span>{progress.total}장 중 <span className="accent font-bold">{progress.current}장</span> 완료 ({pct}%)</span>
                      {progress.estimate && <span className="accent-dim">{progress.estimate}</span>}
                    </div>
                  </div>
                )}
              </div>
              <div className="flex justify-between items-center">
                <div className="mono text-[10px] text-[#8aad9a]">경과 시간</div>
                <div className="mono text-[#4a7a62]">{elapsed}s</div>
              </div>
              <MonitorUI liveStats={liveStats} settings={settings} grandTotalReq={grandTotalReqRef.current} status={status}/>
              <button onClick={handleCancel} className="w-full btn-danger mono text-[11px] py-3 rounded-lg">
                작업 취소
              </button>
            </div>
          )}

          {/* 완료 */}
          {status === 'success' && (
            <div className="space-y-4 slide-up">
              {/* 완료 배너 */}
              <div className="border border-[#b0ccbb] bg-[#dceee5] rounded-lg p-4 flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <Icons.Check className="w-6 h-6 accent"/>
                  <div>
                    <div className="mono text-[10px] accent uppercase tracking-widest">완료</div>
                    <div className="mono text-[11px] text-[#8aad9a] mt-0.5">{elapsed}초 소요</div>
                  </div>
                </div>
                <div className="mono text-2xl font-bold accent">{rows.length - 1} <span className="text-sm text-[#8aad9a] font-normal">rows</span></div>
              </div>

              {/* 파일 요약 */}
              {filesSummary.length > 0 && (
                <div className="border border-[#b0ccbb] bg-[#dceee5] rounded-lg p-3 space-y-1">
                  {filesSummary.map((f, i) => (
                    <div key={i} className="mono text-[10px] text-[#4a7a62] flex justify-between">
                      <span className="truncate max-w-[60%]">{f.name}</span>
                      <span className="text-[#8aad9a]">{f.pages}p · <span className="accent font-bold">{f.rows}행</span></span>
                    </div>
                  ))}
                </div>
              )}

              {/* 탭폴백 경고 */}
              {tabFallbackFiles.length > 0 && (
                <div className="border border-[#e07a2f40] bg-[#fdf3ec] rounded-lg p-3 flex items-center gap-3">
                  <Icons.Warning className="w-4 h-4 orange shrink-0"/>
                  <div className="mono text-[10px] orange">
                    탭 폴백 사용됨 — JSON 파싱 실패 파일: {tabFallbackFiles.join(', ')}
                  </div>
                </div>
              )}

              {/* [v0.09.1] 헤더 충돌로 스킵된 파일 경고 */}
              {skippedFiles.length > 0 && (
                <div className="border border-[#c0392b30] bg-[#fdf0ee] rounded-lg p-3 flex items-start gap-3">
                  <Icons.Warning className="w-4 h-4 warn shrink-0 mt-0.5"/>
                  <div>
                    <div className="mono text-[10px] warn font-bold mb-1">서식 충돌 — 병합 제외된 파일</div>
                    <div className="mono text-[10px] text-[#8aad9a]">
                      아래 파일은 기존 데이터와 헤더가 달라 이어붙이기에서 제외되었습니다.<br/>
                      단독으로 다시 업로드하거나 초기화 후 처리해 주세요.
                    </div>
                    <div className="mt-1.5 space-y-0.5">
                      {skippedFiles.map((f, i) => (
                        <div key={i} className="mono text-[10px] warn">· {f}</div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* MAX_TOKENS 경고 */}
              {maxTokensPages.length > 0 && (
                <div className="border border-[#e07a2f40] bg-[#fdf3ec] rounded-lg p-3 flex items-center gap-3">
                  <Icons.Warning className="w-4 h-4 orange shrink-0"/>
                  <div className="mono text-[10px] orange">
                    출력토큰 한도 도달 — 페이지 {maxTokensPages.join(', ')} 원본 대조 권장
                  </div>
                </div>
              )}

              {/* 실패 청크 */}
              {failedTasks.length > 0 && (
                <div className="border border-[#c0392b30] bg-[#fdf0ee] rounded-lg p-4 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <Icons.Warning className="w-5 h-5 warn"/>
                    <div>
                      <div className="mono text-[11px] warn">페이지 누락</div>
                      <div className="mono text-[10px] text-[#8aad9a]">{failedTasks.length}개 청크 실패</div>
                    </div>
                  </div>
                  <button onClick={handleRetryFailed} className="btn-ghost mono text-[10px] px-4 py-2 rounded-lg flex items-center gap-2 text-[#e07a2f] border-[#e07a2f40]">
                    <Icons.Retry className="w-3.5 h-3.5"/> 재시도
                  </button>
                </div>
              )}

              <MonitorUI liveStats={liveStats} settings={settings} grandTotalReq={grandTotalReqRef.current} status={status}/>

              {/* 엑셀 다운로드 */}
              <button onClick={download} className={`btn-primary w-full py-4 rounded-lg mono text-sm tracking-wider flex items-center justify-center gap-3 ${downloadDone ? 'done' : ''}`}>
                {downloadDone ? '✅ 다운로드 완료' : <><Icons.Download className="w-5 h-5"/> 엑셀 다운로드</>}
              </button>

              <div className="grid grid-cols-3 gap-2">
                {/* [v0.10.1 #6] "새 작업" = 데이터 즉시 삭제 + idle */}
                <button onClick={resetAll} className="btn-ghost mono text-[11px] py-3 rounded-lg">새 작업</button>
                <button onClick={downloadLog} className="btn-report mono text-[11px] py-3 rounded-lg">리포트</button>
                {/* [v0.10.1 #6] "설정 초기화" = 사용자 설정을 기본값으로 복원 */}
                <button
                  onClick={() => setConfirmDialog({
                    title: '설정 초기화',
                    message: `API 한도 설정을 기본값으로 되돌립니까?\n(RPM: ${DEFAULT_SETTINGS.LIMIT_RPM} / 동시처리: ${DEFAULT_SETTINGS.CONCURRENCY_LIMIT})`,
                    confirmLabel: '초기화',
                    cancelLabel: '취소',
                    danger: false,
                    onConfirm: () => {
                      // [v0.10.2 N1] 직접 참조 대신 스프레드 — 상태 객체 불변성 보장
                      setSettings({...DEFAULT_SETTINGS});
                      saveSettings({...DEFAULT_SETTINGS});
                      setSettingsDraft({...DEFAULT_SETTINGS});
                      log('⚙️ 설정이 기본값으로 초기화되었습니다.');
                      setConfirmDialog(null);
                    }
                  })}
                  className="btn-ghost mono text-[11px] py-3 rounded-lg"
                >설정 초기화</button>
              </div>
            </div>
          )}

          {/* 오류 */}
          {status === 'error' && (
            <div className="space-y-4 slide-up">
              <div className="border border-[#c0392b30] bg-[#fdf0ee] rounded-lg p-5">
                <div className="mono text-[10px] warn uppercase tracking-[3px] mb-3 flex items-center gap-2">
                  <Icons.Warning className="w-4 h-4"/> ERROR
                </div>
                <div className="mono text-[11px] warn break-all">{errorMsg}</div>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <button onClick={() => {
                  // [v0.10 #13] 진행 중 요청 abort 정리
                  activeRequestsRef.current.forEach(c => { try { c.abort(); } catch(e) {} });
                  activeRequestsRef.current.clear();
                  setStatus('idle');
                  setLiveStats({rpm:0,tpm:0,maxOutputTokens:0});
                  usageHistoryRef.current=[];
                  grandTotalReqRef.current=0;
                }} className="btn-ghost mono text-[11px] py-3 rounded-lg">돌아가기</button>
                <button onClick={downloadLog} className="btn-report mono text-[11px] py-3 rounded-lg">로그 저장</button>
              </div>
            </div>
          )}
        </div>

        {/* 로그 패널 */}
        <div className="terminal-border rounded-xl p-5 bg-[#e8f2ec]">
          <div className="flex items-center justify-between mb-3">
            <div className="mono text-[10px] text-[#8aad9a] uppercase tracking-[3px]">// System Logs</div>
            <button onClick={downloadLog} className="btn-report mono text-[9px] px-3 py-1.5 rounded-md">
              리포트 저장
            </button>
          </div>
          <div className="h-52 overflow-y-auto space-y-1 scrollbar">
            {logs.length === 0 && <div className="mono text-[10px] text-[#b0ccbb]">_ 로그 대기 중</div>}
            {logs.map((l, i) => (
              <div key={i} className={`mono text-[10px] leading-relaxed
                ${i === 0 ? 'accent font-bold' : ''}
                ${i !== 0 && (l.includes('❌') || l.includes('⚠️')) ? 'warn' : ''}
                ${i !== 0 && l.includes('⏳') ? 'orange' : ''}
                ${i !== 0 && !l.includes('❌') && !l.includes('⚠️') && !l.includes('⏳') ? 'text-[#8aad9a]' : ''}
              `}>{l}</div>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
</html>
