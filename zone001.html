/**

 * 완전 오프라인 | PDF.js + OpenCV.js + Tesseract.js + SheetJS
 *
 * [파이프라인]
 * 1. 파일 업로드 → PDF.js 렌더 → OpenCV 전처리(기울기/밝기/이진화)
 * 2. Zone 설정 UI: 세로선 드래그, 실시간 bbox 교차 감지(초록/빨간)

 *    - 카드사 템플릿 프리셋
 *    - 회전 조정 가능
 * 3. Zonal OCR: Zone별 이미지 절단 → Tesseract 개별 인식
 *    - 날짜 Zone이 Row 기준점 (Y좌표)
 *    - 날짜 패턴 불일치 행 자동 폐기
 *    - 금액 Zone OCR 오타 자동 치환
 * 4. 엑셀 내보내기 (SheetJS) + 시스템 검토 컬럼 (A/B/C 조건)
 */

// ── 유틸 ───────────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2, '0');
const stamp = () => { const d = new Date(); return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`; };
const DB_NAME = 'ZonalOCR';
const STORE_NAME = 'data';

const isDateStr = (str) => {
  if (!str || str.trim().length < 3) return false;
  return CONFIG.DATE_PATTERNS.some(p => p.test(str.trim()));
};

// 금액 OCR 오타 치환 (금액 Zone 전용)
const fixAmountOCR = (str) => {
  if (!str) return str;
  return str
    .replace(/[Ss]/g, '5')
    .replace(/[Oo]/g, '0')
    .replace(/[lIi|]/g, '1')
    .replace(/[Bb]/g, '8')
    .replace(/\./g, ',')   // 4.500 → 4,500
    .replace(/[^0-9,\-]/g, '');
};

// isRealMoney (sop004에서 계승)
const isRealMoney = (str) => {
  if (typeof str !== 'string' || str.trim() === '') return false;
  const s = str.trim();
  if (s.includes('/') || s.includes('-')) return false;
  if (s !== '0' && /^0\d/.test(s)) return false;
  const noComma = s.replace(/,/g, '');
  if (!s.includes(',') && /^\d+$/.test(noComma) && noComma.length >= 10) return false;
  return /^-?\d{1,3}(,\d{3})*(\.\d+)?$/.test(s) || /^-?\d+(\.\d+)?$/.test(s);
};

// ── useDB ──────────────────────────────────────────────────────────────────────
function useDB(key, init) {
  const [data, setData] = useState(init);
  const dbRef = useRef(null);
  const initRef = useRef(init);
  useEffect(() => {
    try {
      if (!window.indexedDB) return;
      const req = window.indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
      };
      req.onsuccess = e => {
        dbRef.current = e.target.result;
        const g = dbRef.current.transaction(STORE_NAME,'readonly').objectStore(STORE_NAME).get(key);
        g.onsuccess = () => { if (g.result !== undefined) setData(g.result); };
      };
    } catch(e) { console.warn('IndexedDB 차단:', e); }
  }, [key]);
  const save = useCallback(d => {
    setData(d);
    try { if (dbRef.current) dbRef.current.transaction(STORE_NAME,'readwrite').objectStore(STORE_NAME).put(d, key); } catch(e) {}
  }, [key]);
  const clear = useCallback(() => {
    setData(initRef.current);
    try { if (dbRef.current) dbRef.current.transaction(STORE_NAME,'readwrite').objectStore(STORE_NAME).delete(key); } catch(e) {}
  }, [key]);
  return [data, save, clear];
}

// ── ErrorBoundary ──────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(e) { return { hasError: true, error: e }; }
  render() {
    if (this.state.hasError) return (
      <div style={{background:'#d6e8df',color:'#c0392b',padding:'3rem',minHeight:'100vh',fontFamily:'IBM Plex Mono,monospace'}}>
        <div style={{color:'#1e6644',marginBottom:'1rem',fontSize:'12px',letterSpacing:'3px'}}>SYSTEM ERROR</div>
        <pre style={{fontSize:'12px'}}>{this.state.error?.toString()}</pre>
      </div>
    );
    return this.props.children;
  }
}

// ── OpenCV 전처리 ──────────────────────────────────────────────────────────────
const preprocessWithOpenCV = (canvas) => {
  // OpenCV.js 로드 확인
  if (!window.cv || !window.cv.imread) return canvas;
  const cv = window.cv;
  try {
    const src = cv.imread(canvas);
    const dst = new cv.Mat();

    // 1. 그레이스케일
    cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);

    // 2. 가우시안 블러 (노이즈 제거)
    const blurred = new cv.Mat();
    cv.GaussianBlur(dst, blurred, new cv.Size(3, 3), 0);

    // 3. 적응형 이진화 (지역 얼룩/그림자 대응)
    const binary = new cv.Mat();
    cv.adaptiveThreshold(blurred, binary, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY, 31, 10);

    // 4. Morphology CLOSE (글자 획 끊김 복원)
    const kernel = cv.getStructuringElement(cv.MORPH_RECT, new cv.Size(2, 2));
    const morphed = new cv.Mat();
    cv.morphologyEx(binary, morphed, cv.MORPH_CLOSE, kernel);

    // 5. Hough 기울기 보정
    const edges = new cv.Mat();
    cv.Canny(morphed, edges, 50, 150);
    const lines = new cv.Mat();
    cv.HoughLinesP(edges, lines, 1, Math.PI / 180, 80, canvas.width * 0.3, 20);

    let angleSum = 0, angleCount = 0;
    for (let i = 0; i < lines.rows; i++) {
      const [x1, y1, x2, y2] = [lines.data32S[i*4], lines.data32S[i*4+1], lines.data32S[i*4+2], lines.data32S[i*4+3]];
      const angle = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
      // 수평선만 (±10도 이내)
      if (Math.abs(angle) < 10) { angleSum += angle; angleCount++; }
    }

    let resultMat = morphed;
    if (angleCount > 0) {
      const medianAngle = angleSum / angleCount;
      if (Math.abs(medianAngle) > 0.3) {
        const cx = canvas.width / 2, cy = canvas.height / 2;
        const M = cv.getRotationMatrix2D(new cv.Point(cx, cy), medianAngle, 1.0);
        const rotated = new cv.Mat();
        cv.warpAffine(morphed, rotated, M, new cv.Size(canvas.width, canvas.height), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar(255, 255, 255));
        resultMat = rotated;
        M.delete();
      }
    }

    // 결과를 캔버스에 출력
    const outCanvas = document.createElement('canvas');
    outCanvas.width = canvas.width;
    outCanvas.height = canvas.height;
    cv.imshow(outCanvas, resultMat);

    // 메모리 해제
    [src, dst, blurred, binary, morphed, kernel, edges, lines].forEach(m => { try { m.delete(); } catch(e){} });
    if (resultMat !== morphed) { try { resultMat.delete(); } catch(e){} }

    return outCanvas;
  } catch(err) {
    console.warn('OpenCV 전처리 실패, 원본 사용:', err);
    return canvas;
  }
};

// Canvas 없이 기본 밝기 분석 + 필터 (OpenCV 없을 때 폴백)
const preprocessBasic = (srcCanvas) => {
  const w = srcCanvas.width, h = srcCanvas.height;
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width = w; tmpCanvas.height = h;
  const ctx = tmpCanvas.getContext('2d', { willReadFrequently: true });

  // 그레이스케일
  ctx.filter = 'grayscale(1)';
  ctx.drawImage(srcCanvas, 0, 0);
  ctx.filter = 'none';

  // 밝기 분석
  const sample = ctx.getImageData(Math.floor(w*0.1), Math.floor(h*0.15), Math.floor(w*0.8), Math.floor(h*0.35)).data;
  let sum = 0;
  for (let i = 0; i < sample.length; i += 4) sum += sample[i];
  const brightness = sum / (sample.length / 4);

  let contrast, bright;
  if (brightness < 85)       { contrast = 1.8; bright = 1.3; }
  else if (brightness < 170) { contrast = 1.5; bright = 1.1; }
  else                       { contrast = 1.3; bright = 1.0; }

  const out = document.createElement('canvas');
  out.width = w; out.height = h;
  const outCtx = out.getContext('2d');
  outCtx.filter = `contrast(${contrast}) brightness(${bright})`;
  outCtx.drawImage(tmpCanvas, 0, 0);
  outCtx.filter = 'none';
  return out;
};

const preprocess = (canvas) => {
  if (window.cv && window.cv.imread) return preprocessWithOpenCV(canvas);
  return preprocessBasic(canvas);
};

// ── Tesseract 래퍼 ─────────────────────────────────────────────────────────────
// Tesseract.js v4 CDN API
const getTessWorker = (() => {
  let worker = null;
  let initPromise = null;
  return async (logFn) => {
    if (worker) return worker;
    if (initPromise) return initPromise;
    initPromise = (async () => {
      if (logFn) logFn('🔤 Tesseract 워커 초기화 중...');
      const w = await Tesseract.createWorker(CONFIG.TESS_LANG, 1, {
        logger: () => {},
      });
      await w.setParameters({
        tessedit_pageseg_mode: CONFIG.TESS_PSM_ZONE,
        preserve_interword_spaces: '1',
      });
      worker = w;
      if (logFn) logFn('✅ Tesseract 워커 준비 완료');
      return w;
    })();
    return initPromise;
  };
})();

// Zone 이미지 잘라서 Tesseract 인식
const recognizeZone = async (srcCanvas, x1, x2, charWhitelist) => {
  const w = x2 - x1;
  const h = srcCanvas.height;
  if (w <= 2) return { words: [], text: '' };

  const zCanvas = document.createElement('canvas');
  zCanvas.width = w; zCanvas.height = h;
  const zCtx = zCanvas.getContext('2d');
  zCtx.drawImage(srcCanvas, x1, 0, w, h, 0, 0, w, h);

  const tess = await getTessWorker();
  if (charWhitelist) {
    await tess.setParameters({ tessedit_char_whitelist: charWhitelist });
  } else {
    await tess.setParameters({ tessedit_char_whitelist: '' });
  }

  const { data } = await tess.recognize(zCanvas);
  zCanvas.width = 0; zCanvas.height = 0;

  // words 배열: { text, bbox: {x0,y0,x1,y1} }
  const words = (data.words || [])
    .filter(w => w.text.trim().length > 0)
    .map(w => ({
      text: w.text.trim(),
      y: (w.bbox.y0 + w.bbox.y1) / 2,
      x: (w.bbox.x0 + w.bbox.x1) / 2,
      conf: w.confidence,
    }));

  return { words, text: data.text };
};

// 헤더 행 Tesseract 인식 (전체 이미지 상단)
const recognizeHeader = async (srcCanvas) => {
  // 상단 20%만 잘라서 인식
  const h = Math.floor(srcCanvas.height * 0.25);
  const hCanvas = document.createElement('canvas');
  hCanvas.width = srcCanvas.width; hCanvas.height = h;
  const ctx = hCanvas.getContext('2d');
  ctx.drawImage(srcCanvas, 0, 0, srcCanvas.width, h, 0, 0, srcCanvas.width, h);

  const tess = await getTessWorker();
  await tess.setParameters({
    tessedit_pageseg_mode: '3', // 자동
    tessedit_char_whitelist: '',
  });
  const { data } = await tess.recognize(hCanvas);
  hCanvas.width = 0; hCanvas.height = 0;
  return data;
};

// ── Y 클러스터링 → 행 조립 ─────────────────────────────────────────────────────
const clusterByY = (words, tolerance) => {
  if (!words.length) return [];
  const sorted = [...words].sort((a, b) => a.y - b.y);
  const clusters = [];
  let cur = [sorted[0]];
  for (let i = 1; i < sorted.length; i++) {
    if (Math.abs(sorted[i].y - cur[cur.length - 1].y) <= tolerance) {
      cur.push(sorted[i]);
    } else {
      clusters.push(cur);
      cur = [sorted[i]];
    }
  }
  clusters.push(cur);
  return clusters;
};

// ── 행 조립: 날짜 Zone 기준 + 나머지 Zone 매핑 ────────────────────────────────
const assembleRows = (zoneResults, dateZoneIdx, columns, dateTolerance) => {
  // zoneResults: [{ words: [{text, y, conf}] }] (Zone 순서대로)
  // dateZoneIdx: 날짜 Zone 인덱스

  const dateWords = zoneResults[dateZoneIdx]?.words || [];
  // 날짜 패턴 필터
  const dateRows = dateWords.filter(w => isDateStr(w.text));
  if (!dateRows.length) return [];

  const rows = [];
  for (const dw of dateRows) {
    const row = new Array(columns.length).fill('');
    row[dateZoneIdx] = dw.text;

    // 다른 Zone에서 같은 Y좌표 ± tolerance 범위 단어 매핑
    for (let z = 0; z < zoneResults.length; z++) {
      if (z === dateZoneIdx) continue;
      const zWords = zoneResults[z]?.words || [];
      // 가장 가까운 Y 단어들 모아서 합치기
      const matched = zWords
        .filter(w => Math.abs(w.y - dw.y) <= dateTolerance)
        .sort((a, b) => a.x - b.x);
      if (matched.length > 0) {
        row[z] = matched.map(w => w.text).join(' ');
      }
    }
    rows.push(row);
  }
  return rows;
};

// ── Zone 설정 캔버스 컴포넌트 ──────────────────────────────────────────────────
function ZoneCanvas({ imgDataUrl, dividers, setDividers, bboxes, canvasDisplayWidth }) {
  const canvasRef = useRef(null);
  const [dragging, setDragging] = useState(null); // index of dragging divider
  const imgRef = useRef(null);
  const [imgSize, setImgSize] = useState({ w: 1, h: 1 });

  // 이미지 로드
  useEffect(() => {
    const img = new Image();
    img.onload = () => setImgSize({ w: img.naturalWidth, h: img.naturalHeight });
    img.src = imgDataUrl;
    imgRef.current = img;
  }, [imgDataUrl]);

  // 캔버스 그리기
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || !imgRef.current) return;
    const displayH = Math.round((canvasDisplayWidth / imgSize.w) * imgSize.h);
    canvas.width = canvasDisplayWidth;
    canvas.height = displayH;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(imgRef.current, 0, 0, canvasDisplayWidth, displayH);

    const scaleX = canvasDisplayWidth / imgSize.w;
    const scaleY = displayH / imgSize.h;

    // bbox 그리기 (단어 영역 반투명 표시)
    if (bboxes && bboxes.length) {
      ctx.fillStyle = 'rgba(45,122,86,0.08)';
      for (const b of bboxes) {
        ctx.fillRect(b.x0 * scaleX, b.y0 * scaleY, (b.x1 - b.x0) * scaleX, (b.y1 - b.y0) * scaleY);
      }
    }

    // 세로선 그리기
    for (let i = 0; i < dividers.length; i++) {
      const px = dividers[i] * canvasDisplayWidth;
      // 교차 여부 판정
      const intersects = bboxes && bboxes.some(b => {
        const bx0 = b.x0 * scaleX, bx1 = b.x1 * scaleX;
        return px > bx0 + 2 && px < bx1 - 2;
      });
      ctx.strokeStyle = intersects ? 'rgba(192,57,43,0.85)' : 'rgba(45,122,86,0.85)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(px, 0);
      ctx.lineTo(px, displayH);
      ctx.stroke();
      ctx.setLineDash([]);

      // 핸들 원
      ctx.fillStyle = intersects ? '#c0392b' : '#2d7a56';
      ctx.beginPath();
      ctx.arc(px, 20, 7, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 9px IBM Plex Mono,monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(i + 1, px, 20);
    }
  }, [imgDataUrl, dividers, bboxes, canvasDisplayWidth, imgSize]);

  const getRelX = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return (clientX - rect.left) / rect.width;
  };

  const onMouseDown = (e) => {
    const canvas = canvasRef.current;
    const rx = getRelX(e, canvas);
    // 가장 가까운 세로선 찾기
    let closest = -1, minDist = 0.03;
    for (let i = 0; i < dividers.length; i++) {
      const d = Math.abs(dividers[i] - rx);
      if (d < minDist) { minDist = d; closest = i; }
    }
    if (closest >= 0) {
      setDragging(closest);
      e.preventDefault();
    }
  };

  const onMouseMove = (e) => {
    if (dragging === null) return;
    const canvas = canvasRef.current;
    const rx = Math.max(0.01, Math.min(0.99, getRelX(e, canvas)));
    setDividers(prev => {
      const next = [...prev];
      next[dragging] = rx;
      return next.sort((a, b) => a - b);
    });
    e.preventDefault();
  };

  const onMouseUp = () => setDragging(null);

  return (
    <div style={{ position: 'relative', cursor: dragging !== null ? 'col-resize' : 'default' }}>
      <canvas
        ref={canvasRef}
        style={{ maxWidth: '100%', display: 'block', borderRadius: 8 }}
        onMouseDown={onMouseDown}
        onMouseMove={onMouseMove}
        onMouseUp={onMouseUp}
        onMouseLeave={onMouseUp}
        onTouchStart={onMouseDown}
        onTouchMove={onMouseMove}
        onTouchEnd={onMouseUp}
      />
      <div className="mono text-[9px] text-[#8aad9a] mt-1 text-center">
        선을 드래그해서 컬럼 경계를 조정하세요 | 🟢 안전 🔴 글자 관통 경고
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  // 상태
  const [status, setStatus] = useState('loading'); // loading|idle|zone_setup|processing|success|error
  const [logs, setLogs] = useState([]);
  const [rows, saveRows, clearRows] = useDB('rows', []);
  const [errorMsg, setErrorMsg] = useState('');
  const [elapsed, setElapsed] = useState(0);
  const [isDragging, setIsDragging] = useState(false);
  const [progress, setProgress] = useState({ current: 0, total: 0, phase: '' });
  const [downloadDone, setDownloadDone] = useState(false);
  const [filesSummary, setFilesSummary] = useState([]);
  const [enginesReady, setEnginesReady] = useState({ pdfjs: false, opencv: false, tesseract: false });

  // Zone 설정 상태
  const [zoneSetup, setZoneSetup] = useState(null);
  /*
    zoneSetup: {
      pdf,              // pdfjsLib PDF 객체
      totalPages,
      globalRotation,   // 0|90|180|270
      currentPage,      // 현재 검토 중인 페이지 (1-based)
      confirmedPages,   // {pageNum: {dividers, columns}} 확정된 페이지들
      lastDividers,     // 직전 확정 세로선 비율 배열
      lastColumns,      // 직전 확정 컬럼명 배열
      previewDataUrl,   // 현재 페이지 미리보기 (스케일다운)
      processedCanvas,  // 전처리 완료 캔버스 (OCR용, 300DPI)
      bboxes,           // [{x0,y0,x1,y1}] Tesseract 단어 bbox
      dividers,         // 현재 편집 중인 세로선 비율 배열
      columns,          // 현재 편집 중인 컬럼명 배열
      headerSuggestion, // Tesseract가 읽은 헤더 제안
      isScanning,       // 백그라운드 Tesseract 스캔 중
      autoMode,         // 1페이지 이후 자동 통과 모드
      file,             // 원본 File 객체
      dateColIdx,       // 날짜 컬럼 인덱스
    }
  */

  const fileRef = useRef(null);
  const cancelRef = useRef(false);
  const timerRef = useRef(null);
  const logsRef = useRef([]);
  const reportRef = useRef([]);

  const log = useCallback((msg) => {
    const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logsRef.current.push(line);
    setLogs(prev => [line, ...prev].slice(0, 150));
  }, []);

  // ── 엔진 로딩 ────────────────────────────────────────────────────────────────
  useEffect(() => {
    let mounted = true;
    const inject = (src) => new Promise((res, rej) => {
      if (document.querySelector(`script[src="${src}"]`)) return res();
      const s = document.createElement('script');
      s.src = src; s.onload = res; s.onerror = () => rej(new Error(`로드 실패: ${src}`));
      document.body.appendChild(s);
    });

    const load = async () => {
      try {
        log('⚡ Zonal OCR v0.01 엔진 초기화 중...');

        // PDF.js
        log('📄 PDF.js 로딩 중...');
        await inject('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
        if (window.pdfjsLib)
          window.pdfjsLib.GlobalWorkerOptions.workerSrc =
            'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        if (mounted) setEnginesReady(p => ({ ...p, pdfjs: true }));
        log('✅ PDF.js 준비 완료');

        // OpenCV.js
        log('🔬 OpenCV.js 로딩 중... (약 30~60초)');
        await new Promise((res, rej) => {
          if (window.cv && window.cv.imread) { res(); return; }
          const s = document.createElement('script');
          s.src = 'https://docs.opencv.org/4.8.0/opencv.js';
          s.async = true;
          s.onload = () => {
            // cv.onRuntimeInitialized 대기
            if (window.cv && window.cv.imread) { res(); return; }
            window.cv.onRuntimeInitialized = res;
          };
          s.onerror = () => {
            log('⚠️ OpenCV.js 로드 실패 → 기본 전처리로 폴백');
            res(); // 실패해도 계속
          };
          document.body.appendChild(s);
          setTimeout(res, 60000); // 60초 타임아웃
        });
        if (mounted) setEnginesReady(p => ({ ...p, opencv: true }));
        log(`✅ OpenCV ${window.cv && window.cv.imread ? '활성화' : '폴백(기본 전처리)'}`);

        // Tesseract.js
        log('🔤 Tesseract.js 로딩 중...');
        await inject('https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js');
        if (mounted) setEnginesReady(p => ({ ...p, tesseract: true }));
        log('✅ Tesseract.js 준비 완료 (언어팩은 첫 인식 시 자동 다운로드)');

        log('🚀 모든 엔진 준비 완료. 파일을 업로드하세요.');
        if (mounted) setStatus('idle');
      } catch(e) {
        if (mounted) { log(`❌ 엔진 로드 실패: ${e.message}`); setErrorMsg(e.message); setStatus('error'); }
      }
    };
    load();
    return () => { mounted = false; };
  }, [log]);

  // ── 파일 업로드 → Zone 설정 진입 ─────────────────────────────────────────────
  const prepareZoneSetup = async (filesArray) => {
    if (!filesArray.length) return;
    cancelRef.current = false;

    const file = filesArray[0]; // 단일 파일
    if (!file.type.includes('pdf') && !file.type.includes('image')) {
      setErrorMsg('PDF 또는 이미지 파일만 지원합니다.');
      setStatus('error');
      return;
    }

    setStatus('loading');
    log(`📂 [${file.name}] Zone 설정 준비 중...`);

    try {
      let pdf = null, totalPages = 1;

      if (file.type.includes('pdf')) {
        const b64 = await new Promise((res, rej) => {
          const r = new FileReader(); r.readAsDataURL(file);
          r.onload = () => res(r.result.split(',')[1]); r.onerror = rej;
        });
        const arr = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        pdf = await window.pdfjsLib.getDocument({ data: arr }).promise;
        totalPages = pdf.numPages;
      }

      // 1페이지 렌더 + 전처리
      const { processedCanvas, previewDataUrl, rawCanvas } = await renderPage(pdf, file, 1, 0);

      // 백그라운드 Tesseract 스캔 시작
      log('🔍 Tesseract 헤더 스캔 중...');

      // Zone 설정 초기화 (삼성카드 기본 템플릿)
      const defaultTemplate = CARD_TEMPLATES['삼성카드'];

      setZoneSetup({
        pdf, totalPages, globalRotation: 0,
        currentPage: 1,
        confirmedPages: {},
        lastDividers: [...defaultTemplate.dividerRatios],
        lastColumns: [...defaultTemplate.columns],
        previewDataUrl,
        processedCanvas,
        bboxes: [],
        dividers: [...defaultTemplate.dividerRatios],
        columns: [...defaultTemplate.columns],
        headerSuggestion: null,
        isScanning: true,
        autoMode: false,
        file,
        dateColIdx: 0,
      });

      setStatus('zone_setup');

      // 백그라운드 헤더 스캔
      recognizeHeader(processedCanvas).then(data => {
        const suggested = extractColumnNames(data, defaultTemplate.dividerRatios, processedCanvas.width);
        setZoneSetup(prev => prev ? {
          ...prev,
          headerSuggestion: suggested,
          columns: suggested.length >= 2 ? suggested : prev.columns,
          isScanning: false,
        } : null);
        log(`✅ 헤더 스캔 완료: [${suggested.join(', ')}]`);
      }).catch(e => {
        log(`⚠️ 헤더 스캔 실패: ${e.message}`);
        setZoneSetup(prev => prev ? { ...prev, isScanning: false } : null);
      });

    } catch(e) {
      log(`❌ 준비 오류: ${e.message}`);
      setErrorMsg(e.message);
      setStatus('error');
    }
  };

  // ── 페이지 렌더 + 전처리 ─────────────────────────────────────────────────────
  const renderPage = async (pdf, file, pageNum, rotation) => {
    let rawCanvas;
    if (pdf) {
      const page = await pdf.getPage(pageNum);
      const vp = page.getViewport({ scale: CONFIG.RENDER_SCALE, rotation: (page.rotate + rotation) % 360 });
      rawCanvas = document.createElement('canvas');
      rawCanvas.width = vp.width; rawCanvas.height = vp.height;
      const ctx = rawCanvas.getContext('2d', { willReadFrequently: true });
      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      if (page.cleanup) page.cleanup();
    } else {
      // 이미지 파일
      const b64 = await new Promise((res, rej) => {
        const r = new FileReader(); r.readAsDataURL(file);
        r.onload = () => res(r.result); r.onerror = rej;
      });
      const img = new Image();
      await new Promise(res => { img.onload = res; img.src = b64; });
      rawCanvas = document.createElement('canvas');
      rawCanvas.width = img.naturalWidth; rawCanvas.height = img.naturalHeight;
      rawCanvas.getContext('2d').drawImage(img, 0, 0);
    }

    // OpenCV 전처리
    const processedCanvas = preprocess(rawCanvas);

    // 미리보기용 스케일다운 (표시용)
    const previewW = Math.min(processedCanvas.width, 1200);
    const previewH = Math.round((previewW / processedCanvas.width) * processedCanvas.height);
    const pvCanvas = document.createElement('canvas');
    pvCanvas.width = previewW; pvCanvas.height = previewH;
    pvCanvas.getContext('2d').drawImage(processedCanvas, 0, 0, previewW, previewH);
    const previewDataUrl = pvCanvas.toDataURL('image/jpeg', 0.85);
    pvCanvas.width = 0; pvCanvas.height = 0;

    return { processedCanvas, previewDataUrl, rawCanvas };
  };

  // ── Tesseract 헤더에서 컬럼명 추출 ──────────────────────────────────────────
  const extractColumnNames = (tessData, dividerRatios, imgWidth) => {
    // 단어들을 X 좌표 기준으로 정렬해 Zone별로 그룹화
    const words = (tessData.words || [])
      .filter(w => w.text.trim().length > 0 && w.confidence > 30)
      .map(w => ({ text: w.text.trim(), cx: (w.bbox.x0 + w.bbox.x1) / 2 }))
      .sort((a, b) => a.cx - b.cx);

    const boundaries = [0, ...dividerRatios.map(r => r * imgWidth), imgWidth];
    const zoneTexts = boundaries.slice(0, -1).map((left, i) => {
      const right = boundaries[i + 1];
      const zWords = words.filter(w => w.cx >= left && w.cx < right);
      return zWords.map(w => w.text).join('').replace(/\s+/g, '');
    });

    return zoneTexts.map(t => t || '');
  };

  // ── Zone 설정: 교차 여부 판정 ────────────────────────────────────────────────
  const checkIntersections = useCallback((dividers, bboxes, canvasW) => {
    return dividers.map(r => {
      const px = r * canvasW;
      return bboxes.some(b => px > b.x0 + 2 && px < b.x1 - 2);
    });
  }, []);

  // ── Zone 확정 & 다음 페이지 ──────────────────────────────────────────────────
  const confirmPageAndNext = useCallback(async () => {
    if (!zoneSetup) return;
    const { currentPage, totalPages, confirmedPages, dividers, columns, pdf, file, globalRotation, autoMode } = zoneSetup;

    // 현재 페이지 확정
    const newConfirmed = {
      ...confirmedPages,
      [currentPage]: { dividers: [...dividers], columns: [...columns] },
    };

    log(`✅ 페이지 ${currentPage} Zone 확정 (${columns.join(' | ')})`);

    // 마지막 페이지면 OCR 시작
    if (currentPage >= totalPages) {
      setZoneSetup(prev => ({ ...prev, confirmedPages: newConfirmed }));
      startOCR(newConfirmed);
      return;
    }

    // 다음 페이지로
    const nextPage = currentPage + 1;
    log(`📄 페이지 ${nextPage}/${totalPages} 렌더 중...`);
    setZoneSetup(prev => ({ ...prev, isScanning: true }));

    try {
      const { processedCanvas, previewDataUrl } = await renderPage(pdf, file, nextPage, globalRotation);

      // 자동 모드: Tesseract로 bbox 먼저 얻기
      const w = await getTessWorker(log);
      await w.setParameters({ tessedit_pageseg_mode: '6', tessedit_char_whitelist: '' });
      const { data } = await w.recognize(processedCanvas);
      const bboxes = (data.words || [])
        .filter(wd => wd.text.trim().length > 0)
        .map(wd => ({ x0: wd.bbox.x0, y0: wd.bbox.y0, x1: wd.bbox.x1, y1: wd.bbox.y1 }));

      // 세로선 교차 여부 확인
      const intersections = checkIntersections(dividers, bboxes, processedCanvas.width);
      const hasIntersection = intersections.some(Boolean);

      if (!hasIntersection) {
        // 이상 없음: 자동 통과
        log(`⚡ 페이지 ${nextPage} 이상 없음 → 자동 통과`);
        const autoConfirmed = {
          ...newConfirmed,
          [nextPage]: { dividers: [...dividers], columns: [...columns] },
        };
        setZoneSetup(prev => ({
          ...prev,
          currentPage: nextPage,
          confirmedPages: autoConfirmed,
          processedCanvas,
          previewDataUrl,
          bboxes,
          isScanning: false,
          lastDividers: [...dividers],
          lastColumns: [...columns],
        }));
        // 재귀로 다음 페이지 처리
        setTimeout(() => {
          setZoneSetup(prev => {
            if (!prev) return null;
            // 마지막이면 OCR 시작
            if (nextPage >= totalPages) {
              startOCR(autoConfirmed);
              return prev;
            }
            return prev;
          });
        }, 50);
        // 자동으로 다음 페이지 처리 계속
        if (nextPage < totalPages) {
          // 재귀 대신 직접 다음 페이지 처리
          await processNextPageAuto(nextPage, totalPages, autoConfirmed, dividers, columns, pdf, file, globalRotation, w);
        } else {
          startOCR(autoConfirmed);
        }
      } else {
        // 이상 있음: 정지하고 사용자 확인 요청
        log(`⚠️ 페이지 ${nextPage} 세로선 교차 감지 → 확인 필요`);
        setZoneSetup(prev => ({
          ...prev,
          currentPage: nextPage,
          confirmedPages: newConfirmed,
          processedCanvas,
          previewDataUrl,
          bboxes,
          isScanning: false,
          lastDividers: [...dividers],
          lastColumns: [...columns],
        }));
      }
    } catch(e) {
      log(`❌ 페이지 ${nextPage} 렌더 오류: ${e.message}`);
      setZoneSetup(prev => prev ? { ...prev, isScanning: false } : null);
    }
  }, [zoneSetup, checkIntersections, log]);

  // 자동 통과 연속 처리
  const processNextPageAuto = async (fromPage, totalPages, confirmedSoFar, dividers, columns, pdf, file, rotation, tessWorker) => {
    let confirmed = { ...confirmedSoFar };

    for (let p = fromPage + 1; p <= totalPages; p++) {
      if (cancelRef.current) break;
      log(`📄 페이지 ${p}/${totalPages} 자동 스캔 중...`);

      try {
        const { processedCanvas, previewDataUrl } = await renderPage(pdf, file, p, rotation);
        const { data } = await tessWorker.recognize(processedCanvas);
        const bboxes = (data.words || [])
          .filter(w => w.text.trim().length > 0)
          .map(w => ({ x0: w.bbox.x0, y0: w.bbox.y0, x1: w.bbox.x1, y1: w.bbox.y1 }));

        const intersections = checkIntersections(dividers, bboxes, processedCanvas.width);
        const hasIntersection = intersections.some(Boolean);

        if (!hasIntersection) {
          log(`⚡ 페이지 ${p} 이상 없음 → 자동 통과`);
          confirmed[p] = { dividers: [...dividers], columns: [...columns] };

          if (p === totalPages) {
            startOCR(confirmed);
            return;
          }
        } else {
          log(`⚠️ 페이지 ${p} 세로선 교차 → 사용자 확인 필요`);
          setZoneSetup(prev => ({
            ...prev,
            currentPage: p,
            confirmedPages: confirmed,
            processedCanvas,
            previewDataUrl,
            bboxes,
            dividers: [...dividers],
            columns: [...columns],
            isScanning: false,
          }));
          return; // 사용자 확인 대기
        }
      } catch(e) {
        log(`⚠️ 페이지 ${p} 자동 스캔 오류: ${e.message} → 수동 확인`);
        break;
      }
    }
  };

  // ── 회전 처리 ─────────────────────────────────────────────────────────────────
  const handleRotate = useCallback(async (dir) => {
    if (!zoneSetup) return;
    const newRot = (zoneSetup.globalRotation + (dir === 'left' ? -90 : 90) + 360) % 360;
    log(`🔄 ${newRot}도 회전 → 1페이지 재렌더`);
    setZoneSetup(prev => ({ ...prev, isScanning: true }));
    try {
      const { processedCanvas, previewDataUrl } = await renderPage(
        zoneSetup.pdf, zoneSetup.file, 1, newRot
      );
      const w = await getTessWorker(log);
      const { data } = await w.recognize(processedCanvas);
      const bboxes = (data.words || [])
        .filter(wd => wd.text.trim().length > 0)
        .map(wd => ({ x0: wd.bbox.x0, y0: wd.bbox.y0, x1: wd.bbox.x1, y1: wd.bbox.y1 }));
      setZoneSetup(prev => ({
        ...prev,
        globalRotation: newRot,
        currentPage: 1,
        confirmedPages: {},
        processedCanvas,
        previewDataUrl,
        bboxes,
        isScanning: false,
      }));
    } catch(e) {
      log(`❌ 회전 오류: ${e.message}`);
      setZoneSetup(prev => prev ? { ...prev, isScanning: false } : null);
    }
  }, [zoneSetup, log]);

  // ── 템플릿 적용 ───────────────────────────────────────────────────────────────
  const applyTemplate = useCallback((name) => {
    const t = CARD_TEMPLATES[name];
    if (!t) return;
    setZoneSetup(prev => prev ? {
      ...prev,
      dividers: [...t.dividerRatios],
      columns: [...t.columns],
    } : null);
    log(`📋 ${name} 템플릿 적용`);
  }, [log]);

  // ── 세로선 추가/삭제 ──────────────────────────────────────────────────────────
  const addDivider = () => setZoneSetup(prev => {
    if (!prev || prev.dividers.length >= 12) return prev;
    // 가장 넓은 구간 중간에 추가
    const divs = [0, ...prev.dividers, 1];
    let maxGap = 0, insertAt = 0.5;
    for (let i = 0; i < divs.length - 1; i++) {
      const gap = divs[i+1] - divs[i];
      if (gap > maxGap) { maxGap = gap; insertAt = (divs[i] + divs[i+1]) / 2; }
    }
    const newDividers = [...prev.dividers, insertAt].sort((a,b) => a - b);
    const newColumns = [...prev.columns];
    const insertIdx = newDividers.indexOf(insertAt);
    newColumns.splice(insertIdx + 1, 0, '');
    return { ...prev, dividers: newDividers, columns: newColumns };
  });

  const removeDivider = (idx) => setZoneSetup(prev => {
    if (!prev || prev.dividers.length <= 1) return prev;
    const newDividers = prev.dividers.filter((_, i) => i !== idx);
    const newColumns = prev.columns.filter((_, i) => i !== idx + 1);
    return { ...prev, dividers: newDividers, columns: newColumns };
  });

  // ── OCR 시작 ──────────────────────────────────────────────────────────────────
  const startOCR = useCallback(async (confirmedPages) => {
    if (!zoneSetup) return;
    const { pdf, file, globalRotation, totalPages } = zoneSetup;
    setStatus('processing');
    setZoneSetup(null);
    cancelRef.current = false;
    reportRef.current = [];
    setProgress({ current: 0, total: totalPages, phase: 'OCR 추출 중' });
    setDownloadDone(false);

    const startTime = Date.now();
    timerRef.current = setInterval(() => setElapsed(Math.floor((Date.now() - startTime) / 1000)), 1000);

    log(`🚀 OCR 시작 — ${totalPages}페이지`);
    const globalHeaderRef = { current: null };
    let current = [];
    const allRows = [];

    try {
      for (let p = 1; p <= totalPages; p++) {
        if (cancelRef.current) break;
        const pageConf = confirmedPages[p] || confirmedPages[Math.max(...Object.keys(confirmedPages).map(Number).filter(k => k <= p))];
        if (!pageConf) { log(`⚠️ 페이지 ${p} Zone 설정 없음 → 건너뜀`); continue; }

        const { dividers, columns } = pageConf;
        log(`⚡ 페이지 ${p}/${totalPages} OCR 중...`);

        // 헤더 설정 (최초)
        if (!globalHeaderRef.current) {
          globalHeaderRef.current = columns;
          current.push(columns);
        }

        // 렌더 + 전처리
        const { processedCanvas } = await renderPage(pdf, file, p, globalRotation);

        // 날짜 컬럼 인덱스 (첫 번째 컬럼 기본)
        const dateColIdx = columns.findIndex(c => /날짜|일자|이용일|거래일|승인일/.test(c));
        const effectiveDateIdx = dateColIdx >= 0 ? dateColIdx : 0;

        // Zone별 경계 계산
        const imgW = processedCanvas.width;
        const boundaries = [0, ...dividers.map(r => r * imgW), imgW];

        // 날짜 컬럼 whitelist
        const dateWhitelist = '0123456789./- ';
        // 금액 컬럼 패턴
        const amountPattern = /금액|원금|결제|합계/;

        // Zone별 병렬 OCR
        const zonePromises = columns.map((col, ci) => {
          const x1 = Math.round(boundaries[ci]);
          const x2 = Math.round(boundaries[ci + 1]);
          const isDate = ci === effectiveDateIdx;
          const isAmount = amountPattern.test(col);
          const whitelist = isDate ? dateWhitelist : isAmount ? '0123456789,.- ' : '';
          return recognizeZone(processedCanvas, x1, x2, whitelist || null);
        });

        const zoneResults = await Promise.all(zonePromises);

        // 금액 Zone OCR 오타 치환
        for (let ci = 0; ci < columns.length; ci++) {
          if (amountPattern.test(columns[ci])) {
            zoneResults[ci].words = zoneResults[ci].words.map(w => ({
              ...w,
              text: fixAmountOCR(w.text),
            })).filter(w => w.text.length > 0);
          }
        }

        // 행 조립
        const pageRows = assembleRows(zoneResults, effectiveDateIdx, columns, CONFIG.Y_TOLERANCE);
        log(`✅ 페이지 ${p} 완료 — ${pageRows.length}행 추출`);

        current = [...current, ...pageRows];
        allRows.push(...pageRows);

        setProgress(prev => ({ ...prev, current: p }));
        setElapsed(Math.floor((Date.now() - startTime) / 1000));

        // 메모리 해제
        processedCanvas.width = 0; processedCanvas.height = 0;
      }

      saveRows(current);
      setFilesSummary([{ name: file.name, pages: totalPages, rows: allRows.length }]);
      log(`🏁 전체 완료 — 총 ${allRows.length}행 추출`);
      if (!cancelRef.current) setStatus('success');
    } catch(e) {
      if (!cancelRef.current) { log(`❌ OCR 오류: ${e.message}`); setErrorMsg(e.message); setStatus('error'); }
    } finally {
      clearInterval(timerRef.current);
    }
  }, [zoneSetup, saveRows, log]);

  // ── 엑셀 다운로드 (sop004 시스템 검토 계승) ──────────────────────────────────
  const download = () => {
    if (!rows.length) return;
    const exportRows = rows.map(r => [...r]);
    exportRows[0] = [...exportRows[0], '⚠️ 시스템 검토'];

    const header = rows[0];
    const amountColIdxs = header.reduce((acc, h, i) => {
      if (/금액|원금|단가|합계/.test(String(h))) acc.push(i);
      return acc;
    }, []);
    const dateIdx   = header.findIndex(h => /날짜|일자|이용일/.test(String(h)));
    const storeIdx  = header.findIndex(h => /가맹점|상호|거래처/.test(String(h)));
    const amountIdx = header.findIndex(h => /원금|결제금액/.test(String(h)));
    const installIdx= header.findIndex(h => /할부|회차/.test(String(h)));
    const seenKeys  = new Set();

    for (let i = 1; i < exportRows.length; i++) {
      const row = exportRows[i];
      const warns = [];
      // 조건 A: 금액 누락
      if (amountColIdxs.length > 0 && amountColIdxs.every(idx => String(row[idx]??'').trim() === '' || String(row[idx]??'').trim() === '0'))
        warns.push('결제금액 누락 의심');
      // 조건 B: 데이터 유실
      if (row.filter(v => String(v??'').trim() !== '').length <= 2)
        warns.push('데이터 유실 의심');
      // 조건 C: 중복
      if (dateIdx >= 0 && storeIdx >= 0 && amountIdx >= 0) {
        const key = [
          String(row[dateIdx]??'').trim(),
          String(row[storeIdx]??'').trim(),
          String(row[amountIdx]??'').trim(),
          installIdx >= 0 ? String(row[installIdx]??'').trim() : '',
        ].join('|');
        if (key.replace(/\|/g,'').length > 0) {
          if (seenKeys.has(key)) warns.push('중복 행 의심');
          else seenKeys.add(key);
        }
      }
      exportRows[i] = [...row, warns.join(', ')];
    }

    const ws = XLSX.utils.aoa_to_sheet(exportRows);
    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let R = range.s.r; R <= range.e.r; R++) {
      for (let C = range.s.c; C <= range.e.c; C++) {
        const addr = XLSX.utils.encode_cell({ c: C, r: R });
        const cell = ws[addr];
        if (!cell) continue;
        if (isRealMoney(cell.v)) {
          const n = Number(String(cell.v).replace(/,/g, ''));
          if (!isNaN(n)) { cell.v = n; cell.t = 'n'; cell.z = '#,##0'; }
        } else { cell.t = 's'; }
      }
    }

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '카드내역_RAW');
    XLSX.writeFile(wb, `zonal_ocr_${stamp()}.xlsx`);
    setDownloadDone(true);
    log(`💾 엑셀 저장 완료 — ${rows.length - 1}행`);
  };

  // ── 리포트 ────────────────────────────────────────────────────────────────────
  const downloadLog = () => {
    if (!logsRef.current.length) return;
    const txt = `=== Zonal OCR v0.01 리포트 ===\n생성: ${new Date().toLocaleString()}\n\n=== 로그 ===\n` + logsRef.current.join('\n');
    const url = URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' }));
    const a = document.createElement('a'); a.href = url; a.download = `zonal_ocr_report_${stamp()}.txt`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 150);
  };

  const handleCancel = () => {
    cancelRef.current = true;
    clearInterval(timerRef.current);
    setStatus('idle'); setZoneSetup(null);
    log('🛑 작업 취소됨');
  };

  const resetAll = () => {
    clearRows(); setStatus('idle'); setZoneSetup(null);
    setFilesSummary([]); setDownloadDone(false);
    logsRef.current = [];
  };

  const pct = progress.total > 0 ? Math.round((progress.current / progress.total) * 100) : 0;

  // ── Zone 설정 화면 ────────────────────────────────────────────────────────────
  const ZoneSetupUI = () => {
    if (!zoneSetup) return null;
    const { currentPage, totalPages, dividers, columns, previewDataUrl, bboxes, isScanning,
            processedCanvas, globalRotation, confirmedPages } = zoneSetup;

    const canvasDisplayWidth = Math.min(window.innerWidth - 80, 700);
    const imgW = processedCanvas?.width || 1;

    // 현재 세로선 교차 여부
    const scaledBboxes = bboxes.map(b => ({
      x0: b.x0 / imgW,
      y0: b.y0,
      x1: b.x1 / imgW,
      y1: b.y1,
    }));
    const confirmCount = Object.keys(confirmedPages).length;
    const remaining = totalPages - confirmCount;

    return (
      <div className="space-y-4 slide-up">
        {/* 진행 표시 */}
        <div className="flex items-center justify-between">
          <div className="mono text-[10px] text-[#8aad9a] uppercase tracking-[3px]">
            // Zone 설정 — 페이지 {currentPage} / {totalPages}
          </div>
          <div className="mono text-[10px] accent">
            확정 {confirmCount} | 남은 {remaining}
          </div>
        </div>

        {/* 템플릿 프리셋 */}
        <div className="flex flex-wrap gap-1.5">
          {Object.keys(CARD_TEMPLATES).map(name => (
            <button key={name} onClick={() => applyTemplate(name)}
              className="btn-ghost mono text-[10px] px-2.5 py-1 rounded-md">
              {name}
            </button>
          ))}
        </div>

        {/* 회전 + 세로선 관리 */}
        <div className="flex items-center gap-2 flex-wrap">
          <button onClick={() => handleRotate('left')} className="btn-ghost mono text-[10px] px-3 py-1.5 rounded-md flex items-center gap-1">
            <Icons.RotateLeft className="w-3.5 h-3.5"/> 좌회전
          </button>
          <button onClick={() => handleRotate('right')} className="btn-ghost mono text-[10px] px-3 py-1.5 rounded-md flex items-center gap-1">
            우회전 <Icons.RotateRight className="w-3.5 h-3.5"/>
          </button>
          <div className="ml-auto flex items-center gap-1.5">
            <button onClick={addDivider} className="btn-ghost mono text-[10px] px-2.5 py-1.5 rounded-md flex items-center gap-1">
              <Icons.Plus className="w-3 h-3"/> 선 추가
            </button>
          </div>
        </div>

        {/* Zone 캔버스 */}
        {previewDataUrl && (
          <div className="terminal-border rounded-lg overflow-hidden bg-[#dceee5]">
            <ZoneCanvas
              imgDataUrl={previewDataUrl}
              dividers={dividers}
              setDividers={newDivs => setZoneSetup(prev => prev ? { ...prev, dividers: newDivs } : null)}
              bboxes={scaledBboxes}
              canvasDisplayWidth={canvasDisplayWidth}
            />
          </div>
        )}

        {/* 컬럼명 편집 */}
        <div className="terminal-border rounded-lg p-3 bg-[#dceee5] space-y-2">
          <div className="mono text-[10px] text-[#8aad9a] uppercase tracking-[2px] flex items-center gap-2">
            <Icons.Columns className="w-3.5 h-3.5"/>
            컬럼명 설정 {isScanning && <span className="text-[#e07a2f] blink">스캔 중...</span>}
          </div>
          <div className="space-y-1.5">
            {columns.map((col, i) => (
              <div key={i} className="flex items-center gap-2">
                <span className="mono text-[10px] text-[#8aad9a] w-5 shrink-0 text-right">{i+1}</span>
                <input
                  type="text"
                  value={col}
                  onChange={e => setZoneSetup(prev => {
                    if (!prev) return null;
                    const nc = [...prev.columns]; nc[i] = e.target.value;
                    return { ...prev, columns: nc };
                  })}
                  placeholder={`컬럼 ${i+1}`}
                  className="col-name-input flex-1"
                />
                {/* 날짜 컬럼 지정 */}
                <button
                  onClick={() => setZoneSetup(prev => prev ? { ...prev, dateColIdx: i } : null)}
                  title="날짜 기준 컬럼으로 지정"
                  className={`mono text-[9px] px-2 py-1 rounded border transition-all ${zoneSetup.dateColIdx === i ? 'bg-[#2d7a56] text-white border-[#2d7a56]' : 'btn-ghost'}`}>
                  날짜
                </button>
                <button onClick={() => removeDivider(i > 0 ? i - 1 : 0)}
                  className="btn-ghost p-1 rounded">
                  <Icons.Minus className="w-3 h-3"/>
                </button>
              </div>
            ))}
          </div>
        </div>

        {/* 확정 버튼 */}
        <button
          onClick={confirmPageAndNext}
          disabled={isScanning}
          className={`btn-primary w-full py-4 rounded-lg mono text-sm tracking-wider flex items-center justify-center gap-2 ${isScanning ? 'opacity-60' : ''}`}>
          {currentPage >= totalPages
            ? `✅ 확정 후 OCR 시작 (${totalPages}페이지)`
            : `다음 페이지 → (${currentPage + 1}/${totalPages})`}
          {!isScanning && <Icons.ArrowRight className="w-4 h-4"/>}
          {isScanning && <Icons.Spinner className="w-4 h-4 animate-spin"/>}
        </button>

        <button onClick={handleCancel} className="w-full btn-ghost mono text-[11px] py-3 rounded-lg text-[#c0392b] border-[#c0392b40]">
          취소
        </button>
      </div>
    );
  };

  // ── 렌더 ──────────────────────────────────────────────────────────────────────
  return (
    <div className="min-h-screen bg-[#d6e8df] grid-bg text-[#4a7a62]">
      <div className="relative z-10 max-w-3xl mx-auto px-4 py-10 space-y-6">

        {/* 헤더 */}
        <header className="flex items-start justify-between">
          <div>
            <div className="mono text-[10px] text-[#8aad9a] tracking-[4px] uppercase mb-2">
              // Offline · Zonal OCR · 비용 0원
            </div>
            <h1 className="text-2xl font-bold text-[#152b20] tracking-tight">
              Zonal OCR <span className="mono text-[#8aad9a] text-sm font-normal">v0.01</span>
            </h1>
            <div className="flex gap-3 mt-2">
              {[
                { label: 'PDF.js', ok: enginesReady.pdfjs },
                { label: 'OpenCV', ok: enginesReady.opencv },
                { label: 'Tesseract', ok: enginesReady.tesseract },
              ].map(e => (
                <span key={e.label} className={`mono text-[9px] px-2 py-0.5 rounded border ${e.ok ? 'border-[#2d7a56] text-[#2d7a56] bg-[#dceee5]' : 'border-[#b0ccbb] text-[#b0ccbb]'}`}>
                  {e.label} {e.ok ? '✓' : '…'}
                </span>
              ))}
            </div>
          </div>
          {rows.length > 1 && (
            <div className="terminal-border rounded-lg px-4 py-2 text-right bg-[#e8f2ec]">
              <div className="mono text-[9px] text-[#8aad9a] uppercase tracking-widest">ROWS</div>
              <div className="mono text-xl font-bold accent">{rows.length - 1}</div>
            </div>
          )}
        </header>

        {/* 메인 카드 */}
        <div className="terminal-border rounded-xl p-6 bg-[#e8f2ec]">

          {/* 로딩 */}
          {status === 'loading' && (
            <div className="flex flex-col items-center py-16 gap-4">
              <Icons.Spinner className="w-8 h-8 accent animate-spin"/>
              <div className="mono text-[11px] text-[#8aad9a] tracking-widest">
                {enginesReady.pdfjs && enginesReady.opencv && !enginesReady.tesseract
                  ? 'TESSERACT.JS 로딩 중...'
                  : !enginesReady.opencv
                  ? 'OPENCV.JS 로딩 중... (최초 1회, 약 30~60초)'
                  : 'INITIALIZING...'}
              </div>
              <div className="flex gap-2 mt-2">
                {[
                  { label: 'PDF.js', ok: enginesReady.pdfjs },
                  { label: 'OpenCV', ok: enginesReady.opencv },
                  { label: 'Tesseract', ok: enginesReady.tesseract },
                ].map(e => (
                  <div key={e.label} className="flex items-center gap-1">
                    {e.ok
                      ? <Icons.Check className="w-3.5 h-3.5 accent"/>
                      : <Icons.Spinner className="w-3.5 h-3.5 text-[#b0ccbb] animate-spin"/>}
                    <span className="mono text-[10px] text-[#8aad9a]">{e.label}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* 대기 */}
          {status === 'idle' && (
            <div className="space-y-4 slide-up">
              <div
                className={`border-2 border-dashed rounded-xl p-14 text-center cursor-pointer transition-all flex flex-col items-center gap-4
                  ${isDragging ? 'border-[#2d7a56] bg-[#cde0d5]' : 'border-[#b0ccbb] hover:border-[#8aad9a]'}`}
                onDragOver={e => { e.preventDefault(); setIsDragging(true); }}
                onDragLeave={e => { e.preventDefault(); setIsDragging(false); }}
                onDrop={e => { e.preventDefault(); setIsDragging(false); if (e.dataTransfer.files?.length) prepareZoneSetup(Array.from(e.dataTransfer.files)); }}
                onClick={() => fileRef.current?.click()}>
                <Icons.Upload className={`w-10 h-10 transition-colors ${isDragging ? 'accent' : 'text-[#b0ccbb]'}`}/>
                <div>
                  <div className="mono text-sm text-[#4a7a62] mb-1">PDF 드래그 & 드롭 또는 클릭</div>
                  <div className="mono text-[10px] text-[#8aad9a]">단일 PDF 파일 · 완전 오프라인 처리</div>
                </div>
                <input ref={fileRef} type="file" className="hidden" accept="application/pdf,image/*"
                  onChange={e => { const f = Array.from(e.target.files); if (fileRef.current) fileRef.current.value=''; prepareZoneSetup(f); }}/>
              </div>

              <div className="terminal-border rounded-lg p-4 bg-[#dceee5] space-y-2">
                <div className="mono text-[10px] text-[#4a7a62] font-bold">📋 사용 방법</div>
                <div className="mono text-[10px] text-[#8aad9a] space-y-1 leading-relaxed">
                  <div>1. PDF 업로드 → Zone 설정 화면에서 세로선 조정</div>
                  <div>2. 1페이지 확정 → 이후 이상 페이지만 자동 정지</div>
                  <div>3. 전 페이지 확인 완료 → OCR 자동 시작</div>
                  <div>4. 엑셀 다운로드 (시스템 검토 컬럼 자동 포함)</div>
                </div>
              </div>

              {rows.length > 1 && (
                <button onClick={resetAll} className="w-full btn-danger mono text-[11px] py-3 rounded-lg flex items-center justify-center gap-2">
                  <Icons.Trash className="w-3.5 h-3.5"/> 데이터 초기화
                </button>
              )}
            </div>
          )}

          {/* Zone 설정 */}
          {status === 'zone_setup' && <ZoneSetupUI/>}

          {/* 처리 중 */}
          {status === 'processing' && (
            <div className="space-y-6 py-4 slide-up">
              <div>
                <div className="mono text-[10px] accent uppercase tracking-[3px] mb-1 flex items-center gap-2">
                  <span className="blink">■</span> ZONAL OCR 실행 중
                </div>
                <div className="text-[#152b20] text-xl font-bold mb-4">
                  {progress.phase}
                </div>
                {progress.total > 0 && (
                  <div>
                    <div className="progress-bar mb-2">
                      <div className="progress-fill" style={{ width: `${pct}%` }}/>
                    </div>
                    <div className="flex justify-between mono text-[10px] text-[#8aad9a]">
                      <span>{progress.total}페이지 중 <span className="accent font-bold">{progress.current}페이지</span> 완료 ({pct}%)</span>
                      <span className="accent-dim">{elapsed}초 경과</span>
                    </div>
                  </div>
                )}
              </div>
              <button onClick={handleCancel} className="w-full btn-danger mono text-[11px] py-3 rounded-lg">
                작업 취소
              </button>
            </div>
          )}

          {/* 완료 */}
          {status === 'success' && (
            <div className="space-y-4 slide-up">
              <div className="border border-[#b0ccbb] bg-[#dceee5] rounded-lg p-4 flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <Icons.Check className="w-6 h-6 accent"/>
                  <div>
                    <div className="mono text-[10px] accent uppercase tracking-widest">완료</div>
                    <div className="mono text-[11px] text-[#8aad9a] mt-0.5">{elapsed}초 소요</div>
                  </div>
                </div>
                <div className="mono text-2xl font-bold accent">{rows.length - 1} <span className="text-sm text-[#8aad9a] font-normal">rows</span></div>
              </div>

              {filesSummary.length > 0 && (
                <div className="border border-[#b0ccbb] bg-[#dceee5] rounded-lg p-3 space-y-1">
                  {filesSummary.map((f, i) => (
                    <div key={i} className="mono text-[10px] text-[#4a7a62] flex justify-between">
                      <span className="truncate max-w-[60%]">{f.name}</span>
                      <span className="text-[#8aad9a]">{f.pages}p · <span className="accent font-bold">{f.rows}행</span></span>
                    </div>
                  ))}
                </div>
              )}

              <button onClick={download}
                className={`btn-primary w-full py-4 rounded-lg mono text-sm tracking-wider flex items-center justify-center gap-3 ${downloadDone ? 'done' : ''}`}>
                {downloadDone ? '✅ 다운로드 완료' : <><Icons.Download className="w-5 h-5"/> 엑셀 다운로드</>}
              </button>

              <div className="grid grid-cols-3 gap-2">
                <button onClick={() => { setStatus('idle'); }} className="btn-ghost mono text-[11px] py-3 rounded-lg">새 작업</button>
                <button onClick={downloadLog} className="mono text-[11px] py-3 rounded-lg" style={{background:'#2c3e50',border:'1px solid #4a6272',color:'#a8c4b4'}}>리포트</button>
                <button onClick={resetAll} className="btn-danger mono text-[11px] py-3 rounded-lg">초기화</button>
              </div>
            </div>
          )}

          {/* 오류 */}
          {status === 'error' && (
            <div className="space-y-4 slide-up">
              <div className="border border-[#c0392b30] bg-[#fdf0ee] rounded-lg p-5">
                <div className="mono text-[10px] warn uppercase tracking-[3px] mb-3 flex items-center gap-2">
                  <Icons.Warning className="w-4 h-4"/> ERROR
                </div>
                <div className="mono text-[11px] warn break-all">{errorMsg}</div>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <button onClick={() => setStatus('idle')} className="btn-ghost mono text-[11px] py-3 rounded-lg">돌아가기</button>
                <button onClick={downloadLog} className="mono text-[11px] py-3 rounded-lg" style={{background:'#2c3e50',border:'1px solid #4a6272',color:'#a8c4b4'}}>로그 저장</button>
              </div>
            </div>
          )}
        </div>

        {/* 로그 패널 */}
        <div className="terminal-border rounded-xl p-5 bg-[#e8f2ec]">
          <div className="flex items-center justify-between mb-3">
            <div className="mono text-[10px] text-[#8aad9a] uppercase tracking-[3px]">// System Logs</div>
            <button onClick={downloadLog} className="mono text-[9px] px-3 py-1.5 rounded-md" style={{background:'#2c3e50',border:'1px solid #4a6272',color:'#a8c4b4'}}>
              리포트 저장
            </button>
          </div>
          <div className="h-52 overflow-y-auto space-y-1 scrollbar">
            {logs.length === 0 && <div className="mono text-[10px] text-[#b0ccbb]">_ 로그 대기 중</div>}
            {logs.map((l, i) => (
              <div key={i} className={`mono text-[10px] leading-relaxed
                ${i === 0 ? 'accent font-bold' : ''}
                ${i !== 0 && (l.includes('❌') || l.includes('⚠️')) ? 'warn' : ''}
                ${i !== 0 && l.includes('⏳') ? 'orange' : ''}
                ${i !== 0 && !l.includes('❌') && !l.includes('⚠️') && !l.includes('⏳') ? 'text-[#8aad9a]' : ''}
              `}>{l}</div>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
</html>
