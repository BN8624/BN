const calculateETA = (smaArr, remaining, concurrency) => {
  if (remaining === 0) return '마무리 중...';
  if (!smaArr.length) return '';
  const avg = smaArr.reduce((a,b)=>a+b,0) / smaArr.length;
  const ms = (remaining * avg) / Math.min(concurrency, remaining);
  const sec = Math.ceil(ms / 1000);
  if (sec < 60) return `약 ${sec}초 예상`;
  return `약 ${Math.floor(sec/60)}분 ${sec%60 > 0 ? (sec%60)+'초 ' : ''}예상`;
};

// ── [3단계] 레벤슈타인 거리 유틸 ──────────────────────────────────────────
const getLevenshteinDistance = (a, b) => {
  const matrix = [];
  for (let i = 0; i <= a.length; i++) matrix[i] = [i];
  for (let j = 0; j <= b.length; j++) matrix[0][j] = j;
  for (let i = 1; i <= a.length; i++) {
    for (let j = 1; j <= b.length; j++) {
      matrix[i][j] = Math.min(
        matrix[i - 1][j] + 1,
        matrix[i][j - 1] + 1,
        matrix[i - 1][j - 1] + (a[i - 1] === b[j - 1] ? 0 : 1)
      );
    }
  }
  return matrix[a.length][b.length];
};

const getRowSimilarity = (rowA, rowB) => {
  const sA = rowA.join('|');
  const sB = rowB.join('|');
  const dist = getLevenshteinDistance(sA, sB);
  const maxLen = Math.max(sA.length, sB.length);
  return maxLen === 0 ? 1 : 1 - (dist / maxLen);
};

const analyzeBrightness = (ctx, w, h) => {
  const sx = Math.floor(w * 0.1), sy = Math.floor(h * 0.15);
  const sw = Math.floor(w * 0.8), sh = Math.floor(h * 0.35);
  const data = ctx.getImageData(sx, sy, sw, sh).data;
  let sum = 0;
  for (let i = 0; i < data.length; i += 4) sum += data[i];
  return sum / (data.length / 4);
};

// ── SlidingWindowQueue ────────────────────────────────────────────────────────
class SlidingWindowQueue {
  constructor(limit, windowMs, logFn) {
    this.limit = limit;
    this.windowMs = windowMs;
    this.timestamps = [];
    this.logFn = logFn || (() => {});
  }
  async acquire(cancelRef) {
    while (true) {
      if (cancelRef?.current) throw new Error('취소됨');
      const now = Date.now();
      this.timestamps = this.timestamps.filter(t => now - t < this.windowMs);
      if (this.timestamps.length < this.limit) {
        this.timestamps.push(now);
        return;
      }
      const wait = this.windowMs - (now - this.timestamps[0]) + 20;
      this.logFn(`⏳ [물레방아 대기] ${Math.ceil(wait/1000)}초 후 진입`);
      await new Promise(r => setTimeout(r, wait));
    }
  }
}

// ── parseRawText ──────────────────────────────────────────────────────────────
const isLikelyDate = (str) => {
  if (typeof str !== 'string') return false;
  const s = str.trim();
  if (/\d{2,4}([.\-/])\d{1,2}\1\d{1,2}/.test(s)) return true;
  if (/^\d{8}$/.test(s)) {
    const y = parseInt(s.slice(0, 4), 10), m = parseInt(s.slice(4, 6), 10), d = parseInt(s.slice(6, 8), 10);
    return y >= 2000 && y <= 2099 && m >= 1 && m <= 12 && d >= 1 && d <= 31;
  }
  if (/^\d{6}$/.test(s)) {
    const m = parseInt(s.slice(2, 4), 10), d = parseInt(s.slice(4, 6), 10);
    return m >= 1 && m <= 12 && d >= 1 && d <= 31;
  }
  return false;
};

const AGGREGATE_RE = /^(소계|합계|총합|총계|월계|누계|grand\s*total|sub\s*total)/i;

const parseRawText = (text, fileHeaderRef, currentArray, repObj) => {
  const rawLines = text.split('\n').map(l => l.replace(/\r/g, '').trim()).filter(Boolean);

  let jsonRows = [];
  let jsonHeader = null;

  for (const ln of rawLines) {
    if (!(ln.startsWith('{') || ln.startsWith('['))) continue;
    let obj;
    try { obj = JSON.parse(ln); } catch(e) { continue; }
    if (Array.isArray(obj)) {
      if (!jsonHeader && obj.length >= 2 && obj.every(v => typeof v === 'string')) {
        jsonHeader = obj.map(s => String(s).trim());
      }
      continue;
    }
    if (obj && typeof obj === 'object') jsonRows.push(obj);
  }

  if (jsonRows.length > 0) {
    if (jsonHeader && !fileHeaderRef.current) {
      fileHeaderRef.current = jsonHeader;
      repObj.headerFound = true;
    }
    if (!fileHeaderRef.current) {
      const keyset = [];
      jsonRows.forEach(o => Object.keys(o).forEach(k => {
        if (k !== '__skip' && !keyset.includes(k)) keyset.push(k);
      }));
      if (keyset.length >= 2) {
        fileHeaderRef.current = keyset;
        repObj.headerFound = true;
      }
    }

    const header = fileHeaderRef.current;
    if (!header) return;

    let parsed = 0;
    for (const o of jsonRows) {
      if (o.__skip === true) continue;
      const vals = Object.keys(o).filter(k => k !== '__skip').map(k => (o[k] == null ? '' : String(o[k]).trim()));
      if (vals.every(v => v === '')) continue;
      if (AGGREGATE_RE.test(vals[0] || '')) continue;

      const row = header.map(h => {
        const v = o[h];
        return (v === undefined || v === null) ? '' : String(v).trim();
      });
      currentArray.push(row);
      repObj.rows++;
      parsed++;
    }
    repObj.jsonParsed = (repObj.jsonParsed || 0) + parsed;
    repObj.tabFallback = false;
    return;
  }

  repObj.tabFallback = true;
  const lines = text.split('\n').map(l => l.replace(/\r/g, '').trimEnd()).filter(l => l.trim().length > 0 && !l.match(/^[-=_*]+$/));

  for (const line of lines) {
    const cols = line.split('\t').map(c => c.trim());
    if (cols.length < 2) continue;
    if (AGGREGATE_RE.test(cols[0])) continue;

    const hasHeaderKeyword = cols.some(c => /날짜|일자|이용일|거래일|매출일|승인일|결제일|카드|가맹점|상호|금액|원금/.test(c));
    const dateCount = cols.filter(c => isLikelyDate(c)).length;
    const numericCount = cols.filter(c => { const s = c.replace(/[,]/g, '').trim(); return s !== '' && !isNaN(s) && s.length <= 9; }).length;
    const koreanCount = cols.filter(c => /[가-힣]/.test(c)).length;

    const looksLikeHeader = hasHeaderKeyword || (koreanCount >= Math.ceil(cols.length * 0.4) && dateCount === 0 && numericCount <= 1);
    if (looksLikeHeader) {
      if (!fileHeaderRef.current) { fileHeaderRef.current = cols; repObj.headerFound = true; }
      continue;
    }

    const hasDate = cols.some(c => isLikelyDate(c));
    const hasEnoughNumbers = numericCount >= 2;
    if (!hasDate && !hasEnoughNumbers) continue;
    currentArray.push(cols);
    repObj.rows++;
  }
};

const isRealMoney = (str) => {
  if (typeof str !== 'string' || str.trim() === '') return false;
  const s = str.trim();
  if (s.includes('/') || s.includes('-')) return false;
  if (s !== '0' && /^0\d/.test(s)) return false;
  const noComma = s.replace(/,/g, '');
  if (!s.includes(',') && /^\d+$/.test(noComma) && noComma.length >= 10) return false;
  return /^-?\d{1,3}(,\d{3})*(\.\d+)?$/.test(s) || /^-?\d+(\.\d+)?$/.test(s);
};

// ── useDB (Hook) ──────────────────────────────────────────────────────────────
function useDB(key, init) {
  const [data, setData] = useState(init);
  const dbRef = useRef(null);
  const initRef = useRef(init);
  useEffect(() => {
    try {
      if (!window.indexedDB) return;
      const req = window.indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
      };
      req.onsuccess = (e) => {
        dbRef.current = e.target.result;
        const g = dbRef.current.transaction(STORE_NAME,'readonly').objectStore(STORE_NAME).get(key);
        g.onsuccess = () => { if (g.result !== undefined) setData(g.result); };
      };
    } catch(e) {}
  }, [key]);
  const save = useCallback((d) => {
    setData(d);
    try { if (dbRef.current) dbRef.current.transaction(STORE_NAME,'readwrite').objectStore(STORE_NAME).put(d, key); } catch(e) {}
  }, [key]);
  const clear = useCallback(() => {
    setData(initRef.current);
    try { if (dbRef.current) dbRef.current.transaction(STORE_NAME,'readwrite').objectStore(STORE_NAME).delete(key); } catch(e) {}
  }, [key]);
  return [data, save, clear];
}

// ── ErrorBoundary ─────────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(e) { return { hasError: true, error: e }; }
  render() {
    if (this.state.hasError) return (
      <div style={{background:'#0a0a0a',color:'#ff4444',padding:'3rem',minHeight:'100vh',fontFamily:'IBM Plex Mono,monospace'}}>
        <div style={{color:'#00ff8c',marginBottom:'1rem',fontSize:'12px',letterSpacing:'3px'}}>SYSTEM ERROR</div>
        <pre style={{fontSize:'12px',color:'#ff6666'}}>{this.state.error?.toString()}</pre>
      </div>
    );
    return this.props.children;
  }
}

[가장 중요한 출력 규칙]
- 각 거래 행을 '한 줄에 하나의 JSON 객체'로 출력하세요 (JSON Lines).
- 객체의 'key'는 표의 헤더(컬럼명)를 그대로 사용하세요. 카드사마다 컬럼명이 다르므로, 이 표에 실제로 적힌 헤더 텍스트를 키로 쓰세요.
- 어떤 컬럼의 칸이 아예 비어 있으면, 그 키 자체를 출력하지 마세요.
- 단, "0"이 명시적으로 적힌 셀은 반드시 "0"으로 출력하세요 (진짜 빈 칸과 구분).

[첫 줄: 헤더 정의]
- 가장 첫 줄에는 이 표의 컬럼명을 왼쪽→오른쪽 순서대로 담은 JSON 배열을 출력하세요.
  예: ["거래일","확정일","이용카드","가맹점명","사업자번호","매출금액","공급가액","부가세","비과세금액"]
- 2행 헤더(대분류/소분류)면 실제 데이터가 들어가는 하위 컬럼명만 사용하세요.

[데이터 행]
- 각 거래 행을 위 헤더 키를 사용한 JSON 객체로 한 줄씩 출력.
- 값은 원본 그대로 출력하세요 (숫자 콤마·소수점·날짜 형식 모두 보존).
  · 날짜: 표에 적힌 형식 그대로 — "20250630", "2025-01-03", "2025.01.03", "25/06/30" 모두 허용
  · 금액: "1,464,700" 또는 "1464700" 원본 표기 유지
- 표에 적힌 모든 거래 행을 빠짐없이 출력하세요 (1행도 누락 금지).

[제외 대상 — 거래 행 아님]
- 다음에 해당하는 행은 출력하지 마세요:
  · "소계", "합계", "총계", "총합", "월계", "누계" 등 집계 행
  · 빈 행, 구분선만 있는 행
  · 안내 문구, 페이지 번호, 카드사 광고 문구
- 거래 행인지 집계 행인지 애매하면, JSON 객체에 "__skip": true 키를 추가하여 표시하세요.

[왜 이렇게 하나 — 일시불 거래 주의]
- 일시불 거래는 '이용금액'·'할부기간' 칸이 비어 있고 '원금' 칸에만 금액이 있습니다.
- 이때 비어 있는 칸을 억지로 채우거나 자리를 당기지 말고, 값이 있는 '원금' 키에만 그 금액을 담으면 됩니다.

[금지 사항]
- JSON 외 설명·마크다운·코드펜스 절대 금지. 순수 텍스트 라인만.
- 추론·요약·정리 금지. 표에 적힌 그대로만.`;

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [status, setStatus] = useState('loading');
  const [logs, setLogs] = useState([]);
  const [rows, saveRows, clearRows] = useDB('rows', []);
  const [errorMsg, setErrorMsg] = useState('');
  const [elapsed, setElapsed] = useState(0);
  const [append, setAppend] = useState(false);
  const [failedTasks, setFailedTasks] = useState([]);
  const [isDragging, setIsDragging] = useState(false);
  const [progress, setProgress] = useState({ current: 0, total: 0, estimate: '' });
  const [previewInfo, setPreviewInfo] = useState(null);
  const [liveStats, setLiveStats] = useState({ rpm: 0, tpm: 0, maxOutputTokens: 0 });
  const [downloadDone, setDownloadDone] = useState(false);

  // [3단계] 통합 대시보드 (Zod, 레벤슈타인, Z-Score)
  const [auditSummary, setAuditSummary] = useState({ mathErrors: 0, fuzzyDuplicates: 0, spatialAnomalies: 0, dataLoss: 0 });

  const [filesSummary, setFilesSummary] = useState([]);
  const [tabFallbackFiles, setTabFallbackFiles] = useState([]);
  const [maxTokensPages, setMaxTokensPages] = useState([]);
  const [settings, setSettings] = useState(() => loadSettings());
  const [showSettings, setShowSettings] = useState(false);
  const [settingsDraft, setSettingsDraft] = useState(() => loadSettings());

  // [v0.11 Fix 7] API Key SessionStorage 사용
  const [apiKey, setApiKey] = useState(() => {
    try { return sessionStorage.getItem('sop_api_key') || ''; } catch(e) { return ''; }
  });

  const fileRef = useRef(null);
  const cancelRef = useRef(false);
  const activeRequestsRef = useRef(new Set());
  const timerRef = useRef(null);
  const logsRef = useRef([]);
  const reportRef = useRef([]);

  const usageHistoryRef = useRef([]);
  const maxRpmRef = useRef(0);
  const maxTpmRef = useRef(0);
  const maxOutputTokensRef = useRef(0);
  const grandTotalReqRef = useRef(0);

  const log = useCallback((msg) => {
    const line = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logsRef.current.push(line);
    setLogs(prev => [line, ...prev].slice(0, 120));
  }, []);

  globalRateLimitQueue.logFn = log;

  const markRequest = useCallback((id, startMs) => {
    usageHistoryRef.current.push({ id, ts: startMs, outputTokens: 0 });
    grandTotalReqRef.current += 1;
  }, []);

  const markRequestEnd = useCallback((id, outputTokens) => {
    const r = usageHistoryRef.current.find(x => x.id === id);
    if (r) r.outputTokens = outputTokens;
    maxOutputTokensRef.current = Math.max(maxOutputTokensRef.current, outputTokens);
  }, []);

  useEffect(() => {
    let mounted = true;
    const load = async () => {
      const inject = (src) => new Promise((res, rej) => {
        if (document.querySelector(`script[src="${src}"]`)) return res();
        const s = document.createElement('script');
        s.src = src; s.onload = res; s.onerror = rej;
        document.body.appendChild(s);
      });
      try {
        log('⚡ AI SOP OCR v0.11.5 엔진 초기화 중...');
        await inject('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
        if (window.pdfjsLib)
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        log(`✅ 엔진 준비 완료 (WebP: ${supportsWebP ? '활성' : 'JPEG 폴백'})`);
        if (mounted) setStatus('idle');
      } catch(e) {
        if (mounted) { setStatus('error'); setErrorMsg('라이브러리 로드 실패: ' + e.message); }
      }
    };
    load();
    return () => { mounted = false; };
  }, [log]);

  const callExtract = useCallback(async (base64, mimeType, chunkIndex, knownHeader, outputTokenLimit) => {
    const headerHint = knownHeader && knownHeader.length > 0
      ? `\n\n[중요] 이 페이지에는 표 헤더가 없습니다. 반드시 아래 헤더명을 키로 사용하세요 (임의 생성 금지):\n${JSON.stringify(knownHeader)}\n첫 줄 헤더 배열도 위 헤더 그대로 출력하세요.`
      : '';

    let attempt = 1;
    while (attempt <= CONFIG.MAX_RETRIES) {
      if (cancelRef.current) throw new Error('취소됨');
      await globalRateLimitQueue.acquire(cancelRef);
      if (cancelRef.current) throw new Error('취소됨');

      const reqId = `extract_${chunkIndex}_${Date.now()}`;
      markRequest(reqId, Date.now());
      const apiStart = Date.now();

      const controller = new AbortController();
      activeRequestsRef.current.add(controller);
      const tid = setTimeout(() => controller.abort(), CONFIG.TIMEOUT_MS);

      try {
        const userText = knownHeader && knownHeader.length > 0
          ? `값이 있는 컬럼만 헤더명을 키로 사용해 JSON Lines로 출력하세요. 첫 줄은 반드시 ${JSON.stringify(knownHeader)} 배열을 그대로 출력하세요.`
          : '값이 있는 컬럼만 헤더명을 키로 사용해 JSON Lines로 출력하세요. 첫 줄은 헤더 컬럼명 JSON 배열입니다.';

        const res = await fetch(`${CONFIG.GEMINI_URL}?key=${apiKey.trim()}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            systemInstruction: { parts: [{ text: EXTRACT_PROMPT + headerHint }] },
            contents: [{ role: 'user', parts: [
              { text: userText },
              { inlineData: { mimeType, data: base64 } }
            ]}],
            generationConfig: {
              responseMimeType: 'text/plain',
              temperature: 0,
              topP: 0.1,
              maxOutputTokens: outputTokenLimit ?? 65535
            },
            safetySettings: [
              { category: "HARM_CATEGORY_HARASSMENT",        threshold: "BLOCK_NONE" },
              { category: "HARM_CATEGORY_HATE_SPEECH",       threshold: "BLOCK_NONE" },
              { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
              { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" },
              { category: "HARM_CATEGORY_CIVIC_INTEGRITY",   threshold: "BLOCK_NONE" }
            ]
          }),
          signal: controller.signal
        });
        clearTimeout(tid);
        activeRequestsRef.current.delete(controller);

        if (!res.ok) throw new Error(`API ${res.status}: ${(await res.text()).substring(0, 200)}`);

        const json = await res.json();
        const finishReason = json.candidates?.[0]?.finishReason || 'UNKNOWN';
        const usage = json.usageMetadata || {};
        const outputTokens = usage.candidatesTokenCount || 0;
        const inputTokens = usage.promptTokenCount || 0;
        const apiTime = Date.now() - apiStart;

        markRequestEnd(reqId, outputTokens);

        if (finishReason === 'MAX_TOKENS') {
          log(`⚠️ [페이지 ${chunkIndex}] 출력토큰 한도 도달 (${outputTokens})`);
          setMaxTokensPages(prev => [...prev, chunkIndex]);
        }
        if (finishReason === 'SAFETY' || finishReason === 'PROHIBITED_CONTENT')
          throw new Error('SafetyFilter: 필터 차단됨');

        const text = json.candidates?.[0]?.content?.parts?.map(p => p.text).join('') || '';
        const cleaned = text.replace(/```[a-z]*\n?/gi, '').trim();
        if (!cleaned) throw new Error('EmptyResponse: 빈 응답');

        return { text: cleaned, finishReason, retries: attempt - 1, outputTokens, inputTokens, apiTime };
      } catch(err) {
        clearTimeout(tid);
        activeRequestsRef.current.delete(controller);
        if (cancelRef.current) throw new Error('취소됨');
        if (err.message.match(/401|403|400/)) throw err;
        if (attempt >= CONFIG.MAX_RETRIES) throw err;
        const delay = err.message.includes('429') ? 30000 : 5000 * Math.pow(2, attempt - 1);
        log(`⚠️ [페이지 ${chunkIndex}] 재시도 ${attempt}/${CONFIG.MAX_RETRIES} (${err.message.substring(0,40)})`);
        await new Promise(r => setTimeout(r, delay));
        attempt++;
      }
    }
  }, [apiKey, log, markRequest, markRequestEnd]);

  const executeChunk = useCallback(async (base64, mimeType, chunkIndex, fileName, knownHeader, outputTokenLimit) => {
    const start = Date.now();
    log(`⚡ [${fileName}] 페이지 [${chunkIndex}] 추출 시작${knownHeader ? ' (헤더힌트 적용)' : ''}`);
    try {
      const result = await callExtract(base64, mimeType, chunkIndex, knownHeader, outputTokenLimit);
      const total = Date.now() - start;
      const apiTime = result.apiTime || 0;
      const waitTime = total - apiTime;
      const waitStr = waitTime > 1000 ? ` + 대기 ${(waitTime/1000).toFixed(1)}초` : '';
      log(`✅ [${fileName}] 페이지 [${chunkIndex}] 완료 (API ${(apiTime/1000).toFixed(1)}초${waitStr} = 총 ${(total/1000).toFixed(1)}초, 출력 ${result.outputTokens}토큰)`);
      return { success: true, chunkIndex, result, base64, mimeType, fileName, duration: total };
    } catch(err) {
      if (err.message !== '취소됨') log(`❌ [${fileName}] 페이지 [${chunkIndex}] 실패: ${err.message}`);
      return { success: false, chunkIndex, error: err, base64, mimeType, fileName };
    }
  }, [callExtract, log]);

  const processResults = (resolved, currentArray, fileHeaderRef, newFailedTasks, rep) => {
    for (const res of resolved) {
      if (cancelRef.current) break;
      if (!res.success) {
        if (res.error.message !== '취소됨')
          newFailedTasks.push({
            base64: res.base64, mimeType: res.mimeType,
            chunkIndex: res.chunkIndex, fileName: res.fileName, total: 1,
            knownHeader: fileHeaderRef.current // [Fix 3] 헤더 복원 보장
          });
        continue;
      }
      rep.retries += res.result.retries || 0;
      rep.reason = res.result.finishReason;
      rep.inputTokens = (rep.inputTokens || 0) + (res.result.inputTokens || 0);
      rep.outputTokens = (rep.outputTokens || 0) + (res.result.outputTokens || 0);
      parseRawText(res.result.text, fileHeaderRef, currentArray, rep);
    }
  };

  const initTracking = () => {
    usageHistoryRef.current = [];
    grandTotalReqRef.current = 0;
    maxRpmRef.current = 0;
    maxTpmRef.current = 0;
    maxOutputTokensRef.current = 0;
    setElapsed(0);
    setLiveStats({ rpm: 0, tpm: 0, maxOutputTokens: 0 });
    const startTime = Date.now();
    timerRef.current = setInterval(() => {
      const now = Date.now();
      setElapsed(Math.floor((now - startTime) / 1000));
      usageHistoryRef.current = usageHistoryRef.current.filter(i => now - i.ts <= 60000);
      const recent = usageHistoryRef.current;
      const rpm = recent.length;
      const tpm = recent.reduce((a, c) => a + c.outputTokens, 0);
      maxRpmRef.current = Math.max(maxRpmRef.current, rpm);
      maxTpmRef.current = Math.max(maxTpmRef.current, tpm);
      setLiveStats({ rpm, tpm, maxOutputTokens: maxOutputTokensRef.current });
    }, 1000);
  };

  const prepareUpload = async (filesArray) => {
    if (!filesArray.length) return;
    if (!apiKey.trim()) { setErrorMsg('API Key를 입력해주세요.'); setStatus('error'); return; }
    cancelRef.current = false;
    const firstPdf = filesArray.find(f => f.type.includes('pdf'));
    if (firstPdf) {
      setStatus('preview_loading');
      try {
        log(`🔍 [${firstPdf.name}] 미리보기 생성 중...`);
        const b64 = await fileToBase64(firstPdf);
        const arr = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
        const pdf = await window.pdfjsLib.getDocument({ data: arr }).promise;
        const page = await pdf.getPage(1);
        const vp = page.getViewport({ scale: 300/72 });
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = vp.width; canvas.height = vp.height;
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        canvas.width = 0; canvas.height = 0;
        if (page.cleanup) page.cleanup();
        if (cancelRef.current) return;
        setPreviewInfo({ filesArray, dataUrl, rotation: 0 });
        setStatus('preview');
        log('👀 미리보기 완료. 방향을 확인해주세요.');
      } catch(e) {
        if (!cancelRef.current) { log(`❌ 미리보기 오류: ${e.message}`); setErrorMsg(e.message); setStatus('error'); }
      }
    } else {
      startProcessing(filesArray, 0);
    }
  };

  const handleFiles = (e) => {
    if (e.target.files && e.target.files.length > 0) prepareUpload(Array.from(e.target.files));
  };

  const startProcessing = async (filesArray, globalRotation) => {
    const cfg = { ...settings };
    const rpmSlot = Math.max(1, cfg.LIMIT_RPM - 2);
    globalRateLimitQueue = new SlidingWindowQueue(rpmSlot, 60000);
    globalRateLimitQueue.logFn = log;
    
    setStatus('processing');
    setPreviewInfo(null);
    cancelRef.current = false;
    activeRequestsRef.current.clear();
    reportRef.current = [];
    setFailedTasks([]);
    setFilesSummary([]);
    setTabFallbackFiles([]);
    setMaxTokensPages([]);
    setAuditSummary({ mathErrors: 0, fuzzyDuplicates: 0, spatialAnomalies: 0, dataLoss: 0 }); // 대시보드 리셋
    setDownloadDone(false);
    setProgress({ current: 0, total: 0, estimate: '' });
    initTracking();

    const globalHeaderRef = { current: null };
    let current = [];

    if (append && rows.length > 0) {
      current = [...rows];
      if (current.length > 0) globalHeaderRef.current = current[0];
      log('📎 기존 데이터에 이어서 추가합니다.');
    } else {
      clearRows();
      logsRef.current = [];
      log('🆕 AI SOP OCR v0.11.5 새 작업 시작');
    }

    let allFailedTasks = [];
    let smaQueue = [];
    let skipFile = false;

    try {
      const fileTasks = [];
      let totalChunks = 0;
      for (const file of filesArray) {
        if (cancelRef.current) break;
        const base64 = await fileToBase64(file);
        let mimeType = file.type || 'application/pdf';
        if (mimeType.includes('pdf')) {
          const arr = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
          const pdf = await window.pdfjsLib.getDocument({ data: arr }).promise;
          totalChunks += pdf.numPages;
          fileTasks.push({ file, mimeType: supportsWebP ? 'image/webp' : 'image/jpeg', isPdf: true, pdf });
        } else {
          totalChunks += 1;
          fileTasks.push({ file, mimeType, isPdf: false, base64 });
        }
      }

      setProgress({ current: 0, total: totalChunks, estimate: calculateETA([12000], totalChunks, cfg.CONCURRENCY_LIMIT) });

      for (const task of fileTasks) {
        if (cancelRef.current) break;
        skipFile = false;
        const fileStart = Date.now();
        const fileHeaderRef = { current: append ? globalHeaderRef.current : null };
        log(`📂 [${task.file.name}] 처리 시작`);

        const rep = {
          name: task.file.name, size: (task.file.size / 1024).toFixed(1) + 'KB',
          start: new Date().toLocaleTimeString(), end: '', sec: 0, rows: 0,
          headerFound: false, tabFallback: false, jsonParsed: 0, retries: 0, reason: '',
          inputTokens: 0, outputTokens: 0
        };
        let newFailedTasks = [];
        const totalPages = task.isPdf ? task.pdf.numPages : 1;
        const renderQueue = [];
        let renderDone = false;

        const renderProducer = (async () => {
          if (!task.isPdf) {
            renderQueue.push({ base64: task.base64, chunkIndex: 1 });
            return;
          }
          const rawCanvas = document.createElement('canvas');
          const rawCtx = rawCanvas.getContext('2d', { willReadFrequently: true });

          for (let i = 1; i <= totalPages; i++) {
            if (cancelRef.current) break;
            while (renderQueue.length >= cfg.CONCURRENCY_LIMIT + 1) {
              if (cancelRef.current) break;
              await new Promise(r => setTimeout(r, 100));
            }
            if (cancelRef.current) break;

            const page = await task.pdf.getPage(i);
            const vp = page.getViewport({ scale: 300/72, rotation: (page.rotate + globalRotation) % 360 });
            rawCanvas.width = vp.width; rawCanvas.height = vp.height;
            rawCtx.clearRect(0, 0, rawCanvas.width, rawCanvas.height);
            rawCtx.filter = 'grayscale(1)';
            await page.render({ canvasContext: rawCtx, viewport: vp }).promise;
            rawCtx.filter = 'none';

            const brightness = analyzeBrightness(rawCtx, rawCanvas.width, rawCanvas.height);
            const { contrast, brightness: bright, label } = getAdaptiveFilter(brightness);
            log(`🖼️ [페이지 ${i}] 전처리: 밝기 ${Math.round(brightness)} (${label}) → contrast(${contrast}) brightness(${bright})`);

            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = vp.width; finalCanvas.height = vp.height;
            const finalCtx = finalCanvas.getContext('2d');
            finalCtx.filter = `contrast(${contrast}) brightness(${bright})`;
            finalCtx.drawImage(rawCanvas, 0, 0);
            finalCtx.filter = 'none';

            const base64 = finalCanvas.toDataURL(task.mimeType, supportsWebP ? 0.85 : 0.9).split(',')[1];
            finalCanvas.width = 0; finalCanvas.height = 0;
            if (page.cleanup) page.cleanup();

            renderQueue.push({ base64, chunkIndex: i });
          }
          rawCanvas.width = 0; rawCanvas.height = 0;
        })();
        renderProducer.finally(() => { renderDone = true; });

        const executing = new Set();
        const chunkPromises = [];

        for (let j = 0; j < totalPages; j++) {
          if (cancelRef.current) break;
          
          while (renderQueue.length === 0) {
            if (cancelRef.current || renderDone) break;
            await new Promise(r => setTimeout(r, 100));
          }
          if (cancelRef.current) break;

          // [Fix 5] 렌더 엔진 오작동 감지
          if (renderDone && renderQueue.length === 0 && j < totalPages) {
            log(`❌ [${task.file.name}] 페이지 [${j + 1}] 렌더링 실패 감지 (재시도 큐로 이송)`);
            newFailedTasks.push({
              base64: '', mimeType: task.mimeType, chunkIndex: j + 1,
              fileName: task.file.name, total: 1, knownHeader: fileHeaderRef.current
            });
            setProgress(prev => ({ ...prev, current: prev.current + 1 }));
            continue;
          }

          const item = renderQueue.shift();

          if (item.chunkIndex === 1) {
            log(`📋 [${task.file.name}] 1페이지 선처리 — 헤더 확정 대기 중...`);
            const res = await executeChunk(item.base64, task.mimeType, 1, task.file.name, null, cfg.LIMIT_OUTPUT_TOKENS);
            const tempFailed = [];
            const tempRep = { rows: 0, retries: 0, reason: '', headerFound: false, tabFallback: false, jsonParsed: 0, inputTokens: 0, outputTokens: 0 };
            processResults([{ ...res, index: 0 }], current, fileHeaderRef, tempFailed, tempRep);
            
            rep.rows += tempRep.rows; rep.retries += tempRep.retries;
            rep.headerFound = tempRep.headerFound; rep.tabFallback = tempRep.tabFallback;
            rep.jsonParsed = (rep.jsonParsed || 0) + (tempRep.jsonParsed || 0);
            if (tempFailed.length) newFailedTasks.push(...tempFailed);
            if (res.duration) { smaQueue.push(res.duration); if (smaQueue.length > 5) smaQueue.shift(); }
            setProgress(prev => ({ ...prev, current: prev.current + 1, estimate: calculateETA(smaQueue, prev.total - (prev.current + 1), cfg.CONCURRENCY_LIMIT) }));

            if (fileHeaderRef.current && globalHeaderRef.current) {
              let isDiff = globalHeaderRef.current.length !== fileHeaderRef.current.length;
              if (!isDiff) {
                for (let k = 0; k < globalHeaderRef.current.length; k++) {
                  if (globalHeaderRef.current[k] !== fileHeaderRef.current[k]) { isDiff = true; break; }
                }
              }
              if (isDiff) {
                log(`⚠️ 기존 헤더와 다름 — 빈 줄 추가 후 새 헤더 적용 (병합 진행)`);
                current.push([]);
                current.push(fileHeaderRef.current);
              }
            }
            if (fileHeaderRef.current) globalHeaderRef.current = fileHeaderRef.current;
            saveRows([...current]);
            log(`📋 헤더 확정: ${fileHeaderRef.current ? JSON.stringify(fileHeaderRef.current).substring(0, 50)+'...' : '미감지'}`);
            continue;
          }

          const knownHeader = fileHeaderRef.current;
          const p = executeChunk(item.base64, task.mimeType, item.chunkIndex, task.file.name, knownHeader, cfg.LIMIT_OUTPUT_TOKENS).then(res => {
            executing.delete(p);
            if (res.duration) { smaQueue.push(res.duration); if (smaQueue.length > 5) smaQueue.shift(); }
            setProgress(prev => ({ ...prev, current: prev.current + 1, estimate: calculateETA(smaQueue, prev.total - (prev.current + 1), cfg.CONCURRENCY_LIMIT) }));
            return { ...res, index: j };
          });
          chunkPromises.push(p);
          executing.add(p);
          if (executing.size >= cfg.CONCURRENCY_LIMIT) await Promise.race(executing);
        }

        if (skipFile) continue;

        await renderProducer;
        const resolved = (await Promise.all(chunkPromises)).sort((a,b) => a.index - b.index);
        processResults(resolved, current, fileHeaderRef, newFailedTasks, rep);

        if (fileHeaderRef.current && !globalHeaderRef.current) globalHeaderRef.current = fileHeaderRef.current;

        allFailedTasks = [...allFailedTasks, ...newFailedTasks];
        saveRows([...current]);

        rep.end = new Date().toLocaleTimeString();
        rep.sec = Math.round((Date.now() - fileStart) / 1000);
        reportRef.current.push(rep);
        setFilesSummary(prev => [...prev, { name: task.file.name, pages: totalPages, rows: rep.rows }]);
        if (rep.tabFallback) setTabFallbackFiles(prev => [...prev, task.file.name]);
        log(`🏁 [${task.file.name}] 완료 — ${rep.rows}행 추출`);
      }

      setFailedTasks(allFailedTasks);
      if (!cancelRef.current) {
        if (current.length === 0 && allFailedTasks.length === 0) throw new Error('추출된 데이터가 없습니다.');
        setStatus('success');
      }
    } catch(e) {
      if (!cancelRef.current) { log(`❌ 오류: ${e.message}`); setErrorMsg(e.message); setStatus('error'); }
    } finally {
      clearInterval(timerRef.current);
    }
  };

  const handleRetryFailed = async () => {
    if (!failedTasks.length) return;
    setStatus('processing');
    cancelRef.current = false;
    activeRequestsRef.current.clear();
    setAuditSummary({ mathErrors: 0, fuzzyDuplicates: 0, spatialAnomalies: 0, dataLoss: 0 });
    initTracking();
    let smaQueue = [];

    try {
      const tasksToRetry = [...failedTasks];
      setFailedTasks([]);
      setProgress({ current: 0, total: tasksToRetry.length, estimate: calculateETA([12000], tasksToRetry.length, settings.CONCURRENCY_LIMIT) });

      let current = [...rows];
      let newFailedTasks = [];
      log(`♻️ 누락 ${tasksToRetry.length}개 청크 재시도 시작...`);

      const executing = new Set();
      const chunkPromises = [];

      for (let j = 0; j < tasksToRetry.length; j++) {
        if (cancelRef.current) break;
        const task = tasksToRetry[j];
        
        // [Fix 3] 재시도 시 각 파일의 고유 헤더 사용
        const taskHeaderRef = { current: task.knownHeader ?? null };
        const p = executeChunk(task.base64, task.mimeType, task.chunkIndex, task.fileName, taskHeaderRef.current).then(res => {
          executing.delete(p);
          if (res.duration) { smaQueue.push(res.duration); if (smaQueue.length > 5) smaQueue.shift(); }
          setProgress(prev => ({ ...prev, current: prev.current + 1, estimate: calculateETA(smaQueue, prev.total - (prev.current + 1), settings.CONCURRENCY_LIMIT) }));
          return { ...res, index: j, task, taskHeaderRef };
        });
        chunkPromises.push(p);
        executing.add(p);
        if (executing.size >= settings.CONCURRENCY_LIMIT) await Promise.race(executing);
      }

      const resolved = (await Promise.all(chunkPromises)).sort((a,b) => a.index - b.index);
      const rep = { rows: 0, retries: 0, reason: '', headerFound: false, tabFallback: false, jsonParsed: 0, inputTokens: 0, outputTokens: 0 };
      
      for (const res of resolved) {
        if (!res.success) {
          if (res.error && res.error.message !== '취소됨') newFailedTasks.push({ ...res.task });
          continue;
        }
        processResults([res], current, res.taskHeaderRef, newFailedTasks, rep);
      }
      
      saveRows([...current]);
      setFailedTasks(newFailedTasks);
      log(`🏁 재시도 완료 — ${rep.rows}행 추가, ${newFailedTasks.length}건 재실패`);
      if (!cancelRef.current) setStatus('success');
    } catch(e) {
      if (!cancelRef.current) { log(`❌ 재시도 오류: ${e.message}`); setErrorMsg(e.message); setStatus('error'); }
    } finally { clearInterval(timerRef.current); }
  };

  // ── [3단계] 하이브리드 이상 탐지 다운로드 ───────────────────────────────────────────
  const download = () => {
    if (!rows.length) return;
    const exportRows = rows.map(r => [...r]);
    exportRows[0] = [...exportRows[0], '⚠️ 스마트 시스템 검토'];

    // [v0.11 Zod Schema]
    const TransactionSchema = z.object({
      amount: z.string().optional(),
      principal: z.string().optional(),
      fee: z.string().optional(),
    }).superRefine((data, ctx) => {
      const amt = parseNum(data.amount);
      const prin = parseNum(data.principal);
      const f = parseNum(data.fee);
      if (data.amount && data.principal) {
        if (amt !== prin + f) ctx.addIssue({ code: z.ZodIssueCode.custom, message: "수학 오류(원금+수수료≠총액)" });
      }
    });

    let currentHeader = rows[0];
    let amountIdx = -1, prinIdx = -1, feeIdx = -1;
    
    const updateIndices = (headerRow) => {
      amountIdx = headerRow.findIndex(h => /이용금액|매출금액|결제금액|청구금액/.test(String(h)));
      prinIdx = headerRow.findIndex(h => /원금|이용대금/.test(String(h)));
      feeIdx = headerRow.findIndex(h => /수수료|할부수수료/.test(String(h)));
    };
    updateIndices(currentHeader);

    let mErrors = 0, fDups = 0, sAnomalies = 0, dataLoss = 0;

    // [v0.11.5] Z-Score를 위한 길이 통계 산출
    const validRows = exportRows.slice(1).filter(r => r.length > 0 && !/이용일자|거래일자|결제일/.test(String(r[0])));
    const lengthStats = validRows.map(r => r.join('').length);
    const meanLen = lengthStats.reduce((a,b)=>a+b,0) / (lengthStats.length || 1);
    const stdDevLen = Math.sqrt(lengthStats.map(x => Math.pow(x - meanLen, 2)).reduce((a,b)=>a+b,0) / (lengthStats.length || 1));

    for (let i = 1; i < exportRows.length; i++) {
      const row = exportRows[i];
      if (row.length === 0) continue;
      
      if (row.length > 0 && /이용일자|거래일자|결제일|카드|가맹점/.test(String(row[0]))) {
         currentHeader = row; updateIndices(currentHeader); continue; 
      }

      const flags = [];

      // 1. Zod 수학 검증
      if (amountIdx >= 0 && prinIdx >= 0) {
        const valData = { amount: String(row[amountIdx] ?? ''), principal: String(row[prinIdx] ?? ''), fee: feeIdx >= 0 ? String(row[feeIdx] ?? '') : '' };
        const res = TransactionSchema.safeParse(valData);
        if (!res.success) { flags.push(res.error.issues[0].message); mErrors++; }
      }

      // 2. Levenshtein 기반 퍼지 중복 검사 (70% 이상)
      if (i > 1 && exportRows[i-1].length > 0 && !/이용일자|거래일자|결제일/.test(String(exportRows[i-1][0]))) {
        const sim = getRowSimilarity(row, exportRows[i-1]);
        if (sim >= 0.70) {
          flags.push(sim === 1.0 ? '중복 행' : `퍼지 중복 의심(${(sim*100).toFixed(0)}%)`);
          fDups++;
        }
      }

      // 3. Z-Score 공간 이상 탐지 (열 밀림 의심)
      if (stdDevLen > 0) {
        const rowStrLen = row.join('').length;
        const zScore = Math.abs(rowStrLen - meanLen) / stdDevLen;
        if (zScore > 2.5) { flags.push('구조적 이탈 (열밀림 의심)'); sAnomalies++; }
      }

      // 4. 데이터 유실
      const filled = row.filter(v => String(v ?? '').trim() !== '').length;
      if (filled <= 2) { flags.push('데이터 유실 의심'); dataLoss++; }

      exportRows[i] = [...row, flags.join(', ')];
    }
    
    // UI 대시보드 업데이트
    setAuditSummary({ mathErrors: mErrors, fuzzyDuplicates: fDups, spatialAnomalies: sAnomalies, dataLoss });

    const ws = XLSX.utils.aoa_to_sheet(exportRows);
    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let R = range.s.r; R <= range.e.r; ++R) {
      for (let C = range.s.c; C <= range.e.c; ++C) {
        const addr = XLSX.utils.encode_cell({ c: C, r: R });
        const cell = ws[addr];
        if (!cell) continue;
        if (isRealMoney(cell.v)) {
          const num = Number(String(cell.v).replace(/,/g, ''));
          if (!isNaN(num)) { cell.v = num; cell.t = 'n'; cell.z = '#,##0'; }
        } else if (typeof cell.v === 'string') { cell.t = 's'; }
      }
    }

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '카드내역_RAW');
    XLSX.writeFile(wb, `${fileStamp()}.xlsx`);

    log(`💾 엑셀 다운로드 — ${rows.length-1}행 (경량 이상 탐지 가동)`);
    setDownloadDone(true);
    setTimeout(() => setDownloadDone(false), 2500);
  };

  const downloadLog = () => {
    let content = "================================================\n";
    content += "        [ AI SOP OCR v0.11.5 작업 리포트 ]\n";
    content += "================================================\n\n";
    
    reportRef.current.forEach((r, i) => {
      content += `📄 [${i+1}] ${r.name} (${r.size})\n`;
      content += `  - 시간: ${r.start} ~ ${r.end} (${r.sec}초)\n`;
      content += `  - 추출: ${r.rows}행 / 헤더감지: ${r.headerFound ? 'O' : 'X'}\n`;
      content += `  - JSON파싱: ${r.jsonParsed}행 / 탭폴백: ${r.tabFallback ? 'O' : 'X'}\n`;
      content += `  - 재시도: ${r.retries}회 / finishReason: ${r.reason}\n`;
      content += `  - 토큰: 입력 ${r.inputTokens.toLocaleString()} / 출력 ${r.outputTokens.toLocaleString()}\n`;
      content += "-------------------------------------------------\n";
    });
    
    content += `\n▶ 총 소요: ${elapsed}초\n`;
    content += `▶ 총 API 호출: ${grandTotalReqRef.current}회\n`;
    content += `\n▶ 트래픽 최고치\n`;
    content += `  - 최대 RPM: ${maxRpmRef.current} (한도 설정값 기준)\n`;
    content += `  - 최대 TPM: ${maxTpmRef.current.toLocaleString()}\n`;
    content += `  - 최대 출력토큰: ${maxOutputTokensRef.current.toLocaleString()}\n`;
    
    content += `\n▶ 스마트 시스템 검토\n`;
    content += `  - 수학적 오류(Zod): ${auditSummary.mathErrors}건\n`;
    content += `  - 퍼지 중복(Levenshtein): ${auditSummary.fuzzyDuplicates}건\n`;
    content += `  - 구조적 이탈(Z-Score): ${auditSummary.spatialAnomalies}건\n`;
    content += `  - 합계: ${auditSummary.mathErrors + auditSummary.fuzzyDuplicates + auditSummary.spatialAnomalies}건\n`;
    
    content += `\n=== 실행 로그 ===\n`;
    [...logsRef.current].reverse().forEach(l => { content += `${l}\n`; });

    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `sop011.5_log_${stamp()}.txt`;
    link.click();
  };

  const handleCancel = () => {
    cancelRef.current = true;
    activeRequestsRef.current.forEach(c => c.abort());
    activeRequestsRef.current.clear();
    clearInterval(timerRef.current);
    setStatus('idle'); setPreviewInfo(null);
    log('🛑 작업 취소됨');
  };

  const resetAll = () => {
    clearRows();
    setStatus('idle');
    setLiveStats({ rpm: 0, tpm: 0, maxOutputTokens: 0 });
    usageHistoryRef.current = [];
    grandTotalReqRef.current = 0;
    maxRpmRef.current = 0;
    maxTpmRef.current = 0;
    maxOutputTokensRef.current = 0;
    setFilesSummary([]);
    setTabFallbackFiles([]);
    setMaxTokensPages([]);
    setAuditSummary({ mathErrors: 0, fuzzyDuplicates: 0, spatialAnomalies: 0, dataLoss: 0 });
    setDownloadDone(false);
  };

  const pct = progress.total > 0 ? Math.round((progress.current / progress.total) * 100) : 0;

  const MonitorUI = () => {
    if (grandTotalReqRef.current === 0 && status !== 'processing') return null;
    const { rpm, tpm, maxOutputTokens } = liveStats;
    const WARN_RPM = Math.floor(settings.LIMIT_RPM * settings.WARN_RATIO);
    const rWarn = rpm >= WARN_RPM;
    return (
      <div className="mt-6 pt-6 border-t border-[#b0ccbb]">
        <div className="mono text-[10px] text-[#8aad9a] uppercase tracking-[3px] mb-3">// API Monitor</div>
        <div className={`terminal-border rounded-lg p-4 bg-[#dceee5] ${rWarn ? 'warn-border' : ''}`}>
          <div className="grid grid-cols-3 gap-4">
            <div>
              <div className="mono text-[9px] text-[#8aad9a] mb-1">RPM (한도 {settings.LIMIT_RPM})</div>
              <div className={`mono text-xl font-bold ${rWarn ? 'warn' : 'accent'}`}>{rpm}</div>
              <div className="progress-bar mt-1">
                <div className="progress-fill" style={{ width: `${Math.min((rpm/settings.LIMIT_RPM)*100, 100)}%`, background: rWarn ? '#c0392b' : undefined }}/>
              </div>
            </div>
            <div>
              <div className="mono text-[9px] text-[#8aad9a] mb-1">TPM</div>
              <div className="mono text-xl font-bold text-[#4a7a62]">{Math.floor(tpm/1000)}k</div>
            </div>
            <div>
              <div className="mono text-[9px] text-[#8aad9a] mb-1">Max Tokens</div>
              <div className="mono text-xl font-bold text-[#4a7a62]">{Math.floor(maxOutputTokens)}</div>
            </div>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div className="min-h-screen bg-[#d6e8df] grid-bg text-[#4a7a62]">
      <div className="relative z-10 max-w-2xl mx-auto px-4 py-10 space-y-6">

        <header className="flex items-start justify-between">
          <div>
            <div className="mono text-[10px] text-[#8aad9a] tracking-[4px] uppercase mb-2">// Select → OCR → Process</div>
            <h1 className="text-2xl font-bold text-[#152b20] tracking-tight">
              AI SOP OCR <span className="mono text-[#8aad9a] text-sm font-normal">v0.11.5</span>
            </h1>
          </div>
          <button onClick={() => setShowSettings(true)} className="btn-ghost p-2 rounded-lg" title="설정">
            <Icons.Settings className="w-5 h-5"/>
          </button>
        </header>

        <div className="terminal-border rounded-xl p-6 bg-[#e8f2ec]">
          <div className="mb-6">
            <label className="mono text-[10px] text-[#8aad9a] uppercase tracking-[3px] flex items-center gap-2 mb-2">
              <Icons.Key className="w-3 h-3"/> API_KEY (Session)
            </label>
            <input
              type="password" value={apiKey}
              onChange={e => { setApiKey(e.target.value); try { sessionStorage.setItem('sop_api_key', e.target.value); } catch(err){} }}
              placeholder="Vertex AI API Key"
              className="w-full rounded-lg py-3 px-4 text-sm"
            />
          </div>

          {status === 'idle' && (
            <div className="space-y-4 slide-up">
              <label className="flex items-center gap-3 cursor-pointer group">
                <input type="checkbox" checked={append} onChange={e => setAppend(e.target.checked)} className="w-4 h-4 accent-checkbox"/>
                <span className="mono text-[11px] text-[#555]">기존 데이터에 이어 붙이기 (다중 서식 자동 분리)</span>
              </label>
              <div
                className={`border-2 border-dashed rounded-xl p-14 text-center cursor-pointer transition-all flex flex-col items-center gap-4
                  ${isDragging ? 'border-[#2d7a56] bg-[#cde0d5]' : 'border-[#b0ccbb] hover:border-[#8aad9a]'}`}
                onDragOver={e => { e.preventDefault(); setIsDragging(true); }}
                onDragLeave={e => { e.preventDefault(); setIsDragging(false); }}
                onDrop={e => { e.preventDefault(); setIsDragging(false); if (e.dataTransfer.files?.length) prepareUpload(Array.from(e.dataTransfer.files)); }}
                onClick={() => fileRef.current?.click()}
              >
                <Icons.Upload className={`w-10 h-10 transition-colors ${isDragging ? 'accent' : 'text-[#b0ccbb]'}`}/>
                <div>
                  <div className="mono text-sm text-[#4a7a62] mb-1">PDF 또는 이미지 드래그 & 드롭</div>
                </div>
                <input ref={fileRef} type="file" className="hidden" multiple accept="application/pdf,image/*" onChange={handleFiles}/>
              </div>
            </div>
          )}

          {status === 'preview_loading' && (
            <div className="py-12 flex flex-col items-center justify-center space-y-4 slide-up">
              <Icons.Spinner className="w-8 h-8 accent animate-spin"/>
              <div className="mono text-sm text-[#4a7a62] tracking-widest">미리보기 생성 중...</div>
            </div>
          )}

          {status === 'preview' && previewInfo && (
            <div className="space-y-4 slide-up">
              <div className="mono text-[10px] accent uppercase tracking-[3px] mb-2">PAGE ORIENTATION CHECK</div>
              <div className="relative border border-[#b0ccbb] rounded-lg overflow-hidden bg-white/50 aspect-[1/1.4] flex items-center justify-center">
                <img src={previewInfo.dataUrl} alt="preview" style={{ transform: `rotate(${previewInfo.rotation}deg)`, transition: 'transform 0.3s ease' }} className="max-w-full max-h-full object-contain shadow-sm" />
              </div>
              <div className="flex gap-2">
                <button onClick={() => setPreviewInfo(p => ({ ...p, rotation: (p.rotation - 90) % 360 }))} className="flex-1 btn-ghost py-3 rounded-lg flex justify-center"><Icons.RotateLeft className="w-5 h-5"/></button>
                <button onClick={() => setPreviewInfo(p => ({ ...p, rotation: (p.rotation + 90) % 360 }))} className="flex-1 btn-ghost py-3 rounded-lg flex justify-center"><Icons.RotateRight className="w-5 h-5"/></button>
              </div>
              <button onClick={() => startProcessing(previewInfo.filesArray, previewInfo.rotation)} className="w-full btn-primary py-4 rounded-lg mono text-sm tracking-wider">이 방향으로 추출 시작</button>
            </div>
          )}

          {status === 'processing' && (
            <div className="space-y-6 py-4 slide-up">
              <div>
                <div className="mono text-[10px] accent uppercase tracking-[3px] mb-1 flex items-center gap-2">
                  <span className="blink">■</span> PROCESSING
                </div>
                <div className="text-[#152b20] text-xl font-bold mb-4">1-Pass 스마트 추출 가동 중</div>
                {progress.total > 0 && (
                  <div>
                    <div className="flex justify-between mono text-[10px] text-[#8aad9a] mb-2">
                      <span>PAGE {progress.current} / {progress.total}</span>
                      <span>{progress.estimate}</span>
                    </div>
                    <div className="progress-bar mb-2">
                      <div className="progress-fill" style={{ width: `${pct}%` }}/>
                    </div>
                  </div>
                )}
              </div>
              <MonitorUI />
              <button onClick={handleCancel} className="w-full btn-danger mono text-[11px] py-3 rounded-lg">작업 취소</button>
            </div>
          )}

          {(status === 'success' || status === 'error') && (
            <div className="space-y-4 slide-up">
              {status === 'error' ? (
                <div className="border border-[#c0392b] bg-[#fdf0ee] rounded-lg p-4 flex gap-3 items-start">
                  <Icons.Warning className="w-5 h-5 warn shrink-0"/>
                  <div>
                    <div className="mono text-[11px] warn font-bold mb-1">SYSTEM ERROR</div>
                    <div className="mono text-[10px] text-[#a93226] leading-relaxed break-all">{errorMsg}</div>
                  </div>
                </div>
              ) : (
                <div className="border border-[#b0ccbb] bg-[#dceee5] rounded-lg p-4 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <Icons.Check className="w-6 h-6 accent"/>
                    <div>
                      <div className="mono text-[10px] accent uppercase tracking-widest">완료</div>
                      <div className="mono text-[11px] text-[#8aad9a] mt-0.5">{elapsed}초 소요</div>
                    </div>
                  </div>
                  <div className="mono text-2xl font-bold accent">{rows.length - 1} <span className="text-sm text-[#8aad9a] font-normal">rows</span></div>
                </div>
              )}

              {/* [v0.11.5] 하이브리드 알고리즘 대시보드 */}
              {(auditSummary.mathErrors > 0 || auditSummary.fuzzyDuplicates > 0 || auditSummary.spatialAnomalies > 0 || auditSummary.dataLoss > 0) && (
                <div className="border border-[#e0951850] bg-[#fdf8e6] rounded-lg p-4 space-y-3">
                  <div className="flex items-center gap-2">
                    <Icons.Warning className="w-4 h-4 text-[#e09518]"/>
                    <div className="mono text-[10px] font-bold text-[#b57305] uppercase tracking-widest">
                      시스템 검토 및 경량 이상 탐지 결과
                    </div>
                  </div>
                  <div className="grid grid-cols-4 gap-2 text-center text-[11px] font-mono">
                    <div className="bg-white p-2 rounded border border-[#e0951830]">
                      <div className="text-gray-400 text-[9px] mb-1">수학 오류(Zod)</div>
                      <div className={`text-sm font-bold ${auditSummary.mathErrors > 0 ? 'text-red-600' : 'text-[#8aad9a]'}`}>{auditSummary.mathErrors}건</div>
                    </div>
                    <div className="bg-white p-2 rounded border border-[#e0951830]">
                      <div className="text-gray-400 text-[9px] mb-1">퍼지 중복(Sim)</div>
                      <div className={`text-sm font-bold ${auditSummary.fuzzyDuplicates > 0 ? 'text-[#e09518]' : 'text-[#8aad9a]'}`}>{auditSummary.fuzzyDuplicates}건</div>
                    </div>
                    <div className="bg-white p-2 rounded border border-[#e0951830]">
                      <div className="text-gray-400 text-[9px] mb-1">구조 이탈(Z-Sc)</div>
                      <div className={`text-sm font-bold ${auditSummary.spatialAnomalies > 0 ? 'text-orange-600' : 'text-[#8aad9a]'}`}>{auditSummary.spatialAnomalies}건</div>
                    </div>
                    <div className="bg-white p-2 rounded border border-[#e0951830]">
                      <div className="text-gray-400 text-[9px] mb-1">데이터 유실</div>
                      <div className={`text-sm font-bold ${auditSummary.dataLoss > 0 ? 'text-red-600' : 'text-[#8aad9a]'}`}>{auditSummary.dataLoss}건</div>
                    </div>
                  </div>
                </div>
              )}

              {failedTasks.length > 0 && (
                <div className="border border-[#c0392b] bg-[#fdf0ee] rounded-lg p-4 flex items-start justify-between">
                  <div>
                    <div className="mono text-[10px] warn font-bold mb-1 flex items-center gap-2"><Icons.Warning className="w-3 h-3"/> 누락 발생</div>
                    <div className="mono text-[10px] text-[#a93226]">{failedTasks.length}개의 청크가 실패했습니다.</div>
                  </div>
                  <button onClick={handleRetryFailed} className="btn-danger mono text-[10px] px-3 py-1.5 rounded-md flex items-center gap-1"><Icons.Retry className="w-3 h-3"/> 재시도</button>
                </div>
              )}

              <button onClick={download} className={`btn-primary w-full py-4 rounded-lg mono text-sm tracking-wider flex items-center justify-center gap-3 ${downloadDone ? 'done' : ''}`}>
                {downloadDone ? '✅ 엑셀 및 알고리즘 검증 완료' : <><Icons.Download className="w-5 h-5"/> 다운로드 및 이상 탐지 가동</>}
              </button>
              
              <div className="flex gap-2">
                <button onClick={resetAll} className="flex-1 btn-ghost mono text-[11px] py-3 rounded-lg">새 작업</button>
                <button onClick={downloadLog} className="flex-1 btn-report mono text-[11px] py-3 rounded-lg">로그 저장</button>
              </div>
            </div>
          )}
        </div>

        <div className="terminal-border rounded-xl p-5 bg-[#e8f2ec]">
          <div className="flex items-center justify-between mb-3">
            <div className="mono text-[10px] text-[#8aad9a] uppercase tracking-[3px]">// System Logs</div>
          </div>
          <div className="h-52 overflow-y-auto space-y-1 scrollbar">
            {logs.length === 0 && <div className="mono text-[10px] text-[#b0ccbb]">_ 로그 대기 중</div>}
            {logs.map((l, i) => (
              <div key={i} className={`mono text-[10px] leading-relaxed ${i === 0 ? 'accent font-bold' : ''} ${i !== 0 && (l.includes('❌') || l.includes('⚠️')) ? 'warn' : ''} ${i !== 0 && l.includes('⏳') ? 'orange' : ''}`}>{l}</div>
            ))}
          </div>
        </div>
      </div>

      {showSettings && (
        <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) setShowSettings(false); }}>
          <div className="bg-[#e8f2ec] terminal-border rounded-xl p-6 w-full max-w-sm m-4 slide-up" onClick={e => e.stopPropagation()}>
            <div className="flex justify-between items-center mb-6">
              <h2 className="mono text-sm font-bold text-[#152b20] tracking-widest">// SETTINGS</h2>
              <button onClick={() => setShowSettings(false)} className="text-[#8aad9a] hover:text-[#1e6644]"><Icons.Trash className="w-5 h-5"/></button>
            </div>
            <div className="space-y-4">
              {[ { label: 'LIMIT_RPM (분당 요청 수)', key: 'LIMIT_RPM', type: 'number' },
                 { label: 'LIMIT_TPM (분당 토큰 수)', key: 'LIMIT_TPM', type: 'number' },
                 { label: 'CONCURRENCY_LIMIT (동시 처리)', key: 'CONCURRENCY_LIMIT', type: 'number' } ].map(f => (
                <div key={f.key}>
                  <label className="mono text-[10px] text-[#8aad9a] block mb-1">{f.label}</label>
                  <input type={f.type} value={settingsDraft[f.key]} onChange={e => setSettingsDraft(p => ({ ...p, [f.key]: Number(e.target.value) }))} className="w-full rounded bg-[#dceee5] border border-[#b0ccbb] p-2 text-sm mono text-[#1e6644] focus:border-[#2d7a56] focus:outline-none"/>
                </div>
              ))}
            </div>
            <div className="mt-6 flex gap-2">
              <button onClick={() => setShowSettings(false)} className="flex-1 btn-ghost py-2 rounded text-xs mono">취소</button>
              <button onClick={() => { setSettings(settingsDraft); saveSettings(settingsDraft); setShowSettings(false); log('⚙️ 설정이 저장되었습니다.'); }} className="flex-1 btn-primary py-2 rounded text-xs mono">저장</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
</html>
