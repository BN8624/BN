class SlidingWindowQueue {
  constructor(limit, windowMs, logFn) {
    this.limit = limit;
    this.windowMs = windowMs;
    this.timestamps = [];
    this.logFn = logFn || (() => {});
  }
  async acquire(cancelRef) {
    while (true) {
      if (cancelRef && cancelRef.current) throw new Error('취소됨');
      const now = Date.now();
      this.timestamps = this.timestamps.filter(t => now - t < this.windowMs);
      if (this.timestamps.length < this.limit) {
        this.timestamps.push(now);
        return;
      }
      const oldest = this.timestamps[0];
      const waitTime = this.windowMs - (now - oldest) + 20;
      if (this.logFn) this.logFn(`⏳ [물레방아 대기] ${Math.ceil(waitTime/1000)}초 후 진입`);
      await new Promise(r => setTimeout(r, waitTime));
    }
  }
}

const getAffineTransform = (src, dst) => {
  const A = [
    [src[0].x, src[0].y, 1],
    [src[1].x, src[1].y, 1],
    [src[2].x, src[2].y, 1]
  ];
  
  const solve3x3 = (M, B) => {
    const det = (m) => 
      m[0][0]*(m[1][1]*m[2][2] - m[1][2]*m[2][1]) -
      m[0][1]*(m[1][0]*m[2][2] - m[1][2]*m[2][0]) +
      m[0][2]*(m[1][0]*m[2][1] - m[1][1]*m[2][0]);
    
    const d = det(M);
    if (Math.abs(d) < 1e-6) return null; 
    
    const replaceCol = (m, colIdx, col) => {
      return m.map((row, rIdx) => {
        const newRow = [...row];
        newRow[colIdx] = col[rIdx];
        return newRow;
      });
    };
    
    const d0 = det(replaceCol(M, 0, B));
    const d1 = det(replaceCol(M, 1, B));
    const d2 = det(replaceCol(M, 2, B));
    
    return [d0 / d, d1 / d, d2 / d];
  };
  
  const solX = solve3x3(A, [dst[0].x, dst[1].x, dst[2].x]);
  const solY = solve3x3(A, [dst[0].y, dst[1].y, dst[2].y]);
  
  if (!solX || !solY) return null;
  return { a: solX[0], b: solY[0], c: solX[1], d: solY[1], e: solX[2], f: solY[2] };
};

const calculateETA = (smaQueueArr, remaining, concurrency) => {
  if (remaining === 0) return '마무리 단계...';
  if (smaQueueArr.length === 0) return '';
  const avgMs = smaQueueArr.reduce((a,b)=>a+b, 0) / smaQueueArr.length;
  const totalMs = (remaining * avgMs) / Math.min(concurrency, remaining);
  const estSec = Math.ceil(totalMs / 1000);
  if (estSec < 60) return `약 ${estSec}초 예상`;
  const m = Math.floor(estSec/60);
  const s = estSec%60;
  return `약 ${m}분 ${s>0 ? s+'초 ' : ''}예상`;
};

const parseRawText = (text, globalHeaderRef, currentArray, repObj) => {
  const isDatePattern = (str) => /\d{2,4}[.\-\/]\d{1,2}/.test(str);

  // ── [v0.27] JSON Lines 우선 파싱 ──────────────────────────────
  // 각 행을 {헤더명:값} 객체로 받으므로, 빈 칸이 빠져도 다른 칸이 밀리지 않음.
  // 코드는 'AI가 명시한 키'를 헤더 순서에 그대로 놓을 뿐, 값을 추측/이동하지 않음(무결성).
  const rawLines = text.split('\n').map(l => l.replace(/\r/g, '').trim()).filter(l => l.length > 0);
  let jsonRows = [];
  let jsonHeader = null;
  let jsonParsedCount = 0;
  for (const ln of rawLines) {
    if (!(ln.startsWith('{') || ln.startsWith('['))) continue;
    let obj;
    try { obj = JSON.parse(ln); } catch (e) { continue; }
    if (Array.isArray(obj)) {
      // 헤더 정의 줄 (컬럼명 배열)
      if (!jsonHeader && obj.length >= 2 && obj.every(v => typeof v === 'string')) {
        jsonHeader = obj.map(s => String(s).trim());
      }
      continue;
    }
    if (obj && typeof obj === 'object') { jsonRows.push(obj); jsonParsedCount++; }
  }

  if (jsonParsedCount > 0) {
    // 헤더 확정: 이번 청크 헤더 → 전역 헤더 → 객체 키 합집합 순
    if (jsonHeader && !globalHeaderRef.current) {
      globalHeaderRef.current = jsonHeader;
      currentArray.push(jsonHeader);
      repObj.headerFound = true;
    }
    let header = globalHeaderRef.current;
    if (!header) {
      const keyset = [];
      jsonRows.forEach(o => Object.keys(o).forEach(k => { if (!keyset.includes(k)) keyset.push(k); }));
      header = keyset;
      if (header.length >= 2) {
        globalHeaderRef.current = header;
        currentArray.push(header);
        repObj.headerFound = true;
      }
    }
    for (const o of jsonRows) {
      // 집계 행 방어: 값들 중 날짜 패턴이 하나도 없으면 스킵
      const vals = Object.values(o).map(v => v == null ? '' : String(v).trim());
      if (/소계|합계|총합|총계/.test(vals.join(' '))) continue;
      if (!vals.some(v => isDatePattern(v))) continue;
      // 헤더 순서대로 셀 구성. AI가 안 준 키 = 빈 칸(밀림 불가). 값 추측/이동 없음.
      const row = header.map(h => {
        const v = o[h];
        return (v === undefined || v === null) ? '' : String(v).trim();
      });
      currentArray.push(row);
      repObj.rows++;
    }
    return; // JSON 경로 성공 — 탭 파서로 내려가지 않음
  }

  // ── [폴백] 기존 탭 구분 파서 (JSON 파싱 0건일 때만) ──────────────
  const lines = text.split('\n').map(l => l.replace(/\r/g, '').trimEnd()).filter(l => l.trim().length > 0 && !l.match(/^[-=_]+$/));

  for (const line of lines) {
    const cols = line.split('\t').map(c => c.trim());
    if (/소계|합계|총합|총계/.test(cols[0]) && cols[0].length < 6) continue;
    
    const numericColsCount = cols.filter(c => {
      const cleanStr = c.replace(/[,/\-]/g, '').trim(); 
      return (cleanStr !== '' && !isNaN(cleanStr)) || isDatePattern(c);
    }).length;
    
    const hasHeaderKeyword = cols.some(c => /날짜|일자|이용일|이용일자|거래일|승인일/.test(c));

    if ((cols.length >= 3 && !isDatePattern(cols[0]) && numericColsCount <= 1) || hasHeaderKeyword) {
      if (!globalHeaderRef.current) { globalHeaderRef.current = cols; currentArray.push(cols); repObj.headerFound = true; }
      continue;
    }
    if (!cols.some(c => isDatePattern(c))) continue;

    currentArray.push(cols);
    repObj.rows++;
  }
};

const processResults = (resolved, currentArray, globalHeaderRef, newFailedTasks, rep, isCancelled) => {
  for (const res of resolved) {
    if (isCancelled) break;
    if (!res.success) {
      if (res.error.message !== '취소됨') newFailedTasks.push(res.task || { base64: res.base64, mimeType: res.mimeType, chunkIndex: res.chunkIndex, fileName: res.fileName, total: 1 });
      continue;
    }
    rep.reason = res.result.finishReason;
    rep.retries += (res.result.retries || 0);
    rep.tokens.prompt += res.result.tokens.prompt;
    rep.tokens.completion += res.result.tokens.completion;
    rep.tokens.total += res.result.tokens.total;
    rep.tokens.scout += res.scoutTokens || 0;
    parseRawText(res.result.text, globalHeaderRef, currentArray, rep);
  }
};

function useDB(key, init) {
  const [data, setData] = useState(init);
  const dbRef = useRef(null);
  const initRef = useRef(init);
  
  useEffect(() => {
    try {
      if (typeof window === 'undefined' || !window.indexedDB) return;
      const req = window.indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = (e) => {
        try {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
        } catch (err) {}
      };
      req.onsuccess = (e) => {
        try {
          dbRef.current = e.target.result;
          const g = dbRef.current.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).get(key);
          g.onsuccess = () => { if (g.result !== undefined) setData(g.result); };
        } catch (err) { console.warn("DB 읽기 실패(샌드박스):", err); }
      };
      req.onerror = () => console.warn("IndexedDB 접근 불가(샌드박스 환경)");
    } catch (e) { console.warn("IndexedDB 보안 차단(샌드박스 환경):", e); }
  }, [key]);

  const save = useCallback((d) => {
    setData(d);
    try { if (dbRef.current) dbRef.current.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).put(d, key); } catch(e) {}
  }, [key]);

  const clear = useCallback(() => {
    setData(initRef.current);
    try { if (dbRef.current) dbRef.current.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).delete(key); } catch(e) {}
  }, [key]);

  return [data, save, clear];
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, errorInfo) { console.error("React Rendering Error:", error, errorInfo); }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ backgroundColor: '#020617', color: '#f87171', padding: '3rem', minHeight: '100vh', fontFamily: 'sans-serif' }}>
          <h2 style={{ fontSize: '24px', fontWeight: 'bold', marginBottom: '1rem' }}>⚠️ 시스템 렌더링 오류 발생</h2>
          <p style={{ fontSize: '14px', marginBottom: '2rem', color: '#94a3b8' }}>화면을 그리는 도중 예상치 못한 오류가 발생했습니다. 아래 에러 로그를 확인해주세요.</p>
          <pre style={{ backgroundColor: '#450a0a', padding: '1rem', borderRadius: '8px', fontSize: '12px', overflowX: 'auto' }}>{this.state.error && this.state.error.toString()}</pre>
        </div>
      );
    }
    return this.props.children; 
  }
}

    let attempt = 1;

        clearTimeout(tid);

      } catch (err) {

            log(`⚠️ [페이지 ${chunkIndex}] 정찰 응답 없음 또는 파싱 불가 → JS 폴백`);
        } else if (!aiJson.deskew) {
            log(`⚠️ [페이지 ${chunkIndex}] 정찰 응답에 deskew 키 없음 → JS 폴백. 응답: ${JSON.stringify(aiJson).substring(0, 120)}`);
        } else {
            // [v0.30] raw 좌표 로그 — 진단용. 어떤 좌표를 받았는지 확인 가능.
            const d = aiJson.deskew;
            log(`🔭 [페이지 ${chunkIndex}] 정찰 좌표: date_top=${JSON.stringify(d.date_top)} date_bottom=${JSON.stringify(d.date_bottom)} amount_top=${JSON.stringify(d.amount_top)}`);

            if (!d.date_top || !d.date_bottom || !d.amount_top) {
                log(`⚠️ [페이지 ${chunkIndex}] 정찰 좌표 누락 (일부 키 null/없음) → JS 폴백`);
            } else {
                const w = item.width; const h = item.height;
                const toPx = (arr) => ({ x: (arr[0]/1000)*w, y: (arr[1]/1000)*h });

                const p1 = toPx(d.date_top);
                const p2 = toPx(d.date_bottom);
                p3 = toPx(d.amount_top);

                const srcPts = [p1, p2, p3];
                const dstPts = [{ x: p1.x, y: p1.y }, { x: p1.x, y: p2.y }, { x: p3.x, y: p1.y }];

                const aiMatrix = getAffineTransform(srcPts, dstPts);
                if (!aiMatrix) {
                    log(`⚠️ [페이지 ${chunkIndex}] affine 행렬 계산 실패 (점 3개가 일직선) → JS 폴백`);
                } else {
                    // [v0.30] isValid 임계값 0.3 → 0.5 완화. 최대 ~26도 기울기까지 허용.
                    // sin(26°) ≈ 0.44 < 0.5. 기존 0.3은 sin(17°) ≈ 0.29 수준으로 너무 엄격했음.
                    const isValid = Math.abs(aiMatrix.a - 1) < 0.5 && Math.abs(aiMatrix.d - 1) < 0.5
                                 && Math.abs(aiMatrix.b) < 0.5 && Math.abs(aiMatrix.c) < 0.5;
                    if (isValid) {
                        finalMatrix = aiMatrix;
                        finalMedianAngle = 0;
                        tableZone = { top: Math.min(p1.y, p3.y) - 50, bottom: p2.y + 50 };
                        log(`✅ [페이지 ${chunkIndex}] AI 정찰 성공 → affine 보정 적용`);
                    } else {
                        log(`⚠️ [페이지 ${chunkIndex}] isValid 탈락 (행렬값: a=${aiMatrix.a.toFixed(3)} b=${aiMatrix.b.toFixed(3)} c=${aiMatrix.c.toFixed(3)} d=${aiMatrix.d.toFixed(3)}) → JS 폴백`);
                    }
                }
            }
        }
    } catch(err) {
        log(`⚠️ [페이지 ${chunkIndex}] AI 정찰 예외 발생: ${err.message} → JS 폴백`);
    }

    // [v0.28] Pass 1.5 제거: 키-값 방식이 세로선·갭-스코어를 불필요하게 함

    // ── [v0.29 기획 2] 기울기 보정 신뢰도 로그 ──────────────────────────────
    // [v0.31 버그1] finalMatrix.b !== 0 조건 제거 → finalMatrix 존재 여부만 판단.
    // 기울기 0도 PDF에서 b,c가 부동소수점 0에 가까워 "보정 없음"으로 오판하던 버그 수정.
    let deskewInfo = { angleDeg: 0, anchorDist: 0, grade: '없음', path: 'none' };

    if (finalMatrix) {
      // finalMatrix 경로: affine 행렬에서 회전각 역산
      const angleDeg = parseFloat((Math.atan2(finalMatrix.b, finalMatrix.a) * (180 / Math.PI)).toFixed(2));
      // p1(date_top), p2(date_bottom) 앵커 간 거리 — 스카우트 성공 시에만 의미 있음
      let anchorDist = 0;
      if (aiJson && aiJson.deskew && aiJson.deskew.date_top && aiJson.deskew.date_bottom) {
        const w = item.width; const h = item.height;
        const toPx = (arr) => ({ x: (arr[0]/1000)*w, y: (arr[1]/1000)*h });
        const p1 = toPx(aiJson.deskew.date_top);
        const p2 = toPx(aiJson.deskew.date_bottom);
        const dx = p2.x - p1.x; const dy = p2.y - p1.y;
        anchorDist = Math.round(Math.sqrt(dx*dx + dy*dy));
      }
      const absAngle = Math.abs(angleDeg);
      const grade = (absAngle < 1.0 && anchorDist >= 300) ? '높음'
                  : (absAngle < 2.0 && anchorDist >= 200) ? '중간'
                  : '낮음';
      deskewInfo = { angleDeg, anchorDist, grade, path: 'finalMatrix' };
      log(`📐 [페이지 ${chunkIndex}] 기울기 보정: 회전각 ${angleDeg}도, 앵커 거리 ${anchorDist}px [신뢰도: ${grade}] (AI 정찰)`);

    } else if (finalMedianAngle !== null && finalMedianAngle !== undefined) {
      // JS 폴백 경로: 라디안→도 변환 (0도 포함 정상 처리)
      const angleDeg = parseFloat((finalMedianAngle * (180 / Math.PI)).toFixed(2));
      const absAngle = Math.abs(angleDeg);
      const grade = absAngle < 1.0 ? '중간' : '낮음'; // JS 폴백은 앵커 거리 미확보, 최대 중간
      deskewInfo = { angleDeg, anchorDist: 0, grade, path: 'jsAngle' };
      log(`📐 [페이지 ${chunkIndex}] 기울기 보정: 회전각 ${angleDeg}도, 앵커 거리 미확보 [신뢰도: ${grade}] (JS 폴백)`);

    } else {
      // 보정 없음
      deskewInfo = { angleDeg: 0, anchorDist: 0, grade: '없음', path: 'none' };
      log(`📐 [페이지 ${chunkIndex}] 기울기 보정: 보정 없음 (AI 정찰 실패, JS 폴백도 미작동)`);
    }
    // ────────────────────────────────────────────────────────────────────────

    try {
      // --- 다리미질(Warp) 및 고화질 가상선 렌더링 ---
      const img = new Image();
      img.src = 'data:image/jpeg;base64,' + item.rawBase64;
      await new Promise((r, rej) => { img.onload = r; img.onerror = rej; });

      const canvas = document.createElement('canvas');
      canvas.width = item.width; canvas.height = item.height;
      const ctx = canvas.getContext('2d');

      ctx.save();
      if (finalMatrix) {
          ctx.setTransform(finalMatrix.a, finalMatrix.b, finalMatrix.c, finalMatrix.d, finalMatrix.e, finalMatrix.f);
      } else if (finalMedianAngle !== null && finalMedianAngle !== undefined) {
          const cx = item.width / 2; const cy = item.height / 2;
          ctx.translate(cx, cy); ctx.rotate(-finalMedianAngle); ctx.translate(-cx, -cy);
      }
      ctx.drawImage(img, 0, 0);
      ctx.restore();

      

      const finalBase64 = canvas.toDataURL(task.mimeType, supportsWebP ? 0.85 : 0.9).split(',')[1];
      canvas.width = 0; canvas.height = 0;

      // --- Pass 2: 본대 투입 및 추출 ---
      // [v0.32] onExtractFired: acquire 직후 실제 요청 시점에 RPM 카운트
      const result = await callExtract(finalBase64, task.mimeType, chunkIndex, onExtractFired);
      if (extractReqId) markRequestEnd(extractReqId, result.tokens.total || 0);
      const duration = Date.now() - reqStart;
      log(`✅ [${fileName}] 청크 [${chunkIndex}] 추출 완료 (${(duration/1000).toFixed(1)}초)`);
      return { success: true, chunkIndex, result, base64: item.rawBase64, mimeType: task.mimeType, fileName, duration, scoutTokens, deskewInfo };
    } catch (err) {
      if (err.message !== '취소됨') log(`⚠️ [${fileName}] 청크 [${chunkIndex}] 최종 실패: ${err.message}`);
      return { success: false, chunkIndex, error: err, base64: item.rawBase64, mimeType: task.mimeType, fileName };
    }
  }, [callScout, callExtract, log, markRequestStart, markRequestEnd]);

  const handleProgressAndSMA = (duration, smaQueueArr) => {
    if (duration) {
      smaQueueArr.push(duration);
      if (smaQueueArr.length > 5) smaQueueArr.shift();
    }
    setProgress(prev => {
      const nextCur = prev.current + 1;
      const remaining = prev.total - nextCur;
      const estStr = calculateETA(smaQueueArr, remaining, CONFIG.CONCURRENCY_LIMIT) || prev.estimate;
      return { ...prev, current: nextCur, estimate: estStr };
    });
  };

  const prepareUpload = async (filesArray) => {
    if (!filesArray.length) return;
    if (!apiKey.trim()) { setErrorMsg('API Key를 입력해주세요.'); setStatus('error'); return; }
    cancelRef.current = false;
    const firstPdf = filesArray.find(f => f.type.includes('pdf'));

    if (firstPdf) {
      setStatus('loading_preview');
      try {
        log(`🔍 [${firstPdf.name}] 미리보기 생성을 위해 1페이지 렌더링 중...`);
        const base64 = await fileToBase64(firstPdf);
        const pdfData = atob(base64);
        const uint8Array = new Uint8Array(pdfData.length);
        for (let i = 0; i < pdfData.length; i++) uint8Array[i] = pdfData.charCodeAt(i);
        
        const pdf = await window.pdfjsLib.getDocument({ data: uint8Array }).promise;
        const page = await pdf.getPage(1);
        
        const viewport = page.getViewport({ scale: 300 / 72 });
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        canvas.width = viewport.width; canvas.height = viewport.height;
        ctx.filter = 'contrast(1.4) brightness(1.1)';
        await page.render({ canvasContext: ctx, viewport }).promise;
        ctx.filter = 'none';
        await new Promise(r => requestAnimationFrame(r));
        
        const mime = supportsWebP ? 'image/webp' : 'image/jpeg';
        const dataUrl = canvas.toDataURL(mime, supportsWebP ? 0.85 : 0.9);
        
        canvas.width = 0; canvas.height = 0;
        if (page.cleanup) page.cleanup();

        if (cancelRef.current) return;
        setPreviewInfo({ filesArray, dataUrl, rotation: 0 });
        setStatus('preview');
        log(`👀 미리보기 생성 완료. 방향 확정해 주세요.`);
      } catch (e) {
        if (!cancelRef.current) { log(`❌ 미리보기 생성 오류: ${e.message}`); setErrorMsg(e.message); setStatus('error'); }
      }
    } else {
      log(`📸 이미지 파일 업로드 감지: 직접 처리를 시작합니다.`);
      startProcessing(filesArray, 0);
    }
  };

  const initTracking = () => {
    setLiveStats({ slidingRpm: 0, slidingTpm: 0 });
    usageHistoryRef.current = [];
    grandTotalReqRef.current = 0;
    grandTotalTokensRef.current = 0;
    maxSlidingRpmRef.current = 0;
    setElapsed(0);
    const startTime = Date.now();
    timerRef.current = setInterval(() => {
      const now = Date.now();
      setElapsed(Math.floor((now - startTime) / 1000));
      const history = usageHistoryRef.current;
      usageHistoryRef.current = history.filter(i => now - i.ts <= 60000);
      const recent = usageHistoryRef.current;
      
      const slidingRpm = recent.length;
      const slidingTpm = recent.reduce((acc, cur) => acc + cur.tokens, 0);
      
      maxSlidingRpmRef.current = Math.max(maxSlidingRpmRef.current, slidingRpm);
      
      setLiveStats({ slidingRpm, slidingTpm });
    }, 1000);
  };

  const startProcessing = async (filesArray, globalRotation) => {
    setStatus('processing'); setPreviewInfo(null); cancelRef.current = false; activeRequestsRef.current.clear();
    reportRef.current = []; setFailedTasks([]);
    setProgress({ current: 0, total: 0, phase: 'prepare', estimate: '' });
    initTracking();

    const globalHeaderRef = { current: null };
    let current = [];
    if (append && rows.length > 0) {
      current = [...rows];
      if (current.length > 0) globalHeaderRef.current = current[0];
      log('📎 기존 데이터에 이어서 추가합니다.');
    } else {
      clearRows(); logsRef.current = [];
      log('🆕 새 작업 시작 (v0.34 중복 행 탐지 추가)');
    }

    let allFailedTasks = [];
    let smaQueue = [];

    try {
      const fileTasks = [];
      let totalChunks = 0;
      for (const file of filesArray) {
        if (cancelRef.current) break;
        const base64 = await fileToBase64(file);
        let mimeType = file.type || 'application/pdf';
        if (mimeType.includes('pdf')) {
          const pdfData = atob(base64);
          const uint8Array = new Uint8Array(pdfData.length);
          for (let i = 0; i < pdfData.length; i++) uint8Array[i] = pdfData.charCodeAt(i);
          const pdf = await window.pdfjsLib.getDocument({ data: uint8Array }).promise;
          totalChunks += pdf.numPages;
          fileTasks.push({ file, mimeType: supportsWebP ? 'image/webp' : 'image/jpeg', isPdf: true, pdf, base64: null });
        } else {
          totalChunks += 1;
          fileTasks.push({ file, mimeType, isPdf: false, pdf: null, base64 });
        }
      }

      setProgress({ current: 0, total: totalChunks, phase: 'extract', estimate: getInitialETAStr(totalChunks) });

      for (const task of fileTasks) {
        if (cancelRef.current) break;
        const fileStart = new Date();
        log(`📂 [${task.file.name}] JIT 렌더링 & 파이프라인 가동...`);
        
        const rep = { name: task.file.name, size: (task.file.size / 1024).toFixed(1) + 'KB', start: fileStart.toLocaleTimeString(), end: '', sec: 0, rows: 0, skipped: 0, headerFound: false, tokens: { prompt: 0, completion: 0, total: 0, scout: 0 }, retries: 0, reason: '' };
        let newFailedTasks = [];
        const renderQueue = [];
        const totalPages = task.isPdf ? task.pdf.numPages : 1;
        let renderDone = false;
        
        const renderProducer = (async () => {
          if (!task.isPdf) { 
              renderQueue.push({ rawBase64: task.base64, lowResBase64: task.base64, width: 1000, height: 1000, chunkIndex: 1, jsMatrix: null, jsMedianAngle: 0, jsGridXs: [], jsMethodUsed: "이미지 우회", textContentItems: [], viewport: null }); 
              return; 
          }
          const pdf = task.pdf;
          const rawCanvas = document.createElement('canvas'); const rawCtx = rawCanvas.getContext('2d', { willReadFrequently: true });
          const lowCanvas = document.createElement('canvas'); const lowCtx = lowCanvas.getContext('2d', { willReadFrequently: true });

          for (let i = 1; i <= totalPages; i++) {
            if (cancelRef.current) break;
            while (renderQueue.length >= CONFIG.CONCURRENCY_LIMIT + 1) {
              if (cancelRef.current) break;
              await new Promise(r => setTimeout(r, 100));
            }
            if (cancelRef.current) break;

            const page = await pdf.getPage(i);
            
            const viewport = page.getViewport({ scale: 300 / 72, rotation: (page.rotate + globalRotation) % 360 });
            rawCanvas.width = viewport.width; rawCanvas.height = viewport.height;
            rawCtx.clearRect(0, 0, rawCanvas.width, rawCanvas.height);
            rawCtx.filter = 'contrast(1.4) brightness(1.1)';
            await page.render({ canvasContext: rawCtx, viewport }).promise;
            rawCtx.filter = 'none';
            const rawBase64 = rawCanvas.toDataURL(task.mimeType, supportsWebP ? 0.85 : 0.9).split(',')[1];

            // [v0.30] 정찰용 중간 해상도: 72 DPI → 150 DPI. 스캔본 글자 가독성 확보.
            // 72 DPI(scale 1.0)는 스캔본에서 글자가 뭉개져 AI가 좌표를 못 찾는 원인이었음.
            // 300 DPI(본대)보다는 작아 토큰 절감 유지, 150 DPI로 타협점 확보.
            const midViewport = page.getViewport({ scale: 150 / 72, rotation: (page.rotate + globalRotation) % 360 });
            lowCanvas.width = midViewport.width; lowCanvas.height = midViewport.height;
            lowCtx.clearRect(0, 0, lowCanvas.width, lowCanvas.height);
            lowCtx.filter = 'contrast(1.3) brightness(1.05)';
            await page.render({ canvasContext: lowCtx, viewport: midViewport }).promise;
            lowCtx.filter = 'none';
            const lowResBase64 = lowCanvas.toDataURL('image/jpeg', 0.85).split(',')[1];

            let textContentItems = [];
            let jsMatrix = null; let jsMedianAngle = null; let jsGridXs = []; let jsMethodUsed = "실패";
            try {
              const textContent = await page.getTextContent();
              textContentItems = textContent.items; 
              
              const cx = viewport.width / 2; const cy = viewport.height / 2;
              const dateItems = []; const principalItems = [];
              const dateRegex = /\d{2,4}[.\-\/]\d{1,2}/;

              const preAssembledChunks = [];
              const rawItemsSorted = textContent.items.map(item => {
                  const pt = viewport.convertToViewportPoint(item.transform[4], item.transform[5]);
                  return { x: pt[0], y: pt[1], str: item.str };
              }).sort((a, b) => a.y - b.y || a.x - b.x);

              rawItemsSorted.forEach(item => {
                  if (item.str.trim() === '') return;
                  const chunk = preAssembledChunks.find(c => Math.abs(c.y - item.y) < 10 && item.x >= c.lastX - 10 && item.x - c.lastX < 50);
                  if (chunk) { chunk.str += item.str; chunk.lastX = item.x; } 
                  else { preAssembledChunks.push({ x: item.x, y: item.y, lastX: item.x, str: item.str }); }
              });

              preAssembledChunks.forEach(chunk => {
                const noSpaceStr = chunk.str.replace(/\s+/g, '');
                if (dateRegex.test(noSpaceStr)) dateItems.push({ x: chunk.x, y: chunk.y });
                if (chunk.x > viewport.width * 0.45) {
                  const isNumber = /^-?\d{1,3}(,\d{3})*원?$/.test(noSpaceStr) || /^-?\d+원?$/.test(noSpaceStr);
                  if (isNumber && !dateRegex.test(noSpaceStr) && noSpaceStr.length >= 3) principalItems.push({ x: chunk.x, y: chunk.y });
                }
              });

              dateItems.sort((a, b) => a.y - b.y); principalItems.sort((a, b) => a.y - b.y);

              const calcTilt = (items) => {
                const pairs = [];
                for (let a = 0; a < items.length; a++) {
                  for (let b = a + 1; b < items.length; b++) {
                    const dx = items[b].x - items[a].x; const dy = items[b].y - items[a].y;
                    if (dy > 40 && Math.abs(dx) < 150) pairs.push({ top: items[a], bottom: items[b], slope: Math.atan2(dx, dy) });
                  }
                }
                if (pairs.length === 0) return null;
                pairs.sort((a, b) => a.slope - b.slope);
                const medianSlope = pairs[Math.floor(pairs.length / 2)].slope;
                const bestPair = pairs.find(p => Math.abs(p.slope - medianSlope) < 0.01) || pairs[Math.floor(pairs.length / 2)];
                return { top: bestPair.top, bottom: bestPair.bottom, slope: medianSlope };
              };

              const dLine = calcTilt(dateItems); const pLine = calcTilt(principalItems);

              if (dLine && pLine) {
                const srcPts = [dLine.top, dLine.bottom, pLine.top];
                const dstPts = [{x: dLine.top.x, y: dLine.top.y}, {x: dLine.top.x, y: dLine.bottom.y}, {x: pLine.top.x, y: dLine.top.y}];
                jsMatrix = getAffineTransform(srcPts, dstPts);
                if (jsMatrix && (Math.abs(jsMatrix.a - 1) > 0.2 || Math.abs(jsMatrix.d - 1) > 0.2)) jsMatrix = null;
              }
              if (!jsMatrix && dLine && Math.abs(dLine.slope) <= 0.087) jsMedianAngle = dLine.slope;

            } catch(e) {}

            if (page.cleanup) page.cleanup();
            renderQueue.push({ rawBase64, lowResBase64, chunkIndex: i, width: viewport.width, height: viewport.height, jsMatrix, jsMedianAngle, jsGridXs, jsMethodUsed, textContentItems, viewport });
          }
          
          rawCanvas.width = 0; rawCanvas.height = 0; lowCanvas.width = 0; lowCanvas.height = 0;
        })();
        renderProducer.finally(() => { renderDone = true; });

        const executing = new Set();
        const chunkPromises = [];

        for (let j = 0; j < totalPages; j++) {
          if (cancelRef.current) break;
          while (renderQueue.length === 0) {
            if (cancelRef.current || renderDone) break;
            await new Promise(r => setTimeout(r, 100));
          }
          if (cancelRef.current || (renderDone && renderQueue.length === 0)) break;

          const item = renderQueue.shift();

          const p = executeChunkWorker('file', item, task, item.chunkIndex, task.file.name).then(res => {
            executing.delete(p);
            handleProgressAndSMA(res.duration, smaQueue);
            return { ...res, index: j };
          });

          chunkPromises.push(p);
          executing.add(p);
          if (executing.size >= CONFIG.CONCURRENCY_LIMIT) await Promise.race(executing);
        }

        await renderProducer;
        const resolved = await Promise.all(chunkPromises);
        resolved.sort((a, b) => a.index - b.index);

        processResults(resolved, current, globalHeaderRef, newFailedTasks, rep, cancelRef.current);

        allFailedTasks = [...allFailedTasks, ...newFailedTasks];
        saveRows([...current]);
        
        rep.end = new Date().toLocaleTimeString();
        rep.sec = Math.floor((new Date() - fileStart) / 1000);
        reportRef.current.push(rep);
        log(`🏁 [${task.file.name}] 파일 분석 완료 — ${rep.rows}행 추출`);
      }

      setFailedTasks(allFailedTasks);
      if (!cancelRef.current) {
        if (current.length === 0 && allFailedTasks.length === 0) throw new Error('추출된 데이터가 없습니다.');
        setStatus('success');
      }
    } catch (e) {
      if (!cancelRef.current) { log(`❌ 오류: ${e.message}`); setErrorMsg(e.message); setStatus('error'); }
    } finally { clearInterval(timerRef.current); }
  };

  const handleRetryFailed = async () => {
    if (!failedTasks.length) return;
    setStatus('processing'); cancelRef.current = false; activeRequestsRef.current.clear();
    initTracking();
    let smaQueue = [];

    try {
      setProgress({ current: 0, total: failedTasks.length, phase: 'extract', estimate: getInitialETAStr(failedTasks.length) });
      const tasksToRetry = [...failedTasks];
      setFailedTasks([]);
      const globalHeaderRef = { current: rows.length > 0 ? rows[0] : null };
      let current = [...rows];
      log(`♻️ 누락된 ${tasksToRetry.length}개 청크 재시도 시작...`);

      const executing = new Set();
      const chunkPromises = [];
      let newFailedTasks = [];

      for (let j = 0; j < tasksToRetry.length; j++) {
        if (cancelRef.current) break;
        const task = tasksToRetry[j];
        
        const mockItem = { rawBase64: task.base64, lowResBase64: task.base64, chunkIndex: task.chunkIndex, width: 1000, height: 1000, jsMatrix: null, jsMedianAngle: 0, jsGridXs: [], jsMethodUsed: "재시도", textContentItems: [], viewport: null };
        
        const p = executeChunkWorker('retry', mockItem, task, task.chunkIndex, task.fileName).then(res => {
            executing.delete(p);
            handleProgressAndSMA(res.duration, smaQueue);
            return { ...res, index: j, task };
        });

        chunkPromises.push(p);
        executing.add(p);
        if (executing.size >= CONFIG.CONCURRENCY_LIMIT) await Promise.race(executing);
      }

      const resolved = await Promise.all(chunkPromises);
      resolved.sort((a, b) => a.index - b.index);

      const rep = { rows: 0, skipped: 0, headerFound: false, tokens: { prompt: 0, completion: 0, total: 0, scout: 0 }, retries: 0, reason: '' };
      processResults(resolved, current, globalHeaderRef, newFailedTasks, rep, cancelRef.current);

      saveRows([...current]);
      setFailedTasks(newFailedTasks);
      reportRef.current.push({ ...rep, name: '[재시도 세션]', size: '-', start: new Date().toLocaleTimeString(), end: new Date().toLocaleTimeString(), sec: 0 });
      log(`🏁 재시도 완료 — ${rep.rows}행 추가, ${newFailedTasks.length}건 재실패`);
      if (!cancelRef.current) setStatus('success');
    } catch (e) {
      if (!cancelRef.current) { log(`❌ 재시도 중 치명적인 오류: ${e.message}`); setErrorMsg(e.message); setStatus('error'); }
    } finally { clearInterval(timerRef.current); }
  };

  const handleFiles = (e) => {
    const files = Array.from(e.target.files);
    if (fileRef.current) fileRef.current.value = '';
    prepareUpload(files);
  };

  const handleCancel = () => {
    cancelRef.current = true;
    activeRequestsRef.current.forEach(c => c.abort());
    activeRequestsRef.current.clear();
    clearInterval(timerRef.current);
    setStatus('idle'); setPreviewInfo(null);
    log('🛑 작업을 취소했습니다.');
  };

  const download = () => {
    if (!rows.length) return;

    // [v0.33] 1. 원본 rows 깊은 복사 → 원본 오염 방지
    const exportRows = rows.map(r => [...r]);

    // [v0.33] 2. 헤더 마지막에 "⚠️ 시스템 검토" 컬럼 추가
    exportRows[0] = [...exportRows[0], '⚠️ 시스템 검토'];

    // [v0.33] 3. 금액 열 인덱스 탐지 (/금액|원금|단가|합계/ 패턴)
    const header = rows[0];
    const amountColIdxs = header.reduce((acc, h, i) => {
      if (/금액|원금|단가|합계/.test(String(h))) acc.push(i);
      return acc;
    }, []);

    // [v0.34] 조건 C용 열 인덱스 동적 탐지
    const dateIdx    = header.findIndex(h => /날짜|일자|이용일/.test(String(h)));
    const storeIdx   = header.findIndex(h => /가맹점|상호|거래처/.test(String(h)));
    const amountIdx  = header.findIndex(h => /원금|결제금액/.test(String(h)));
    const installIdx = header.findIndex(h => /할부|회차/.test(String(h)));
    const seenKeys   = new Set();

    // [v0.33] 4~5. 데이터 행 순회 → 의심 조건 검사 → 시스템 검토 셀 삽입
    for (let i = 1; i < exportRows.length; i++) {
      const row = exportRows[i];
      const warnings = [];

      // 조건 A: 금액 열이 존재하는데 전부 비거나 0인 경우
      if (amountColIdxs.length > 0) {
        const allEmpty = amountColIdxs.every(idx => {
          const v = String(row[idx] ?? '').trim();
          return v === '' || v === '0';
        });
        if (allEmpty) warnings.push('결제금액 누락 의심');
      }

      // 조건 B: 값이 있는 셀이 2개 이하인 경우
      const filledCount = row.filter(v => String(v ?? '').trim() !== '').length;
      if (filledCount <= 2) warnings.push('데이터 유실 의심');

      // [v0.34] 조건 C: 중복 행 탐지
      // 날짜+가맹점+원금+할부회차 조합이 이미 등장한 경우
      // 할부회차 열 없으면 3개 키로 축소 (카드사 범용 대응)
      if (dateIdx >= 0 && storeIdx >= 0 && amountIdx >= 0) {
        const keyParts = [
          String(row[dateIdx]  ?? '').trim(),
          String(row[storeIdx] ?? '').trim(),
          String(row[amountIdx]?? '').trim(),
          installIdx >= 0 ? String(row[installIdx] ?? '').trim() : ''
        ];
        // 날짜·가맹점·원금 모두 비어있으면 키 생성 무의미 → 스킵
        if (keyParts[0] || keyParts[1] || keyParts[2]) {
          const rowKey = keyParts.join('|');
          if (seenKeys.has(rowKey)) {
            warnings.push('중복 행 의심');
          } else {
            seenKeys.add(rowKey);
          }
        }
      }

      // 시스템 검토 열 삽입
      exportRows[i] = [...row, warnings.join(', ')];
    }

    // [v0.33] 6. exportRows로 시트 생성
    const ws = XLSX.utils.aoa_to_sheet(exportRows);

    // [v0.32] isRealMoney: 텍스트 패턴 기반 금액 판별. 헤더명 방식 폐기.
    const isRealMoney = (str) => {
      if (typeof str !== 'string' || str.trim() === '') return false;
      const s = str.trim();
      if (s.includes('/') || s.includes('-')) return false;
      if (s !== '0' && /^0\d/.test(s)) return false;
      const noComma = s.replace(/,/g, '');
      if (!s.includes(',') && /^\d+$/.test(noComma) && noComma.length >= 10) return false;
      return /^-?\d{1,3}(,\d{3})*(\.\d+)?$/.test(s) || /^-?\d+(\.\d+)?$/.test(s);
    };

    // [v0.33] 7. isRealMoney 서식 적용 (exportRows 기준)
    const range = XLSX.utils.decode_range(ws['!ref']);
    for (let R = range.s.r; R <= range.e.r; ++R) {
      for (let C = range.s.c; C <= range.e.c; ++C) {
        const cellAddr = XLSX.utils.encode_cell({ c: C, r: R });
        const cell = ws[cellAddr];
        if (!cell) continue;
        if (isRealMoney(cell.v)) {
          const num = Number(String(cell.v).replace(/,/g, ''));
          if (!isNaN(num)) { cell.v = num; cell.t = 'n'; cell.z = '#,##0'; }
        } else if (typeof cell.v === 'string') {
          cell.t = 's';
        }
      }
    }

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '카드내역_RAW');
    XLSX.writeFile(wb, `카드내역_RAW_${stamp()}.xlsx`);

    // 경고 행 집계 로그
    const warnCount = exportRows.slice(1).filter(r => r[r.length - 1] !== '').length;
    log(`💾 Raw 엑셀 다운로드 — ${rows.length - 1}행 (시스템 검토: ${warnCount}건 경고)`);
  };

  const downloadLog = () => {
    if (!logsRef.current.length) return;
    let txt = '=================================================\n        [ OCR PURE v0.34 작업 리포트 ]\n=================================================\n\n';
    let grandPrompt = 0, grandCompletion = 0, grandTokens = 0, grandScout = 0;
    reportRef.current.forEach((r, i) => {
      txt += `📄 [${i+1}] ${r.name} (${r.size})\n  - 시간: ${r.start} ~ ${r.end} (${r.sec}초)\n  - 추출: ${r.rows}행 / 헤더감지: ${r.headerFound ? 'O' : 'X'}\n  - 상태: ${r.reason} (재시도 ${r.retries}회)\n  - 🪙 토큰: 정찰대(${r.tokens.scout.toLocaleString()}) + 입력(${r.tokens.prompt.toLocaleString()}) + 출력(${r.tokens.completion.toLocaleString()}) = 총(${r.tokens.total.toLocaleString()})\n-------------------------------------------------\n`;
      grandPrompt += r.tokens.prompt; grandCompletion += r.tokens.completion; grandTokens += r.tokens.total; grandScout += r.tokens.scout;
    });
    
    const totalCostKRW = Math.round(((grandPrompt / 1000000) * 0.25 + (grandCompletion / 1000000) * 1.50) * 1500);
    const totalPages = grandTotalReqRef.current;
    const costPerPage = totalPages > 0 ? Math.round(totalCostKRW / totalPages) : 0;
    
    txt += `\n▶ 총 소요: ${elapsed}초\n▶ 누적 토큰: 정찰(${grandScout.toLocaleString()}) + 본대입력(${grandPrompt.toLocaleString()}) + 본대출력(${grandCompletion.toLocaleString()}) = 총(${(grandTokens + grandScout).toLocaleString()})\n\n▶ 예상 비용 (3.1 Flash-Lite, 환율 1,500원 고정)\n  - 총 비용: 약 ${totalCostKRW.toLocaleString()}원\n  - 페이지당: 약 ${costPerPage.toLocaleString()}원 (총 ${totalPages}페이지 기준)\n\n▶ 트래픽 속도 분석 (실시간 이동평균)\n`;
    if (elapsed > 0) {
      txt += `  - 60초 윈도우 내 최대 누적 요청: ${maxSlidingRpmRef.current} (정찰 큐 4 + 본대 큐 4 = 합산 8. 응답 지연분 포함되어 일시적으로 초과 표시될 수 있음)\n  - 트래픽 방어: 정찰(scoutRateLimitQueue 4개)·본대(globalRateLimitQueue 4개) 분리 운영. 실제 API 차단(429) 0건이면 정상.\n`;
    }
    txt += `\n=== 실행 로그 ===\n` + logsRef.current.join('\n');
    const url = URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' }));
    const a = document.createElement('a'); a.href = url; a.download = `OCR_Report_${stamp()}.txt`; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 150);
  };

  const progressPercent = progress.total > 0 ? Math.round((progress.current / progress.total) * 100) : 0;

  const renderMonitoringUI = () => {

    return (
      <div className="mt-6 pt-5 border-t border-slate-800 animate-in fade-in">

          <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Real-time API Usage Monitoring</p>
        </div>
        <div className="grid grid-cols-1 gap-3">
          <div className={`bg-slate-900/50 border p-3.5 rounded-xl transition-all ${rpmWarn || tpmWarn ? 'border-rose-500/40 shadow-[0_0_15px_rgba(244,63,94,0.1)]' : 'border-indigo-500/30 shadow-[0_0_10px_rgba(99,102,241,0.05)]'}`}>
            <div className="flex justify-between items-center mb-2">
              <span className="text-xs font-bold text-indigo-300">최근 60초 실시간 (Sliding Window)</span>
              {(rpmWarn || tpmWarn) && <span className="text-[9px] px-1.5 py-0.5 rounded bg-rose-500/20 text-rose-400 font-bold border border-rose-500/30 animate-pulse">Limit Reached</span>}
            </div>
            <div className="flex justify-between items-end text-[11px]">
              <div className="flex flex-col">
                 <span className="text-[9px] text-slate-500 mb-0.5">Live RPM (정찰 4 + 본대 4 = 합산 8)</span>
                 <div className="flex items-baseline gap-2">
                    <span className={`${rpmWarn ? 'text-rose-400' : 'text-white'} font-black text-lg`}>{slidingRpm} <span className="text-[10px] text-slate-400 font-medium">회</span></span>
                    <span className="text-[9px] text-slate-500">정찰+본대 각각 카운트. 응답 지연 시 8을 일시 초과 가능 (정상)</span>
                 </div>
              </div>
              <div className="flex flex-col items-end">
                 <span className="text-[9px] text-slate-500 mb-0.5">Live TPM (Max 250k)</span>
                 <span className={`${tpmWarn ? 'text-rose-400' : 'text-white'} font-black text-lg`}>{slidingTpm.toLocaleString()} <span className="text-[10px] text-slate-400 font-medium">토큰</span></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div className="min-h-screen bg-[#020617] text-slate-300 p-6 md:p-12 flex justify-center">
      <div className="max-w-3xl w-full space-y-8">

        {/* 헤더 */}
        <header className="flex flex-col md:flex-row md:items-center justify-between gap-6 border-b border-slate-800 pb-8">
          <div className="flex items-center gap-4">
            <div className="bg-indigo-600 p-3 rounded-2xl shadow-lg"><Icons.Doc className="w-9 h-9 text-cyan-300" /></div>
            <div>
              <h1 className="text-3xl font-black text-white tracking-tight">OCR by 3.1 lite <span className="text-indigo-400 text-lg">v0.34</span></h1>
              <p className="text-xs text-slate-500 font-bold tracking-widest uppercase mt-1">Enterprise Architecture</p>
            </div>
          </div>
          {rows.length > 1 && (
            <div className="bg-slate-900 border border-slate-700 px-5 py-3 rounded-2xl text-right shrink-0">
              <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">추출된 행</p>
              <p className="text-xl font-black text-indigo-400">{rows.length - 1}</p>
            </div>
          )}
        </header>

        {/* 메인 카드 */}
        <div className="bg-[#0b1220] border border-slate-800 rounded-3xl p-8 shadow-2xl">
          <div className="mb-8 space-y-3">
            <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
              <Icons.Key className="w-3.5 h-3.5" /> Vertex AI API Key
            </label>
            <input type="password" value={apiKey} onChange={(e) => { setApiKey(e.target.value); try { window.localStorage.setItem('ocr_api_key', e.target.value); } catch(err) {} }} placeholder="API 키를 입력하세요" className="w-full bg-[#020617] border border-slate-700 rounded-2xl py-4 px-6 text-sm font-mono text-cyan-300 focus:outline-none focus:border-indigo-500 transition-all" />
          </div>

          {(status === 'loading_scripts' || status === 'loading_preview') && (
            <div className="flex flex-col items-center justify-center py-16 gap-4 animate-in fade-in">
              <Icons.Spinner className="w-12 h-12 text-indigo-500 animate-spin" />
              <p className="text-xs text-slate-500 font-semibold">{status === 'loading_scripts' ? 'v0.27 엔진 로딩 중…' : '첫 페이지 미리보기 생성 중…'}</p>
            </div>
          )}

          {status === 'preview' && previewInfo && (
            <div className="space-y-6 animate-in zoom-in-95 fade-in duration-300">
              <div className="text-center space-y-2">
                <h2 className="text-2xl font-black text-white">문서 방향 확인</h2>
                <p className="text-sm text-slate-400">명세서의 글자가 똑바로 보이도록 회전한 뒤 시작해주세요.</p>
              </div>
              <div className="bg-slate-900/50 border border-slate-700 rounded-3xl p-6 flex flex-col items-center justify-center gap-6">
                <div className="w-full h-[60vh] max-h-[400px] flex items-center justify-center bg-[#020617] rounded-xl border border-slate-800 relative overflow-hidden shadow-inner">
                   <img src={previewInfo.dataUrl} alt="preview" className="max-w-[85%] max-h-[85%] transition-transform duration-500 ease-in-out origin-center" style={{ transform: `rotate(${previewInfo.rotation}deg)` }} />
                </div>
                <div className="flex items-center gap-6">
                  <button onClick={() => setPreviewInfo(p => ({ ...p, rotation: (p.rotation - 90 + 360) % 360 }))} className="bg-slate-800 hover:bg-slate-700 text-white p-4 rounded-2xl transition-all shadow-lg active:scale-95 flex items-center gap-2"><Icons.RotateLeft className="w-5 h-5" /><span className="text-xs font-bold pr-1">좌회전</span></button>
                  <button onClick={() => setPreviewInfo(p => ({ ...p, rotation: (p.rotation + 90) % 360 }))} className="bg-slate-800 hover:bg-slate-700 text-white p-4 rounded-2xl transition-all shadow-lg active:scale-95 flex items-center gap-2"><span className="text-xs font-bold pl-1">우회전</span><Icons.RotateRight className="w-5 h-5" /></button>
                </div>
              </div>
              <div className="space-y-3 pt-2">
                <button onClick={() => startProcessing(previewInfo.filesArray, previewInfo.rotation)} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-black text-base shadow-xl transition-all active:scale-95 flex items-center justify-center gap-2">이 방향으로 시작<Icons.Play className="w-5 h-5" /></button>
                <button onClick={() => { setStatus('idle'); setPreviewInfo(null); }} className="w-full bg-transparent text-slate-500 hover:text-slate-300 py-4 rounded-2xl text-sm font-bold transition-all">취소 및 다시 올리기</button>
              </div>
            </div>
          )}

          {status === 'idle' && (
            <div className="space-y-6">
              <label className="block cursor-pointer group rounded-2xl border border-slate-700/80 bg-slate-900/40 p-4 hover:border-slate-600 transition-colors">
                <div className="flex items-center gap-3">
                  <input type="checkbox" checked={append} onChange={e => setAppend(e.target.checked)} className="h-4 w-4 rounded border-slate-600 bg-slate-900 text-indigo-500" />
                  <span className="text-[13px] text-slate-400 leading-snug"><span className="text-slate-200 font-semibold group-hover:text-white">기존 데이터에 이어 붙이기</span><br /><span className="text-[11px] text-slate-500">여러 파일을 한 시트에 합칠 때 체크하세요.</span></span>
                </div>
              </label>

              <div className={`border-2 border-dashed rounded-[2.5rem] p-16 text-center transition-all cursor-pointer group flex flex-col items-center ${isDragging ? 'border-indigo-400 bg-indigo-900/30 shadow-[0_0_30px_rgba(99,102,241,0.2)]' : 'border-slate-700 hover:border-indigo-500 hover:bg-slate-900/50'}`} onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }} onDragLeave={(e) => { e.preventDefault(); setIsDragging(false); }} onDrop={(e) => { e.preventDefault(); setIsDragging(false); if (e.dataTransfer.files?.length > 0) prepareUpload(Array.from(e.dataTransfer.files)); }} onClick={() => fileRef.current?.click()}>
                <Icons.Upload className={`w-16 h-16 mb-4 transition-transform ${isDragging ? 'text-indigo-400 -translate-y-2 scale-110' : 'text-slate-500 group-hover:text-indigo-400 group-hover:-translate-y-1'}`} />

              {rows.length > 1 && (

            </div>
          )}

          {status === 'processing' && (
            <div className="space-y-8 py-6">
              <div className="flex flex-col sm:flex-row sm:justify-between sm:items-end gap-6">
                <div className="flex-1 w-full">
                  <p className="text-xs text-indigo-500 font-bold uppercase tracking-widest mb-2 animate-pulse">{progress.phase === 'prepare' ? 'JIT Backpressure Ready' : 'Streaming Extraction Running'}</p>
                  <p className="text-3xl sm:text-4xl font-black text-white mb-6">{progress.phase === 'prepare' ? '문서 분석 준비 중…' : '가장 안전한 병렬 추출 중…'}</p>
                  
                  {progress.phase !== 'idle' && (
                    <div className="w-full max-w-sm">
                      {progress.phase === 'extract' ? (
                        <>
                          <div className="w-full bg-slate-800 rounded-full h-2.5 mb-2 overflow-hidden shadow-inner"><div className="bg-indigo-500 h-2.5 rounded-full transition-all duration-300 ease-out" style={{ width: `${progressPercent}%` }}></div></div>
                          <p className="text-[11px] text-indigo-300/80 font-medium tracking-wide flex justify-between"><span>전체 {progress.total}장 중 <span className="text-white font-bold">{progress.current}장</span> 완료 ({progressPercent}%)</span>{progress.estimate && <span className="text-indigo-400 font-bold">{progress.estimate}</span>}</p>
                        </>
                      ) : (
                        <div className="flex items-center gap-3"><Icons.Spinner className="w-5 h-5 text-indigo-400 animate-spin" /><p className="text-[12px] text-indigo-300/80 font-medium tracking-wide"><span className="text-white font-bold">{progress.estimate}</span></p></div>
                      )}
                    </div>
                  )}
                </div>
                <div className="text-right shrink-0">
                  <Icons.Spinner className="w-12 h-12 text-indigo-500 mb-2 ml-auto animate-spin" />
                  <span className="text-xs font-bold text-slate-500 tabular-nums">{elapsed}초 경과</span>
                </div>
              </div>
              
              {renderMonitoringUI()}
              <button onClick={handleCancel} className="w-full bg-slate-900 text-rose-500 py-4 rounded-2xl font-black border border-slate-800 text-xs hover:bg-rose-950/20 transition-all">작업 일괄 취소</button>
            </div>
          )}

          {status === 'success' && (
            <div className="space-y-6 py-4">
              <div className="bg-emerald-950/20 border border-emerald-800/30 p-6 rounded-3xl flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                <div className="flex items-center gap-4">
                  <Icons.Check className="w-10 h-10 text-emerald-500 shrink-0" />
                  <div>
                    <p className="text-sm font-bold text-emerald-400 uppercase tracking-widest">완료</p>
                    <span className="inline-flex items-center gap-1.5 bg-emerald-900/30 text-emerald-300 px-3 py-1.5 rounded-lg text-[11px] font-bold border border-emerald-800/50 mt-2">⏱ {elapsed}초 소요</span>
                  </div>
                </div>
                <span className="bg-emerald-500/10 px-4 py-2 rounded-xl border border-emerald-500/20 text-xs font-black text-emerald-400 shrink-0">{rows.length - 1} ROWS</span>
              </div>

              {failedTasks.length > 0 && (
                <div className="bg-amber-950/20 border border-amber-900/50 p-5 rounded-2xl flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
                  <div className="flex items-center gap-3 text-amber-400">
                    <Icons.Warning className="w-8 h-8 shrink-0" />
                    <div><p className="text-sm font-black">일부 페이지 누락</p><p className="text-xs text-amber-500/80 mt-1"><span className="font-bold text-amber-300">{failedTasks.length}개</span> 청크 실패</p></div>
                  </div>
                  <button onClick={handleRetryFailed} className="bg-amber-600 hover:bg-amber-500 text-white text-xs font-bold px-5 py-3 rounded-xl transition-all flex items-center gap-2"><Icons.Retry className="w-4 h-4" /> 누락 청크 재시도</button>
                </div>
              )}

              {renderMonitoringUI()}

              {(() => {
                let gp = 0, gc = 0; reportRef.current.forEach(r => { gp += r.tokens.prompt; gc += r.tokens.completion; });
                const totalCostKRW = Math.round(((gp / 1000000) * 0.25 + (gc / 1000000) * 1.50) * 1500);
                const totalPages = grandTotalReqRef.current;
                const costPerPage = totalPages > 0 ? Math.round(totalCostKRW / totalPages) : 0;
                if (gp === 0 && gc === 0) return null;
                return (
                  <div className="bg-slate-900/40 border border-slate-700/50 rounded-2xl p-5">
                    <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">예상 비용 (3.1 Flash-Lite, 환율 1,500원 고정)</p>
                    <div className="flex items-end justify-between">
                      <div><p className="text-2xl font-black text-cyan-300">약 {totalCostKRW.toLocaleString()}원</p></div>
                      <div className="text-right text-[11px] text-slate-500 leading-relaxed"><p>페이지당 약 {costPerPage.toLocaleString()}원</p><p>(총 {totalPages}페이지 기준)</p></div>
                    </div>
                  </div>
                );
              })()}

              <button onClick={download} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-5 rounded-2xl font-black text-base shadow-xl flex items-center justify-center gap-3 transition-all active:scale-95"><Icons.Download className="w-6 h-6 text-cyan-300" /> 엑셀 다운로드 (스마트 서식 적용)</button>
              <div className="grid grid-cols-3 gap-3">
                <button onClick={() => { setStatus('idle'); setLiveStats({ slidingRpm: 0, slidingTpm: 0 }); usageHistoryRef.current = []; grandTotalReqRef.current = 0; grandTotalTokensRef.current = 0; maxSlidingRpmRef.current = 0; }} className="bg-slate-800 py-3.5 rounded-2xl text-xs font-bold text-slate-300 hover:bg-slate-700 transition-all">새 작업</button>
                <button onClick={downloadLog} className="bg-slate-800 py-3.5 rounded-2xl text-xs font-bold text-cyan-300 hover:bg-slate-700 transition-all border border-slate-600">리포트</button>
                <button onClick={() => { clearRows(); setStatus('idle'); setLiveStats({ slidingRpm: 0, slidingTpm: 0 }); usageHistoryRef.current = []; grandTotalReqRef.current = 0; grandTotalTokensRef.current = 0; maxSlidingRpmRef.current = 0; }} className="bg-rose-950/10 py-3.5 rounded-2xl text-xs font-bold text-rose-700 border border-rose-900/20 hover:bg-rose-950/30 transition-all">초기화</button>
              </div>
            </div>
          )}

          {status === 'error' && (
            <div className="py-6">
              <div className="bg-rose-950/20 border border-rose-900/30 p-6 rounded-3xl space-y-4">
                <div className="flex items-center gap-3 text-rose-500"><Icons.Warning className="w-8 h-8" /><p className="text-sm font-bold uppercase tracking-widest">오류 발생</p></div>
                <p className="text-[11px] font-bold text-rose-400/90 bg-rose-950/40 p-4 rounded-xl break-all">{errorMsg}</p>
              </div>
              <div className="grid grid-cols-2 gap-3 mt-6">
                <button onClick={() => { setStatus('idle'); setLiveStats({ slidingRpm: 0, slidingTpm: 0 }); usageHistoryRef.current = []; grandTotalReqRef.current = 0; grandTotalTokensRef.current = 0; maxSlidingRpmRef.current = 0; }} className="w-full bg-slate-800 py-4 rounded-2xl text-xs font-bold text-white">돌아가기</button>
                <button onClick={downloadLog} className="w-full bg-slate-800 py-4 rounded-2xl text-xs font-bold text-slate-300">로그 다운로드</button>
              </div>
            </div>
          )}
        </div>

        {/* 로그 패널 */}
        <div className="bg-[#0b1220] border border-slate-800 rounded-3xl p-6 h-64 flex flex-col shadow-lg">
          <div className="flex items-center justify-between mb-4">
            <div className="flex items-center gap-4">
              <h3 className="text-[10px] font-black text-slate-600 uppercase tracking-[0.2em]">System Logs</h3>
              <button onClick={downloadLog} className="bg-slate-800 hover:bg-slate-700 text-slate-300 text-[10px] font-bold px-3 py-1.5 rounded-lg transition-colors border border-slate-700/50">리포트 추출</button>
            </div>
            <span className="bg-indigo-500/10 border border-indigo-500/20 px-3 py-1 rounded-lg text-[9px] font-black text-indigo-400">Enterprise Core Active</span>
          </div>
          <div className="flex-1 overflow-y-auto space-y-2 scrollbar font-mono text-[10px]">
            {logs.length === 0 && <p className="text-slate-600">로그가 여기에 표시됩니다.</p>}
            {logs.map((l, i) => (
              <p key={i} className={i === 0 ? 'text-indigo-400 font-bold' : l.includes('❌') || l.includes('⚠️') || l.includes('🚦') || l.includes('⏳') ? 'text-rose-400' : 'text-slate-500'}>{l}</p>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary><App /></ErrorBoundary>
);
</script>
</body>
</html>
