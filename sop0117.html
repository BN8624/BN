const getLevenshteinDistance = (a, b) => {
  const matrix = [];
  for (let i = 0; i <= a.length; i++) matrix[i] = [i];

  for (let i = 1; i <= a.length; i++) {

class SlidingWindowQueue {
  constructor(limit, windowMs, logFn) { this.limit = limit; this.windowMs = windowMs; this.timestamps = []; this.logFn = logFn || (()=>{}); }
  async acquire(cancelRef) {
    while (true) {
      if (cancelRef?.current) throw new Error('취소됨');
      const now = Date.now();
      this.timestamps = this.timestamps.filter(t => now - t < this.windowMs);
      if (this.timestamps.length < this.limit) { this.timestamps.push(now); return; }
      const wait = this.windowMs - (now - this.timestamps[0]) + 20;
      this.logFn(`⏳ [물레방아 대기] ${Math.ceil(wait/1000)}초 후 진입`);

const parseRawText = (text, fileHeaderRef, currentArray, repObj) => {
  const rawLines = text.split('\n').map(l => l.replace(/\r/g, '').trim()).filter(Boolean);
  let jsonRows = [], jsonHeader = null;

  for (const ln of rawLines) {
    if (!(ln.startsWith('{') || ln.startsWith('['))) continue;
    let obj; try { obj = JSON.parse(ln); } catch(e) { continue; }
    if (Array.isArray(obj)) { if (!jsonHeader && obj.length>=2 && obj.every(v=>typeof v==='string')) jsonHeader = obj.map(s=>String(s).trim()); continue; }
    if (obj && typeof obj === 'object') jsonRows.push(obj);
  }

  if (jsonRows.length > 0) {
    if (jsonHeader && !fileHeaderRef.current) {
      fileHeaderRef.current = jsonHeader;
      currentArray.push(jsonHeader); // [FIX] 치명적 누락 복구! (배열에 헤더 넣기)
      repObj.headerFound = true;
    }

      if (keyset.length >= 2) {
        fileHeaderRef.current = keyset;
        currentArray.push(keyset); // [FIX] 치명적 누락 복구! (배열에 헤더 넣기)
        repObj.headerFound = true;
      }
    }
    const header = fileHeaderRef.current;
    if (!header) return;

    let parsed = 0;
    for (const o of jsonRows) {
      if (o.__skip === true) continue;
      const vals = Object.keys(o).filter(k=>k!=='__skip').map(k=>(o[k]==null?'':String(o[k]).trim()));
      if (vals.every(v=>v==='')) continue;
      if (AGGREGATE_RE.test(vals[0] || '')) continue;
      currentArray.push(header.map(h => (o[h] === undefined || o[h] === null) ? '' : String(o[h]).trim()));
      repObj.rows++; parsed++;
    }
    repObj.jsonParsed = (repObj.jsonParsed || 0) + parsed; repObj.tabFallback = false;
    return;
  }

  repObj.tabFallback = true;
  const lines = text.split('\n').map(l=>l.replace(/\r/g,'').trimEnd()).filter(l=>l.trim().length>0 && !l.match(/^[-=_*]+$/));
  for (const line of lines) {
    const cols = line.split('\t').map(c=>c.trim());
    if (cols.length < 2 || AGGREGATE_RE.test(cols[0])) continue;

    if (isHeader) { if (!fileHeaderRef.current) { fileHeaderRef.current = cols; currentArray.push(cols); repObj.headerFound = true; } continue; }

    currentArray.push(cols); repObj.rows++;
  }
};

function useDB(key, init) {
  const [data, setData] = useState(init);
  const dbRef = useRef(null);
  useEffect(() => {
    try {
      if (!window.indexedDB) return;
      const req = window.indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = e => { if (!e.target.result.objectStoreNames.contains(STORE_NAME)) e.target.result.createObjectStore(STORE_NAME); };
      req.onsuccess = e => {
        dbRef.current = e.target.result;
        const g = dbRef.current.transaction(STORE_NAME,'readonly').objectStore(STORE_NAME).get(key);
        g.onsuccess = () => { if (g.result !== undefined) setData(g.result); };
      };
    } catch(e) {}
  }, [key]);
  const save = useCallback((d) => { setData(d); try { if (dbRef.current) dbRef.current.transaction(STORE_NAME,'readwrite').objectStore(STORE_NAME).put(d, key); } catch(e) {} }, [key]);
  const clear = useCallback(() => { setData(init); try { if (dbRef.current) dbRef.current.transaction(STORE_NAME,'readwrite').objectStore(STORE_NAME).delete(key); } catch(e) {} }, [init, key]);
  return [data, save, clear];
}

  useEffect(() => {
    let mounted = true;
    const load = async () => {
      const inject = (src) => new Promise((res, rej) => { if (document.querySelector(`script[src="${src}"]`)) return res(); const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = rej; document.body.appendChild(s); });
      try {
        log('⚡ AI SOP OCR v0.11.5.1 핫픽스 엔진 로드 중...');
        await inject('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
        if (window.pdfjsLib) window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        if (mounted) setStatus('idle');
      } catch(e) { if (mounted) { setStatus('error'); setErrorMsg('엔진 로드 실패: ' + e.message); } }
    };
    load(); return () => { mounted = false; };
  }, [log]);

  const callExtract = useCallback(async (base64, mimeType, chunkIndex, knownHeader, outputTokenLimit) => {
    const headerHint = knownHeader && knownHeader.length > 0 ? `\n\n[중요] 이 페이지 표 헤더 강제 힌트:\n${JSON.stringify(knownHeader)}\n첫 줄 헤더 배열도 위 헤더 그대로 출력하세요.` : '';
    let attempt = 1;
    while (attempt <= CONFIG.MAX_RETRIES) {
      if (cancelRef.current) throw new Error('취소됨');
      await globalRateLimitQueue.acquire(cancelRef);
      if (cancelRef.current) throw new Error('취소됨');

      const reqId = `ex_${chunkIndex}_${Date.now()}`;
      markRequest(reqId, Date.now());
      const apiStart = Date.now();
      const controller = new AbortController();
      activeRequestsRef.current.add(controller);
      const tid = setTimeout(() => controller.abort(), CONFIG.TIMEOUT_MS);

      try {
        const res = await fetch(`${CONFIG.GEMINI_URL}?key=${apiKey.trim()}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            systemInstruction: { parts: [{ text: EXTRACT_PROMPT + headerHint }] },
            contents: [{ role: 'user', parts: [{ text: '값이 있는 컬럼만 헤더명을 키로 사용해 JSON Lines로 출력.' }, { inlineData: { mimeType, data: base64 } }] }],
            generationConfig: { responseMimeType: 'text/plain', temperature: 0, maxOutputTokens: outputTokenLimit ?? 65535 },
            safetySettings: [ { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" }, { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" } ]
          }), signal: controller.signal
        });
        clearTimeout(tid); activeRequestsRef.current.delete(controller);
        if (!res.ok) throw new Error(`API ${res.status}: ${(await res.text()).substring(0, 200)}`);
        
        const json = await res.json();
        const finishReason = json.candidates?.[0]?.finishReason || 'UNKNOWN';
        const tokens = json.usageMetadata?.candidatesTokenCount || 0;
        markRequestEnd(reqId, tokens);
        if (finishReason === 'MAX_TOKENS') log(`⚠️ [페이지 ${chunkIndex}] 토큰 한도 초과 (${tokens})`);
        if (finishReason === 'SAFETY' || finishReason === 'PROHIBITED_CONTENT') throw new Error('Safety 차단');
        
        const text = json.candidates?.[0]?.content?.parts?.map(p => p.text).join('') || '';
        const cleaned = text.replace(/```[a-z]*\n?/gi, '').trim();
        if (!cleaned) throw new Error('Empty 응답');
        return { text: cleaned, finishReason, retries: attempt - 1, outputTokens: tokens, inputTokens: json.usageMetadata?.promptTokenCount || 0, apiTime: Date.now() - apiStart };
      } catch(err) {
        clearTimeout(tid); activeRequestsRef.current.delete(controller);
        if (cancelRef.current) throw new Error('취소됨');
        if (err.message.match(/401|403|400/)) throw err;
        if (attempt >= CONFIG.MAX_RETRIES) throw err;
        const delay = err.message.includes('429') ? 30000 : 5000 * Math.pow(2, attempt - 1);
        log(`⚠️ [페이지 ${chunkIndex}] API 오류 재시도 ${attempt}/${CONFIG.MAX_RETRIES} (${err.message.substring(0,40)})`);
        await new Promise(r => setTimeout(r, delay));
        attempt++;
      }
    }
  }, [apiKey, log, markRequest, markRequestEnd]);

  const executeChunk = useCallback(async (base64, mimeType, chunkIndex, fileName, knownHeader, tokenLimit) => {
    const start = Date.now();
    log(`⚡ [${fileName}] 페이지 [${chunkIndex}] 추출 시작`);
    try {
      const result = await callExtract(base64, mimeType, chunkIndex, knownHeader, tokenLimit);
      log(`✅ [${fileName}] 페이지 [${chunkIndex}] 완료 (${(result.apiTime/1000).toFixed(1)}초, ${result.outputTokens}토큰)`);
      return { success: true, chunkIndex, result, base64, mimeType, fileName, duration: Date.now() - start };
    } catch(err) {
      if (err.message !== '취소됨') log(`❌ [${fileName}] 페이지 [${chunkIndex}] 실패: ${err.message}`);
      return { success: false, chunkIndex, error: err, base64, mimeType, fileName };
    }
  }, [callExtract, log]);

  const processResults = (resolved, currentArray, fileHeaderRef, newFailedTasks, rep) => {
    for (const res of resolved) {
      if (cancelRef.current) break;
      if (!res.success) {
        if (res.error.message !== '취소됨') newFailedTasks.push({ base64: res.base64, mimeType: res.mimeType, chunkIndex: res.chunkIndex, fileName: res.fileName, total: 1, knownHeader: fileHeaderRef.current });
        continue;
      }
      rep.retries += res.result.retries || 0;
      rep.outputTokens += res.result.outputTokens || 0;
      rep.inputTokens += res.result.inputTokens || 0;
      parseRawText(res.result.text, fileHeaderRef, currentArray, rep);
    }
  };

  const initTracking = () => {
    usageHistoryRef.current = []; grandTotalReqRef.current = 0; maxRpmRef.current = 0; maxTpmRef.current = 0; maxOutputTokensRef.current = 0;
    setElapsed(0); setLiveStats({ rpm: 0, tpm: 0, maxOutputTokens: 0 });
    const startTime = Date.now();
    timerRef.current = setInterval(() => {
      const now = Date.now(); setElapsed(Math.floor((now - startTime) / 1000));
      usageHistoryRef.current = usageHistoryRef.current.filter(i => now - i.ts <= 60000);
      const rpm = usageHistoryRef.current.length;
      const tpm = usageHistoryRef.current.reduce((a, c) => a + c.outputTokens, 0);
      maxRpmRef.current = Math.max(maxRpmRef.current, rpm); maxTpmRef.current = Math.max(maxTpmRef.current, tpm);
      setLiveStats({ rpm, tpm, maxOutputTokens: maxOutputTokensRef.current });
    }, 1000);
  };

  const prepareUpload = async (filesArray) => {
    if (!filesArray.length) return;
    if (!apiKey.trim()) { setErrorMsg('API Key를 입력해주세요.'); setStatus('error'); return; }
    cancelRef.current = false;
    const firstPdf = filesArray.find(f => f.type.includes('pdf'));
    if (firstPdf) {
      setStatus('preview_loading');
      try {
        log(`🔍 [${firstPdf.name}] 미리보기 렌더링...`);
        const base64 = await fileToBase64(firstPdf);
        const arr = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
        const pdf = await window.pdfjsLib.getDocument({ data: arr }).promise;
        const page = await pdf.getPage(1);
        const vp = page.getViewport({ scale: 1.5 });
        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
        canvas.width = vp.width; canvas.height = vp.height;
        await page.render({ canvasContext: ctx, viewport: vp }).promise;
        setPreviewInfo({ filesArray, dataUrl: canvas.toDataURL('image/jpeg', 0.8), rotation: 0 });
        setStatus('preview');
      } catch(e) { if (!cancelRef.current) { log(`❌ 렌더 오류: ${e.message}`); setErrorMsg(e.message); setStatus('error'); } }
    } else startProcessing(filesArray, 0);
  };

  const startProcessing = async (filesArray, globalRotation) => {
    const cfg = { ...settings };
    globalRateLimitQueue = new SlidingWindowQueue(Math.max(1, cfg.LIMIT_RPM - 2), 60000, log);
    setStatus('processing'); setPreviewInfo(null); cancelRef.current = false; activeRequestsRef.current.clear();
    reportRef.current = []; setFailedTasks([]); setAuditSummary({ mathErrors: 0, fuzzyDuplicates: 0, spatialAnomalies: 0, dataLoss: 0 });
    setProgress({ current: 0, total: 0, estimate: '' }); initTracking();

    const globalHeaderRef = { current: null };
    let current = append ? [...rows] : [];
    if (!append) { clearRows(); logsRef.current = []; log('🆕 AI SOP OCR v0.11.5.1 새 작업 시작'); }

    let allFailedTasks = []; let smaQueue = [];

    try {
      const fileTasks = []; let totalChunks = 0;
      for (const file of filesArray) {
        if (cancelRef.current) break;
        const base64 = await fileToBase64(file);
        let mimeType = file.type || 'application/pdf';
        if (mimeType.includes('pdf')) {
          const arr = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
          const pdf = await window.pdfjsLib.getDocument({ data: arr }).promise;
          totalChunks += pdf.numPages;
          fileTasks.push({ file, mimeType: supportsWebP ? 'image/webp' : 'image/jpeg', isPdf: true, pdf });
        } else { totalChunks += 1; fileTasks.push({ file, mimeType, isPdf: false, base64 }); }
      }
      setProgress({ current: 0, total: totalChunks, estimate: calculateETA([12000], totalChunks, cfg.CONCURRENCY_LIMIT) });

      for (const task of fileTasks) {
        if (cancelRef.current) break;
        const fileStart = Date.now();
        const fileHeaderRef = { current: append ? globalHeaderRef.current : null };
        log(`📂 [${task.file.name}] 병렬 추출 준비 중...`);
        const rep = { name: task.file.name, size: (task.file.size/1024).toFixed(1)+'KB', start: new Date().toLocaleTimeString(), rows: 0, retries: 0, outputTokens: 0, inputTokens: 0 };
        let newFailedTasks = [];
        const totalPages = task.isPdf ? task.pdf.numPages : 1;
        const renderQueue = []; let renderDone = false;

        const renderProducer = (async () => {
          if (!task.isPdf) { renderQueue.push({ base64: task.base64, chunkIndex: 1 }); return; }
          const rawCanvas = document.createElement('canvas'); const rawCtx = rawCanvas.getContext('2d', { willReadFrequently: true });
          for (let i = 1; i <= totalPages; i++) {
            if (cancelRef.current) break;
            while (renderQueue.length >= cfg.CONCURRENCY_LIMIT + 1) { if (cancelRef.current) break; await new Promise(r => setTimeout(r, 100)); }
            if (cancelRef.current) break;
            const page = await task.pdf.getPage(i);
            const vp = page.getViewport({ scale: 300/72, rotation: (page.rotate + globalRotation) % 360 });
            rawCanvas.width = vp.width; rawCanvas.height = vp.height; rawCtx.clearRect(0,0,vp.width,vp.height); rawCtx.filter = 'grayscale(1)';
            await page.render({ canvasContext: rawCtx, viewport: vp }).promise; rawCtx.filter = 'none';
            const {c, b, l} = getAdaptiveFilter(analyzeBrightness(rawCtx, vp.width, vp.height));
            log(`🖼️ [페이지 ${i}] 전처리: 밝기 ${l} → c(${c}) b(${b})`);
            const finCanvas = document.createElement('canvas'); finCanvas.width = vp.width; finCanvas.height = vp.height;
            const finCtx = finCanvas.getContext('2d'); finCtx.filter = `contrast(${c}) brightness(${b})`; finCtx.drawImage(rawCanvas,0,0); finCtx.filter = 'none';
            renderQueue.push({ base64: finCanvas.toDataURL(task.mimeType, 0.85).split(',')[1], chunkIndex: i });
            finCanvas.width = 0; finCanvas.height = 0; if (page.cleanup) page.cleanup();
          }
        })();
        renderProducer.finally(() => { renderDone = true; });

        const executing = new Set(); const chunkPromises = [];
        for (let j = 0; j < totalPages; j++) {
          if (cancelRef.current) break;
          while (renderQueue.length === 0) { if (cancelRef.current || renderDone) break; await new Promise(r => setTimeout(r, 100)); }
          if (cancelRef.current) break;
          
          if (renderDone && renderQueue.length === 0 && j < totalPages) {
            log(`❌ [페이지 ${j + 1}] 렌더링 누락 발생 (재시도 큐로 이송)`);
            newFailedTasks.push({ base64: '', mimeType: task.mimeType, chunkIndex: j + 1, fileName: task.file.name, total: 1, knownHeader: fileHeaderRef.current });
            setProgress(prev => ({ ...prev, current: prev.current + 1 })); continue;
          }
          const item = renderQueue.shift();

          if (item.chunkIndex === 1) {
            log(`📋 1페이지 선처리 — 헤더 구조 파악 중...`);
            const res = await executeChunk(item.base64, task.mimeType, 1, task.file.name, null, cfg.LIMIT_OUTPUT_TOKENS);
            const tempRep = { rows: 0, retries: 0, outputTokens: 0, inputTokens: 0 };
            processResults([{ ...res, index: 0 }], current, fileHeaderRef, newFailedTasks, tempRep);
            rep.rows += tempRep.rows; rep.retries += tempRep.retries; rep.outputTokens += tempRep.outputTokens;
            if (res.duration) { smaQueue.push(res.duration); if (smaQueue.length > 5) smaQueue.shift(); }
            setProgress(p => ({ ...p, current: p.current + 1, estimate: calculateETA(smaQueue, p.total - (p.current + 1), cfg.CONCURRENCY_LIMIT) }));
            if (fileHeaderRef.current && globalHeaderRef.current && globalHeaderRef.current.join() !== fileHeaderRef.current.join()) {
              current.push([]); current.push(fileHeaderRef.current);
            }
            if (fileHeaderRef.current) globalHeaderRef.current = fileHeaderRef.current;
            saveRows([...current]); continue;
          }

          const p = executeChunk(item.base64, task.mimeType, item.chunkIndex, task.file.name, fileHeaderRef.current, cfg.LIMIT_OUTPUT_TOKENS).then(res => {
            executing.delete(p);
            if (res.duration) { smaQueue.push(res.duration); if (smaQueue.length > 5) smaQueue.shift(); }
            setProgress(p => ({ ...p, current: p.current + 1, estimate: calculateETA(smaQueue, p.total - (p.current + 1), cfg.CONCURRENCY_LIMIT) }));
            return { ...res, index: j };
          });
          chunkPromises.push(p); executing.add(p);
          if (executing.size >= cfg.CONCURRENCY_LIMIT) await Promise.race(executing);
        }

        await renderProducer;
        const resolved = (await Promise.all(chunkPromises)).sort((a,b) => a.index - b.index);
        processResults(resolved, current, fileHeaderRef, newFailedTasks, rep);
        if (fileHeaderRef.current && !globalHeaderRef.current) globalHeaderRef.current = fileHeaderRef.current;

        allFailedTasks = [...allFailedTasks, ...newFailedTasks];
        saveRows([...current]);
        rep.end = new Date().toLocaleTimeString(); rep.sec = Math.round((Date.now() - fileStart)/1000);
        reportRef.current.push(rep);
        log(`🏁 [${task.file.name}] 완료 — ${rep.rows}행 추출`);
      }

      setFailedTasks(allFailedTasks);
      if (!cancelRef.current) {
        if (current.length === 0 && allFailedTasks.length === 0) throw new Error('추출된 데이터가 없습니다.');
        setStatus('success');
      }
    } catch(e) { if (!cancelRef.current) { log(`❌ 오류: ${e.message}`); setErrorMsg(e.message); setStatus('error'); } }
    finally { clearInterval(timerRef.current); }
  };

  const handleRetryFailed = async () => { /* 구현 생략 (공간 절약, 기존과 동일) */ };

  // ── [FIX] 다운로드 크래시 핫픽스 ───────────────────────────────────────────
  const download = () => {
    try {
      if (!rows.length) return;
      const exportRows = rows.map(r => [...r]);
      if (!exportRows[0]) throw new Error("헤더 행이 존재하지 않습니다.");
      exportRows[0] = [...exportRows[0], '⚠️ 스마트 시스템 검토'];

      const TransactionSchema = z.object({ amount: z.string().optional(), principal: z.string().optional(), fee: z.string().optional() }).superRefine((data, ctx) => {
        const amt = parseNum(data.amount), prin = parseNum(data.principal), f = parseNum(data.fee);
        if (data.amount && data.principal && amt !== prin + f) ctx.addIssue({ code: z.ZodIssueCode.custom, message: "수학 오류" });
      });

      let currentHeader = rows[0]; let amountIdx = -1, prinIdx = -1, feeIdx = -1;
      const updateIndices = (hRow) => {
        amountIdx = hRow.findIndex(h => /이용금액|매출금액|결제금액|청구금액/.test(String(h)));
        prinIdx = hRow.findIndex(h => /원금|이용대금/.test(String(h)));
        feeIdx = hRow.findIndex(h => /수수료|할부수수료/.test(String(h)));
      };
      updateIndices(currentHeader);

      let mErrors = 0, fDups = 0, sAnomalies = 0, dLoss = 0;
      
      const validRows = exportRows.slice(1).filter(r => r.length > 0 && r[0] && !/이용일자|거래일자|결제일/.test(String(r[0])));
      const lengthStats = validRows.map(r => r.join('').length);
      const meanLen = lengthStats.length ? lengthStats.reduce((a,b)=>a+b,0) / lengthStats.length : 0;
      const stdDevLen = lengthStats.length ? Math.sqrt(lengthStats.map(x => Math.pow(x - meanLen, 2)).reduce((a,b)=>a+b,0) / lengthStats.length) : 0;

      for (let i = 1; i < exportRows.length; i++) {
        const row = exportRows[i]; if (!row || row.length === 0) continue;
        if (/이용일자|거래일자|결제일|카드|가맹점/.test(String(row[0]||''))) { currentHeader = row; updateIndices(currentHeader); continue; }
        
        const flags = [];
        if (amountIdx >= 0 && prinIdx >= 0) {
          const res = TransactionSchema.safeParse({ amount: String(row[amountIdx]??''), principal: String(row[prinIdx]??''), fee: feeIdx >= 0 ? String(row[feeIdx]??'') : '' });
          if (!res.success) { flags.push(res.error.issues[0].message); mErrors++; }
        }
        if (i > 1 && exportRows[i-1] && exportRows[i-1].length > 0 && !/이용일자/.test(String(exportRows[i-1][0]||''))) {
          const sim = getRowSimilarity(row, exportRows[i-1]);
          if (sim >= 0.70) { flags.push(sim === 1.0 ? '중복 행' : `유사 중복(${(sim*100).toFixed(0)}%)`); fDups++; }
        }
        if (stdDevLen > 0) {
          const zScore = Math.abs(row.join('').length - meanLen) / stdDevLen;
          if (zScore > 2.5) { flags.push('열밀림 의심'); sAnomalies++; }
        }
        const filled = row.filter(v => String(v ?? '').trim() !== '').length;
        if (filled <= 2) { flags.push('유실 의심'); dLoss++; }
        exportRows[i] = [...row, flags.join(', ')];
      }
      
      setAuditSummary({ mathErrors: mErrors, fuzzyDuplicates: fDups, spatialAnomalies: sAnomalies, dataLoss: dLoss });
      
      const ws = XLSX.utils.aoa_to_sheet(exportRows);
      const range = XLSX.utils.decode_range(ws['!ref']);
      for (let R = range.s.r; R <= range.e.r; ++R) {
        for (let C = range.s.c; C <= range.e.c; ++C) {
          const cell = ws[XLSX.utils.encode_cell({ c: C, r: R })];
          if (cell && isRealMoney(cell.v)) { cell.v = Number(String(cell.v).replace(/,/g, '')); cell.t = 'n'; cell.z = '#,##0'; }
        }
      }
      const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, '경량이상탐지_RAW'); XLSX.writeFile(wb, `${fileStamp()}.xlsx`);
      
      log(`💾 다운로드 성공 — Zod 검증, 유사 중복, 공간 탐지 가동 완료`);
      setDownloadDone(true); setTimeout(() => setDownloadDone(false), 2500);
    } catch(err) {
      log(`❌ 엑셀 다운로드 중 치명적 에러: ${err.message}`);
      alert(`다운로드 중 에러가 발생했습니다:\n${err.message}`);
    }
  };

  const downloadLog = () => { /* 생략 (기존과 동일) */ };
  const resetAll = () => { clearRows(); setStatus('idle'); setLiveStats({rpm:0,tpm:0,maxOutputTokens:0}); setFailedTasks([]); setAuditSummary({ mathErrors: 0, fuzzyDuplicates: 0, spatialAnomalies: 0, dataLoss: 0 }); };

  const MonitorUI = () => {
    if (grandTotalReqRef.current === 0 && status !== 'processing') return null;
    const rWarn = liveStats.rpm >= Math.floor(settings.LIMIT_RPM * settings.WARN_RATIO);
    return (
      <div className="mt-6 pt-6 border-t border-[#b0ccbb]">
        <div className="mono text-[10px] text-[#8aad9a] uppercase tracking-[3px] mb-3">// API Monitor</div>
        <div className={`terminal-border rounded-lg p-4 bg-[#dceee5] ${rWarn ? 'warn-border' : ''}`}>
          <div className="grid grid-cols-3 gap-4">
            <div><div className="mono text-[9px] text-[#8aad9a] mb-1">RPM (한도 {settings.LIMIT_RPM})</div><div className={`mono text-xl font-bold ${rWarn ? 'warn' : 'accent'}`}>{liveStats.rpm}</div></div>
            <div><div className="mono text-[9px] text-[#8aad9a] mb-1">TPM</div><div className="mono text-xl font-bold text-[#4a7a62]">{Math.floor(liveStats.tpm/1000)}k</div></div>
            <div><div className="mono text-[9px] text-[#8aad9a] mb-1">Max Tokens</div><div className="mono text-xl font-bold text-[#4a7a62]">{Math.floor(liveStats.maxOutputTokens)}</div></div>
          </div>
        </div>
      </div>
    );
  };

  return (
    <div className="min-h-screen bg-[#d6e8df] grid-bg text-[#4a7a62]">
      <div className="relative z-10 max-w-2xl mx-auto px-4 py-10 space-y-6">
        <header className="flex items-start justify-between">
          <div>
            <div className="mono text-[10px] text-[#8aad9a] tracking-[4px] uppercase mb-2">// Select → OCR → Process</div>
            <h1 className="text-2xl font-bold text-[#152b20] tracking-tight">AI SOP OCR <span className="mono text-[#8aad9a] text-sm font-normal">v0.11.5.1</span></h1>
          </div>
        </header>

        <div className="terminal-border rounded-xl p-6 bg-[#e8f2ec]">
          <div className="mb-6"><label className="mono text-[10px] text-[#8aad9a] uppercase tracking-[3px] flex items-center gap-2 mb-2"><Icons.Key className="w-3 h-3"/> API_KEY (Session)</label><input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); try { sessionStorage.setItem('sop_api_key', e.target.value); } catch(err){} }} className="w-full rounded-lg py-3 px-4 text-sm" /></div>

          {status === 'idle' && (
            <div className="space-y-4 slide-up">
              <label className="flex items-center gap-3 cursor-pointer"><input type="checkbox" checked={append} onChange={e=>setAppend(e.target.checked)} className="accent-checkbox"/><span className="mono text-[11px]">기존 데이터에 이어 붙이기</span></label>
              <div className={`border-2 border-dashed rounded-xl p-14 text-center cursor-pointer transition-all ${isDragging ? 'border-[#2d7a56] bg-[#cde0d5]' : 'border-[#b0ccbb] hover:border-[#8aad9a]'}`} onDragOver={e=>{e.preventDefault();setIsDragging(true);}} onDragLeave={e=>{e.preventDefault();setIsDragging(false);}} onDrop={e=>{e.preventDefault();setIsDragging(false);if(e.dataTransfer.files?.length)prepareUpload(Array.from(e.dataTransfer.files));}} onClick={()=>fileRef.current?.click()}>
                <Icons.Upload className={`w-10 h-10 mx-auto transition-colors ${isDragging?'accent':'text-[#b0ccbb]'}`}/><div className="mono text-sm mt-3">PDF 드래그 & 드롭</div><input ref={fileRef} type="file" className="hidden" accept="application/pdf" onChange={e=>{if(e.target.files?.length)prepareUpload(Array.from(e.target.files));}}/>
              </div>
            </div>
          )}
          {status === 'preview_loading' && <div className="py-12 flex flex-col items-center justify-center space-y-4 slide-up"><Icons.Spinner className="w-8 h-8 accent animate-spin"/><div className="mono text-sm tracking-widest">미리보기 렌더링...</div></div>}
          {status === 'preview' && previewInfo && (
            <div className="space-y-4 slide-up">
              <div className="relative border border-[#b0ccbb] rounded-lg overflow-hidden bg-white/50 aspect-[1/1.4] flex justify-center items-center"><img src={previewInfo.dataUrl} style={{ transform: `rotate(${previewInfo.rotation}deg)`, transition: 'transform 0.3s ease' }} className="max-w-full max-h-full object-contain" /></div>
              <div className="flex gap-2"><button onClick={()=>setPreviewInfo(p=>({...p,rotation:(p.rotation-90)%360}))} className="flex-1 btn-ghost py-3 rounded-lg flex justify-center"><Icons.RotateLeft className="w-5 h-5"/></button><button onClick={()=>setPreviewInfo(p=>({...p,rotation:(p.rotation+90)%360}))} className="flex-1 btn-ghost py-3 rounded-lg flex justify-center"><Icons.RotateRight className="w-5 h-5"/></button></div>
              <button onClick={()=>startProcessing(previewInfo.filesArray, previewInfo.rotation)} className="w-full btn-primary py-4 rounded-lg mono text-sm tracking-wider">추출 시작</button>
            </div>
          )}
          {status === 'processing' && (
            <div className="space-y-6 py-4 slide-up">
              <div>
                <div className="text-[#152b20] text-xl font-bold mb-4 flex items-center gap-2"><span className="blink text-sm accent">■</span> 스마트 추출 가동 중</div>
                {progress.total > 0 && (<div><div className="flex justify-between mono text-[10px] text-[#8aad9a] mb-2"><span>PAGE {progress.current} / {progress.total}</span><span>{progress.estimate}</span></div><div className="progress-bar mb-2"><div className="progress-fill" style={{width:`${Math.round((progress.current/progress.total)*100)}%`}}/></div></div>)}
              </div>
              <MonitorUI /><button onClick={()=>{cancelRef.current=true;setStatus('idle');}} className="w-full btn-danger mono text-[11px] py-3 rounded-lg">작업 취소</button>
            </div>
          )}
          {(status === 'success' || status === 'error') && (
            <div className="space-y-4 slide-up">
              {status === 'error' ? ( <div className="border border-[#c0392b] bg-[#fdf0ee] rounded-lg p-4 flex gap-3"><Icons.Warning className="w-5 h-5 warn shrink-0"/><div><div className="mono text-[11px] warn font-bold mb-1">SYSTEM ERROR</div><div className="mono text-[10px] text-[#a93226] break-all">{errorMsg}</div></div></div> ) : (
                <div className="border border-[#b0ccbb] bg-[#dceee5] rounded-lg p-4 flex justify-between items-center"><div className="flex items-center gap-3"><Icons.Check className="w-6 h-6 accent"/><div><div className="mono text-[10px] accent font-bold tracking-widest">분석 대기 완료</div><div className="mono text-[11px] text-[#8aad9a] mt-0.5">{elapsed}초 소요</div></div></div><div className="mono text-2xl font-bold accent">{rows.length > 0 ? rows.length - 1 : 0} <span className="text-sm font-normal">rows</span></div></div>
              )}
              
              {/* 대시보드 */}
              {(auditSummary.mathErrors > 0 || auditSummary.fuzzyDuplicates > 0 || auditSummary.spatialAnomalies > 0 || auditSummary.dataLoss > 0) && (
                <div className="border border-[#e0951850] bg-[#fdf8e6] rounded-lg p-4 space-y-3">
                  <div className="flex items-center gap-2"><Icons.Warning className="w-4 h-4 text-[#e09518]"/><div className="mono text-[10px] font-bold text-[#b57305]">시스템 검토 (다운로드 시 갱신됨)</div></div>
                  <div className="grid grid-cols-4 gap-2 text-center text-[11px] font-mono">
                    <div className="bg-white p-2 rounded border border-[#e0951830]"><div className="text-gray-400 text-[9px] mb-1">수학오류(Zod)</div><div className={`text-sm font-bold ${auditSummary.mathErrors>0?'text-red-600':'text-[#8aad9a]'}`}>{auditSummary.mathErrors}건</div></div>
                    <div className="bg-white p-2 rounded border border-[#e0951830]"><div className="text-gray-400 text-[9px] mb-1">퍼지중복</div><div className={`text-sm font-bold ${auditSummary.fuzzyDuplicates>0?'text-[#e09518]':'text-[#8aad9a]'}`}>{auditSummary.fuzzyDuplicates}건</div></div>
                    <div className="bg-white p-2 rounded border border-[#e0951830]"><div className="text-gray-400 text-[9px] mb-1">열밀림(ZSc)</div><div className={`text-sm font-bold ${auditSummary.spatialAnomalies>0?'text-orange-600':'text-[#8aad9a]'}`}>{auditSummary.spatialAnomalies}건</div></div>
                    <div className="bg-white p-2 rounded border border-[#e0951830]"><div className="text-gray-400 text-[9px] mb-1">유실</div><div className={`text-sm font-bold ${auditSummary.dataLoss>0?'text-red-600':'text-[#8aad9a]'}`}>{auditSummary.dataLoss}건</div></div>
                  </div>
                </div>
              )}

              <button onClick={download} className={`btn-primary w-full py-4 rounded-lg mono text-sm tracking-wider flex justify-center gap-3 ${downloadDone?'done':''}`}>{downloadDone ? '✅ 엑셀 패킹 및 분석 완료' : <><Icons.Download className="w-5 h-5"/> 다운로드 및 이상 탐지 가동</>}</button>
              <div className="flex gap-2"><button onClick={resetAll} className="flex-1 btn-ghost mono text-[11px] py-3 rounded-lg">새 작업</button></div>
            </div>
          )}
        </div>

        <div className="terminal-border rounded-xl p-5 bg-[#e8f2ec]">
          <div className="mono text-[10px] text-[#8aad9a] uppercase tracking-[3px] mb-3">// System Logs</div>
          <div className="h-40 overflow-y-auto space-y-1 scrollbar">
            {logs.length===0 && <div className="mono text-[10px] text-[#b0ccbb]">_ 대기 중</div>}
            {logs.map((l, i) => <div key={i} className={`mono text-[10px] ${i===0?'accent font-bold':''} ${i!==0&&(l.includes('❌')||l.includes('⚠️'))?'warn':''} ${i!==0&&l.includes('⏳')?'orange':''}`}>{l}</div>)}
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
